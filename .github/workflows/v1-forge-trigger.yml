name: Trigger V1 Asset Forge

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: Maximum targeted art rounds
        required: true
        default: "3"
        type: string
  push:
    branches: [main]
    paths:
      - docs/V1_FORGE_TRIGGER.txt

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve rounds
        id: request
        shell: bash
        run: |
          rounds="${{ inputs.rounds }}"
          if [ -z "$rounds" ]; then rounds=3; fi
          echo "rounds=$rounds" >> "$GITHUB_OUTPUT"

      - name: Dispatch production forge
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'urai-v1-forge-requested',
              client_payload: {
                rounds: '${{ steps.request.outputs.rounds }}',
                job_id: `trigger-${context.runId}`,
                callback_url: ''
              }
            });
