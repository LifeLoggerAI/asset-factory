name: Governed Asset Worker

on:
  workflow_dispatch:
    inputs:
      max_jobs:
        description: Maximum jobs to claim in this run
        required: true
        default: "5"
        type: string
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: governed-asset-worker
  cancel-in-progress: false

jobs:
  run-worker:
    if: ${{ vars.ASSET_FACTORY_CONTINUOUS_ENGINE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: asset-autonomy
    env:
      WORKER_URL: ${{ secrets.ASSET_FACTORY_WORKER_URL }}
      WORKER_SECRET: ${{ secrets.ASSET_FACTORY_WORKER_SECRET }}
      MAX_JOBS: ${{ github.event.inputs.max_jobs || vars.ASSET_FACTORY_WORKER_BATCH_SIZE || '5' }}
    steps:
      - name: Fail-closed preflight
        shell: bash
        run: |
          set -euo pipefail
          test -n "$WORKER_URL" || { echo "::error::ASSET_FACTORY_WORKER_URL is required"; exit 1; }
          test -n "$WORKER_SECRET" || { echo "::error::ASSET_FACTORY_WORKER_SECRET is required"; exit 1; }
          case "$WORKER_URL" in
            https://*) ;;
            *) echo "::error::Worker URL must use HTTPS"; exit 1 ;;
          esac
          case "$MAX_JOBS" in
            ''|*[!0-9]*) echo "::error::MAX_JOBS must be an integer"; exit 1 ;;
          esac
          [ "$MAX_JOBS" -ge 1 ] && [ "$MAX_JOBS" -le 10 ] || { echo "::error::MAX_JOBS must be between 1 and 10"; exit 1; }

      - name: Claim and run bounded jobs
        shell: bash
        run: |
          set -euo pipefail
          for index in $(seq 1 "$MAX_JOBS"); do
            code=$(curl -sS \
              -o worker-response.json \
              -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer $WORKER_SECRET" \
              -H 'Content-Type: application/json' \
              --data "{\"action\":\"claim-and-run\",\"workerId\":\"github-actions-${GITHUB_RUN_ID}-${index}\"}" \
              "$WORKER_URL")
            cat worker-response.json
            if [ "$code" = "200" ]; then
              claimed=$(python -c 'import json; print(str(json.load(open("worker-response.json")).get("claimed", False)).lower())')
              [ "$claimed" = "true" ] || break
            elif [ "$code" = "422" ]; then
              echo "Governed policy rejected a terminal asset; continuing to the next bounded claim."
            elif [ "$code" = "423" ]; then
              echo "Workers are paused; ending run without additional claims."
              break
            else
              echo "::error::Worker returned HTTP $code"
              exit 1
            fi
          done

      - name: Reconcile pending promotions
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body -sS \
            -X POST \
            -H "Authorization: Bearer $WORKER_SECRET" \
            -H 'Content-Type: application/json' \
            --data '{"action":"reconcile-pending","limit":10}' \
            "$WORKER_URL"
