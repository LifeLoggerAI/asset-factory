name: Rerun V1 Now

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/rerun-v1-now.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'urai-version-forge-requested',
              client_payload: {
                version: 'v1',
                rounds: '3',
                promote: 'true',
                job_id: `canonical-v1-${context.runId}`,
                callback_url: ''
              }
            })

# Canonical versioned V1 rebuild requested 2026-07-02.
