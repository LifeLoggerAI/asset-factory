name: Rerun V1 Now

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/rerun-v1-now.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'urai-v1-forge-requested',
              client_payload: { rounds: '3', job_id: `rerun-${context.runId}`, callback_url: '' }
            })

# Funding restored; rerun requested 2026-07-02.
