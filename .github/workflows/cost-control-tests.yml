name: Cost Control Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'image_asset_generator/cost_guard.py'
      - 'image_asset_generator/guarded_renderer.py'
      - 'image_asset_generator/render_v1_round.py'
      - 'image_asset_generator/test_cost_guard.py'
      - '.github/workflows/cost-control-tests.yml'
  push:
    branches: [main]
    paths:
      - 'image_asset_generator/cost_guard.py'
      - 'image_asset_generator/guarded_renderer.py'
      - 'image_asset_generator/render_v1_round.py'
      - 'image_asset_generator/test_cost_guard.py'
      - '.github/workflows/cost-control-tests.yml'
  workflow_dispatch:

concurrency:
  group: cost-control-tests-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r image_asset_generator/requirements.txt
      - run: python image_asset_generator/test_cost_guard.py
