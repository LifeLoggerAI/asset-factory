name: Read-Only Launch Static Gates Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/read-only-launch-static-gates-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Capture each static gate independently
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/launch-static-gates"
          mkdir -p "$evidence"
          for entry in \
            'launch-readiness|npm run test:launch-readiness' \
            'completion-lock|npm run test:completion-lock' \
            'deploy-workflow|npm run check:deploy-workflow'; do
            name="${entry%%|*}"
            command="${entry#*|}"
            set +e
            bash -lc "$command" 2>&1 | tee "$evidence/$name.log"
            status=${PIPESTATUS[0]}
            set -e
            printf '%s\n' "$status" > "$evidence/$name-exit.txt"
            tail -n 240 "$evidence/$name.log" > "$evidence/$name-tail.log"
          done
          {
            echo "head_sha=$TARGET_SHA"
            echo "credentialed=false"
            echo "provider_call=false"
            echo "deployment=false"
          } > "$evidence/authority.env"

      - name: Upload diagnostic evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: asset-factory-launch-static-gates-${{ env.TARGET_SHA }}-${{ github.run_id }}
          path: ${{ runner.temp }}/launch-static-gates
          if-no-files-found: error
          retention-days: 30
