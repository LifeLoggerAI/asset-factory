name: Cancel Superseded PR Runs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: write
  contents: read

concurrency:
  group: cancel-superseded-pr-runs-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  cancel-stale:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      HEAD_REF: ${{ github.head_ref }}
      EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      CURRENT_RUN_ID: ${{ github.run_id }}
      API_ROOT: ${{ github.api_url }}
    steps:
      - name: Cancel only superseded nonterminal runs for this PR
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repository = os.environ['REPOSITORY']
          event_branch = os.environ['HEAD_REF']
          event_sha = os.environ['EVENT_HEAD_SHA']
          current_run_id = int(os.environ['CURRENT_RUN_ID'])
          pr_number = int(os.environ['PR_NUMBER'])
          api_root = os.environ['API_ROOT'].rstrip('/')
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'urai-asset-factory-pr-run-cleanup',
          }

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, response_headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect())

          def api_json(url: str) -> dict:
              request = urllib.request.Request(url, headers=headers)
              try:
                  with opener.open(request, timeout=30) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  if exc.code in {301, 302, 303, 307, 308}:
                      exc.close()
                      raise RuntimeError('unexpected redirect from GitHub Actions API') from exc
                  raise

          def live_pr_state() -> tuple[str, str, str]:
              payload = api_json(f'{api_root}/repos/{repository}/pulls/{pr_number}')
              head = payload.get('head') or {}
              head_repo = head.get('repo') or {}
              return str(head_repo.get('full_name', '')), str(head.get('ref', '')), str(head.get('sha', ''))

          live_repository, live_branch, live_sha = live_pr_state()
          current_run = api_json(f'{api_root}/repos/{repository}/actions/runs/{current_run_id}')
          current_created_at = str(current_run.get('created_at', ''))
          current_run_sha = str(current_run.get('head_sha', ''))

          stale_event = (
              live_repository != repository
              or live_branch != event_branch
              or live_sha != event_sha
              or current_run_sha != event_sha
              or not current_created_at
          )
          if stale_event:
              report = {
                  'status': 'stale-event-no-op',
                  'repository': repository,
                  'pullRequest': pr_number,
                  'eventBranch': event_branch,
                  'eventHeadSha': event_sha,
                  'liveRepository': live_repository,
                  'liveBranch': live_branch,
                  'liveHeadSha': live_sha,
                  'currentRunHeadSha': current_run_sha,
                  'cancelledCount': 0,
              }
              print(json.dumps(report, indent=2, sort_keys=True))
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
                  summary.write('## Superseded PR run cleanup\n\n')
                  summary.write('Stale cleanup event detected; no runs were cancelled.\n')
              raise SystemExit(0)

          nonterminal = {'queued', 'in_progress', 'pending', 'requested', 'waiting'}
          cancelled = []
          inspected = 0
          aborted_for_new_head = False

          for page in range(1, 21):
              query = urllib.parse.urlencode({
                  'event': 'pull_request',
                  'branch': live_branch,
                  'per_page': 100,
                  'page': page,
              })
              payload = api_json(f'{api_root}/repos/{repository}/actions/runs?{query}')
              runs = payload.get('workflow_runs', [])
              if not runs:
                  break
              for run in runs:
                  inspected += 1
                  run_id = int(run['id'])
                  if run_id == current_run_id:
                      continue
                  if run.get('head_branch') != live_branch:
                      continue
                  if run.get('head_sha') == live_sha:
                      continue
                  if run.get('status') not in nonterminal:
                      continue
                  if str(run.get('created_at', '')) >= current_created_at:
                      continue
                  linked_prs = {
                      int(item['number'])
                      for item in run.get('pull_requests', [])
                      if isinstance(item, dict) and str(item.get('number', '')).isdigit()
                  }
                  if pr_number not in linked_prs:
                      continue

                  _, _, latest_sha = live_pr_state()
                  if latest_sha != live_sha:
                      aborted_for_new_head = True
                      break

                  cancel = urllib.request.Request(
                      f'{api_root}/repos/{repository}/actions/runs/{run_id}/cancel',
                      headers=headers,
                      method='POST',
                      data=b'',
                  )
                  try:
                      with opener.open(cancel, timeout=30) as response:
                          if response.status not in (202, 204):
                              raise RuntimeError(f'unexpected cancel status {response.status}')
                      cancelled.append({
                          'id': run_id,
                          'name': run.get('name'),
                          'headSha': run.get('head_sha'),
                          'createdAt': run.get('created_at'),
                          'status': run.get('status'),
                      })
                  except urllib.error.HTTPError as exc:
                      if exc.code in {301, 302, 303, 307, 308}:
                          exc.close()
                          raise RuntimeError('unexpected redirect from GitHub Actions cancellation API') from exc
                      if exc.code not in (409, 422):
                          raise
              if aborted_for_new_head:
                  break

          report = {
              'status': 'aborted-for-new-head' if aborted_for_new_head else 'completed',
              'repository': repository,
              'pullRequest': pr_number,
              'branch': live_branch,
              'currentHeadSha': live_sha,
              'currentRunId': current_run_id,
              'currentRunCreatedAt': current_created_at,
              'runsInspected': inspected,
              'cancelledCount': len(cancelled),
              'cancelledRuns': cancelled,
          }
          print(json.dumps(report, indent=2, sort_keys=True))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write('## Superseded PR run cleanup\n\n')
              summary.write(f"Current head: `{live_sha}`\n\n")
              summary.write(f"Inspected: {inspected}; cancelled: {len(cancelled)}\n")
              if aborted_for_new_head:
                  summary.write('\nA newer PR head appeared during cleanup; cancellation stopped immediately.\n')
          PY
