name: Cancel Superseded PR Runs

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: write
  contents: read

concurrency:
  group: cancel-superseded-pr-runs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cancel-stale:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      HEAD_REF: ${{ github.head_ref }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      CURRENT_RUN_ID: ${{ github.run_id }}
      API_ROOT: ${{ github.api_url }}
    steps:
      - name: Cancel only superseded nonterminal runs for this PR
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ['GH_TOKEN']
          repository = os.environ['REPOSITORY']
          branch = os.environ['HEAD_REF']
          current_sha = os.environ['HEAD_SHA']
          current_run_id = int(os.environ['CURRENT_RUN_ID'])
          pr_number = int(os.environ['PR_NUMBER'])
          api_root = os.environ['API_ROOT'].rstrip('/')
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'urai-asset-factory-pr-run-cleanup',
          }
          nonterminal = {'queued', 'in_progress', 'pending', 'requested', 'waiting'}
          cancelled = []
          inspected = 0

          for page in range(1, 21):
              query = urllib.parse.urlencode({
                  'event': 'pull_request',
                  'branch': branch,
                  'per_page': 100,
                  'page': page,
              })
              request = urllib.request.Request(
                  f'{api_root}/repos/{repository}/actions/runs?{query}',
                  headers=headers,
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.load(response)
              runs = payload.get('workflow_runs', [])
              if not runs:
                  break
              for run in runs:
                  inspected += 1
                  run_id = int(run['id'])
                  if run_id == current_run_id:
                      continue
                  if run.get('head_branch') != branch:
                      continue
                  if run.get('head_sha') == current_sha:
                      continue
                  if run.get('status') not in nonterminal:
                      continue
                  linked_prs = {
                      int(item['number'])
                      for item in run.get('pull_requests', [])
                      if isinstance(item, dict) and str(item.get('number', '')).isdigit()
                  }
                  if linked_prs and pr_number not in linked_prs:
                      continue
                  cancel = urllib.request.Request(
                      f'{api_root}/repos/{repository}/actions/runs/{run_id}/cancel',
                      headers=headers,
                      method='POST',
                      data=b'',
                  )
                  try:
                      with urllib.request.urlopen(cancel, timeout=30) as response:
                          if response.status not in (202, 204):
                              raise RuntimeError(f'unexpected cancel status {response.status}')
                      cancelled.append({
                          'id': run_id,
                          'name': run.get('name'),
                          'headSha': run.get('head_sha'),
                          'status': run.get('status'),
                      })
                  except urllib.error.HTTPError as exc:
                      if exc.code not in (409, 422):
                          raise

          report = {
              'repository': repository,
              'pullRequest': pr_number,
              'branch': branch,
              'currentHeadSha': current_sha,
              'currentRunId': current_run_id,
              'runsInspected': inspected,
              'cancelledCount': len(cancelled),
              'cancelledRuns': cancelled,
          }
          print(json.dumps(report, indent=2, sort_keys=True))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write('## Superseded PR run cleanup\n\n')
              summary.write(f"Current head: `{current_sha}`\n\n")
              summary.write(f"Inspected: {inspected}; cancelled: {len(cancelled)}\n")
          PY
