name: Final V1 Avatar Extension

on:
  workflow_dispatch:

concurrency:
  group: urai-final-v1-avatar-extension
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  verify-checkpoint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r image_asset_generator/requirements.txt
      - run: python image_asset_generator/validate_manifest.py
