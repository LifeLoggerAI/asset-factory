name: V1 AAA Asset Forge

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: Maximum provider generation and upgrade rounds (1-3)
        required: true
        default: "3"
        type: string
      job_id:
        description: Optional URAI Jobs job ID
        required: false
        default: "manual"
        type: string
      callback_url:
        description: Optional URAI Jobs callback URL; must match the configured allowed origin
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [urai-v1-forge-requested]

concurrency:
  group: urai-v1-aaa-asset-forge
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  forge-and-promote:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      spatial_sha: ${{ steps.promote.outputs.spatial_sha }}
      promotion_pr: ${{ steps.open_pr.outputs.promotion_pr }}
      job_id: ${{ steps.context.outputs.job_id }}
    env:
      ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
      ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
      ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
      ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
      ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
      ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
      URAI_WHEEL_GITHUB_TOKEN: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
    steps:
      - name: Resolve request context
        id: context
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "rounds=${{ github.event.client_payload.rounds || '3' }}" >> "$GITHUB_OUTPUT"
            echo "job_id=${{ github.event.client_payload.job_id || 'dispatch' }}" >> "$GITHUB_OUTPUT"
            echo "callback_url=${{ github.event.client_payload.callback_url || '' }}" >> "$GITHUB_OUTPUT"
          else
            echo "rounds=${{ inputs.rounds }}" >> "$GITHUB_OUTPUT"
            echo "job_id=${{ inputs.job_id }}" >> "$GITHUB_OUTPUT"
            echo "callback_url=${{ inputs.callback_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce paid-generation cost controls
        shell: bash
        run: |
          rounds="${{ steps.context.outputs.rounds }}"
          case "$rounds" in
            1|2|3) ;;
            *)
              echo "::error::rounds must be an integer from 1 through 3; received '$rounds'."
              exit 1
              ;;
          esac

      - name: Checkout Asset Factory
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Production secret preflight
        shell: bash
        run: |
          missing=0
          for name in ASSET_RENDERER_ENDPOINT ASSET_RENDERER_API_KEY URAI_WHEEL_GITHUB_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured. The production forge will not fall back to placeholder art."
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Run feedback-driven V1 forge
        env:
          ASSET_FORGE_MAX_ROUNDS: ${{ steps.context.outputs.rounds }}
          ASSET_RENDERER_MODE: provider
          ASSET_FORGE_REQUIRE_PROVIDER: "1"
          ASSET_QUALITY_REQUIRE_PROVIDER: "1"
        run: python image_asset_generator/forge_v1.py

      - name: Upload forge evidence and partial render checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-v1-aaa-forge-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            image_asset_generator/quality_report.json
            image_asset_generator/upgrade_feedback.json
            image_asset_generator/forge_receipt.json
            image_asset_generator/manifest.json
            image_asset_generator/assets/**
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/spatial_handoff/**

      - name: Checkout Spatial promotion target
        uses: actions/checkout@v4
        with:
          repository: LifeLoggerAI/urai-spatial
          ref: main
          token: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
          path: spatial

      - name: Copy canonical handoff into Spatial
        shell: bash
        run: |
          test -f image_asset_generator/spatial_handoff/assets/urai/final/manifests/asset-factory-spatial-handoff.json
          rsync -a image_asset_generator/spatial_handoff/ spatial/urai-tier1/public/

      - name: Create reviewed Spatial V1 asset branch
        id: promote
        working-directory: spatial
        shell: bash
        run: |
          git config user.name "URAI Production Wheel"
          git config user.email "urai-wheel@users.noreply.github.com"
          git add urai-tier1/public/assets/urai
          if git diff --cached --quiet; then
            echo "No asset changes to promote."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "spatial_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          branch="asset-factory/v1-aaa-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git commit -m "Promote provider-scored V1 AAA asset pack"
          git push origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "spatial_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Open reviewed Spatial V1 promotion pull request
        id: open_pr
        if: steps.promote.outputs.changed == 'true'
        shell: bash
        env:
          BRANCH: ${{ steps.promote.outputs.branch }}
          SPATIAL_SHA: ${{ steps.promote.outputs.spatial_sha }}
        run: |
          response=$(python - <<'PY' | curl --fail-with-body -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $URAI_WHEEL_GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/LifeLoggerAI/urai-spatial/pulls \
            -d @-
          import json
          import os
          print(json.dumps({
              "title": "Promote provider-scored V1 AAA asset pack",
              "head": os.environ["BRANCH"],
              "base": "main",
              "body": (
                  "Provider-rendered V1 assets passed the asset-factory quality gate. "
                  "This pull request intentionally requires Spatial CI and visual review before merge.\n\n"
                  f"Asset Factory run: {os.environ['GITHUB_RUN_ID']}\n"
                  f"Candidate commit: {os.environ['SPATIAL_SHA']}"
              ),
          }))
          PY
          )
          pr_url=$(python -c 'import json,sys; print(json.load(sys.stdin)["html_url"])' <<<"$response")
          echo "promotion_pr=$pr_url" >> "$GITHUB_OUTPUT"
          echo "Opened reviewed promotion: $pr_url"

  notify-jobs:
    if: always()
    needs: [forge-and-promote]
    runs-on: ubuntu-latest
    env:
      CALLBACK_SECRET: ${{ secrets.URAI_JOBS_CALLBACK_SECRET }}
      CALLBACK_ALLOWED_ORIGIN: ${{ secrets.URAI_JOBS_CALLBACK_ALLOWED_ORIGIN }}
      MANUAL_CALLBACK: ${{ inputs.callback_url }}
      DISPATCH_CALLBACK: ${{ github.event.client_payload.callback_url }}
    steps:
      - name: Notify URAI Jobs when requested
        shell: bash
        env:
          PROMOTION_PR: ${{ needs.forge-and-promote.outputs.promotion_pr }}
        run: |
          callback="$MANUAL_CALLBACK"
          [ "${{ github.event_name }}" = "repository_dispatch" ] && callback="$DISPATCH_CALLBACK"
          [ -n "$callback" ] || exit 0
          [ -n "$CALLBACK_SECRET" ] || { echo "::error::URAI_JOBS_CALLBACK_SECRET missing"; exit 1; }
          [ -n "$CALLBACK_ALLOWED_ORIGIN" ] || { echo "::error::URAI_JOBS_CALLBACK_ALLOWED_ORIGIN missing"; exit 1; }
          CALLBACK="$callback" python - <<'PY'
          import os
          import sys
          from urllib.parse import urlparse

          target = urlparse(os.environ["CALLBACK"])
          allowed = urlparse(os.environ["CALLBACK_ALLOWED_ORIGIN"])
          target_port = target.port or (443 if target.scheme == "https" else None)
          allowed_port = allowed.port or (443 if allowed.scheme == "https" else None)
          if target.scheme != "https" or (target.scheme, target.hostname, target_port) != (
              allowed.scheme,
              allowed.hostname,
              allowed_port,
          ):
              print("::error::Callback URL is outside the configured HTTPS origin.")
              sys.exit(1)
          PY
          conclusion="${{ needs.forge-and-promote.result }}"
          status="FAILED"
          [ "$conclusion" = "success" ] && status="SUCCESS"
          payload=$(STATUS="$status" CONCLUSION="$conclusion" python - <<'PY'
          import json
          import os
          print(json.dumps({
              "jobId": "${{ needs.forge-and-promote.outputs.job_id }}",
              "status": os.environ["STATUS"],
              "summary": f"V1 AAA asset forge {os.environ['CONCLUSION']}; promotion requires reviewed merge",
              "spatialSha": "${{ needs.forge-and-promote.outputs.spatial_sha }}",
              "promotionPr": os.environ.get("PROMOTION_PR", ""),
              "assetFactoryRun": "${{ github.run_id }}",
          }))
          PY
          )
          curl --fail-with-body -sS \
            -X POST \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -H "Content-Type: application/json" \
            "$callback" \
            -d "$payload"
