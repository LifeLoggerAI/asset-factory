name: Offline Evidence Package

on:
  push:
    branches: [agent/full-multimodal-asset-completion]
    paths:
      - 'scripts/build_creative_review.py'
      - 'scripts/build_contact_sheets.py'
      - 'scripts/build_accessibility_media.py'
      - 'scripts/build_xr_test_packet.py'
      - 'scripts/validate_xr_receipts.py'
      - 'scripts/build_films.py'
      - 'runner-repair/**'
      - '.github/workflows/offline-evidence-package.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install media and deterministic dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --disable-pip-version-check Pillow==11.3.0 jsonschema==4.25.1
      - name: Record environment
        run: |
          mkdir -p verification receipts
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          python --version | tee verification/tool-versions.txt
          ffmpeg -version | head -1 >> verification/tool-versions.txt
          ffprobe -version | head -1 >> verification/tool-versions.txt
          python -m pip freeze >> verification/tool-versions.txt
          printf '{"headSha":"%s","runId":"%s","runner":"%s"}\n' "$GITHUB_SHA" "$GITHUB_RUN_ID" "$RUNNER_OS" > verification/environment.json
      - name: Static checks
        run: python -m py_compile scripts/build_creative_review.py scripts/build_contact_sheets.py scripts/build_accessibility_media.py scripts/build_xr_test_packet.py scripts/validate_xr_receipts.py scripts/build_films.py
      - name: Build evidence packages
        run: |
          python scripts/build_creative_review.py
          python scripts/build_contact_sheets.py
          python scripts/build_accessibility_media.py
          python scripts/build_xr_test_packet.py
          python scripts/build_films.py
      - name: Validate JSON, JSONL, schema, and CSV
        run: |
          find creative-review accessibility xr-test-packet runner-repair films -name '*.json' -print0 | xargs -0 -n1 python -m json.tool >/dev/null
          python - <<'PY'
          import csv,json
          from pathlib import Path
          rows=list(csv.DictReader(Path('xr-test-packet/test-cases.csv').open()))
          assert rows and set(rows[0])=={'test_id','area','procedure','expected_result','status'}
          assert all(r['status']=='ready_for_execution' for r in rows)
          for path in ['creative-review/provider-receipts.jsonl','films/assembly-receipts.jsonl']:
              for line in Path(path).read_text().splitlines(): json.loads(line)
          print(f'XR_ROWS={len(rows)}')
          PY
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator
          Draft202012Validator.check_schema(json.load(open('xr-test-packet/device-receipt-schema.json')))
          print('XR_SCHEMA_VALID=1')
          PY
      - name: Evaluate exact-build physical XR receipts
        run: python scripts/validate_xr_receipts.py --expected-build-sha "$GITHUB_SHA"
      - name: Rebuild determinism check
        run: |
          find creative-review accessibility xr-test-packet films -type f -print0 | sort -z | xargs -0 sha256sum > /tmp/first.sha256
          python scripts/build_creative_review.py >/dev/null
          python scripts/build_contact_sheets.py >/dev/null
          python scripts/build_accessibility_media.py >/dev/null
          python scripts/build_xr_test_packet.py >/dev/null
          python scripts/build_films.py >/dev/null
          find creative-review accessibility xr-test-packet films -type f -print0 | sort -z | xargs -0 sha256sum > /tmp/second.sha256
          diff -u /tmp/first.sha256 /tmp/second.sha256
          cp /tmp/second.sha256 verification/generated-checksums.sha256
      - name: Write production acceptance receipt
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          python - <<'PY'
          import json,os
          from pathlib import Path
          def load(path,default):
              try: return json.loads(Path(path).read_text())
              except Exception: return default
          films=load('films/verification-results.json',{})
          rights=load('multimodal/rights-ledger.json',{'records':[]})
          source=load('multimodal/source-lock.json',{})
          xr=load('xr-test-packet/xr-verification-report.json',{})
          rights_open=[r.get('recordId') for r in rights.get('records',[]) if r.get('status') not in {'verified','not-applicable'}]
          gates={
            'workflowTechnicalChecks': os.getenv('JOB_STATUS')=='success',
            'filmsTwelveVerified': films.get('status')=='verified_pass' and films.get('createdOutputs')==12,
            'rightsCleared': not rights_open,
            'physicalXrVerified': xr.get('physicalXrVerified') is True,
            'releaseReady': source.get('releaseReady') is True,
            'deployedShaPresent': bool(source.get('deployedSha')),
            'rollbackShaPresent': bool(source.get('rollbackSha')) and source.get('rollbackSha')!=source.get('deployedSha')
          }
          status='verified_pass' if all(gates.values()) else ('verified_fail' if not gates['workflowTechnicalChecks'] else 'blocked')
          receipt={
            'schemaVersion':'1.2.0',
            'repository':os.getenv('GITHUB_REPOSITORY'),
            'commit':os.getenv('GITHUB_SHA'),
            'status':status,
            'gates':gates,
            'openRightsRecords':rights_open,
            'xrVerificationReport':'xr-test-packet/xr-verification-report.json',
            'packages':['creative-review','accessibility','films','xr-test-packet','runner-repair'],
            'attestationBoundary':'No production-complete claim is valid unless every gate is true.'
          }
          Path('receipts/completion-receipt.json').write_text(json.dumps(receipt,indent=2)+'\n')
          print(json.dumps(receipt,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: offline-evidence-${{ github.sha }}
          retention-days: 90
          if-no-files-found: error
          path: |
            creative-review/
            accessibility/
            films/
            xr-test-packet/
            runner-repair/
            verification/
            receipts/
