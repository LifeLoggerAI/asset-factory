name: Asset Factory Release Readiness

on:
  push:
    branches:
      - main
    paths:
      - 'assetfactory-studio/**'
      - 'image_asset_generator/**'
      - 'life-map-pipeline/functions/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/asset-factory-release-readiness.yml'
      - 'LAUNCH_READINESS.md'
      - 'README.md'
      - 'docs/release-evidence/URAI-AF-20260711-V1-RESUME-CREDENTIAL-ISOLATION-001.md'
  pull_request:
    branches:
      - main
    paths:
      - 'assetfactory-studio/**'
      - 'image_asset_generator/**'
      - 'life-map-pipeline/functions/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/asset-factory-release-readiness.yml'
      - 'LAUNCH_READINESS.md'
      - 'README.md'
      - 'docs/release-evidence/URAI-AF-20260711-V1-RESUME-CREDENTIAL-ISOLATION-001.md'
  workflow_dispatch:
    inputs:
      live_url:
        description: 'Optional live base URL to verify after deployment'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: asset-factory-release-readiness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: image_asset_generator/requirements.txt

      - name: Install studio dependencies
        working-directory: assetfactory-studio
        run: npm install

      - name: Validate production assets
        working-directory: assetfactory-studio
        run: |
          mkdir -p ../artifacts/release-readiness
          npm run validate:assets 2>&1 | tee ../artifacts/release-readiness/asset-validation.log

      - name: Upload production validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-factory-release-readiness-validation
          path: artifacts/release-readiness/asset-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate runtime contract
        working-directory: assetfactory-studio
        run: npm run validate:runtime

      - name: Validate Firebase rules surface
        working-directory: assetfactory-studio
        run: npm run validate:rules

      - name: Validate Firebase deploy preflight
        working-directory: assetfactory-studio
        run: npm run validate:deploy

      - name: Lint studio
        working-directory: assetfactory-studio
        run: npm run lint

      - name: Typecheck studio
        working-directory: assetfactory-studio
        run: npm run typecheck

      - name: Run studio tests
        working-directory: assetfactory-studio
        run: npm run test

      - name: Build studio
        working-directory: assetfactory-studio
        run: npm run build

      - name: Install image pipeline dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Run image asset pipeline
        run: python image_asset_generator/run_pipeline.py

      - name: Upload image pipeline proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-factory-image-pipeline-proof
          path: |
            image_asset_generator/validation_report.json
            image_asset_generator/firebase_seed.json
            image_asset_generator/asset_pack.zip
            image_asset_generator/preview.html
          if-no-files-found: warn

      - name: Install functions dependencies
        working-directory: life-map-pipeline/functions
        run: npm i

      - name: Build functions
        working-directory: life-map-pipeline/functions
        run: npm run build

      - name: Verify live deployment
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.live_url != '' }}
        working-directory: assetfactory-studio
        env:
          ASSET_FACTORY_LIVE_URL: ${{ inputs.live_url }}
        run: npm run verify:live
