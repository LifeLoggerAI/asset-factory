name: Asset Factory Release Readiness

on:
  workflow_dispatch:
    inputs:
      live_url:
        description: 'Optional live base URL to verify after deployment'
        required: false
        type: string

permissions:
  contents: read

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install studio dependencies
        working-directory: assetfactory-studio
        run: npm install

      - name: Validate production assets
        working-directory: assetfactory-studio
        run: npm run validate:assets

      - name: Validate runtime contract
        working-directory: assetfactory-studio
        run: npm run validate:runtime

      - name: Validate Firebase rules surface
        working-directory: assetfactory-studio
        run: npm run validate:rules

      - name: Validate Firebase deploy preflight
        working-directory: assetfactory-studio
        run: npm run validate:deploy

      - name: Lint studio
        working-directory: assetfactory-studio
        run: npm run lint

      - name: Typecheck studio
        working-directory: assetfactory-studio
        run: npm run typecheck

      - name: Run studio tests
        working-directory: assetfactory-studio
        run: npm run test

      - name: Build studio
        working-directory: assetfactory-studio
        run: npm run build

      - name: Install functions dependencies
        working-directory: life-map-pipeline/functions
        run: npm ci

      - name: Build functions
        working-directory: life-map-pipeline/functions
        run: npm run build

      - name: Verify live deployment
        if: ${{ inputs.live_url != '' }}
        working-directory: assetfactory-studio
        env:
          ASSET_FACTORY_LIVE_URL: ${{ inputs.live_url }}
        run: npm run verify:live
