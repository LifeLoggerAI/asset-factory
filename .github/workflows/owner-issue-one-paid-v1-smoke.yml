name: Owner Issue One Paid V1 Smoke

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

concurrency:
  group: owner-issue-one-paid-v1-smoke
  cancel-in-progress: false

env:
  ASSET_RENDERER_PROVIDER: openai
  ASSET_RENDERER_MODE: provider
  ASSET_RENDERER_MODEL: gpt-image-1.5
  ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
  ASSET_RENDERER_MAX_ATTEMPTS: '1'
  ASSET_FORGE_REQUIRE_PROVIDER: '1'
  ASSET_QUALITY_REQUIRE_PROVIDER: '1'
  ASSET_FORGE_PAID_RUN_AUTHORIZED: '1'
  ASSET_FORGE_MAX_ROUNDS: '1'
  ASSET_FORGE_MAX_PROVIDER_CALLS: '1'
  ASSET_FORGE_MAX_UNIT_COST_USD: '1.00'
  ASSET_FORGE_MAX_COST_USD: '1.00'
  ASSET_FORGE_RUN_ID: ${{ github.run_id }}-owner-issue-v1-smoke
  ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/artifacts/budget/paid-request-state.json
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  one-paid-v1-smoke:
    if: github.actor == 'LifeLoggerAI' && github.event.issue.title == 'AUTHORIZE ONE PAID V1 SMOKE 2026-07-11-0910-CDT'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: paid-asset-generation
    steps:
      - name: Record runner assignment on authorization issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `RUNNER_ASSIGNED\n\nWorkflow: Owner Issue One Paid V1 Smoke\nRun ID: ${context.runId}\nCommit: ${context.sha}\nAuthorized ceiling: 1 provider call / USD 1.00\nPromotion: disabled\nDeployment: disabled`
            })

      - name: Check out repaired Asset Factory code
        uses: actions/checkout@v4
        with:
          ref: 143214dc402708bf780fc128c27984c313cf1de4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Validate exact one-call authorization
        shell: bash
        run: |
          set -euo pipefail
          test -n "$OPENAI_API_KEY"
          test "$ASSET_FORGE_MAX_PROVIDER_CALLS" = '1'
          test "$ASSET_FORGE_MAX_UNIT_COST_USD" = '1.00'
          test "$ASSET_FORGE_MAX_COST_USD" = '1.00'
          python image_asset_generator/check_canonical_version_contract.py
          mkdir -p artifacts/budget artifacts/smoke

      - name: Render exactly one canonical V1 asset
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          root = Path('image_asset_generator').resolve()
          sys.path.insert(0, str(root))

          import canonical_release_manifests
          import cost_guarded_renderer
          import generate_assets

          entries = canonical_release_manifests.build('v1')
          if not entries:
              raise SystemExit('canonical V1 manifest is empty')
          entry = entries[0]
          sizes = entry.get('sizes') or []
          if not sizes:
              raise SystemExit('first canonical V1 entry has no output size')
          size = int(sizes[0])

          output = Path('artifacts/smoke') / f"{entry['name']}_{size}.png"
          result = cost_guarded_renderer.render_asset(
              entry,
              size,
              generate_assets.offline_render_asset,
          )
          result.image.save(output, format='PNG', optimize=True)
          cost_guarded_renderer.write_render_metadata(output, entry, result)

          request = {
              'asset': entry['name'],
              'size': size,
              'output': str(output),
              'renderer': result.renderer,
              'attempt': result.attempt,
              'metadata': result.metadata,
          }
          Path('artifacts/smoke/render-result.json').write_text(
              json.dumps(request, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(request, indent=2))
          PY

      - name: Verify ledger and provider receipt
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from decimal import Decimal
          from pathlib import Path

          ledger_path = Path(os.environ['ASSET_FORGE_BUDGET_STATE_PATH'])
          render_path = Path('artifacts/smoke/render-result.json')
          if not ledger_path.is_file():
              raise SystemExit('paid request ledger was not created')
          if not render_path.is_file():
              raise SystemExit('provider render result was not created')

          ledger = json.loads(ledger_path.read_text(encoding='utf-8'))
          render = json.loads(render_path.read_text(encoding='utf-8'))
          attempts = ledger.get('attempts', [])
          calls = int(ledger.get('providerCallsExecuted', -1))
          reserved = Decimal(str(ledger.get('reservedEstimatedCostUsd', '999')))

          if calls != 1 or len(attempts) != 1:
              raise SystemExit(f'exactly one provider attempt required; calls={calls}, attempts={len(attempts)}')
          if reserved > Decimal('1.00'):
              raise SystemExit(f'reserved exposure exceeded USD 1.00: {reserved}')
          if attempts[0].get('status') != 'succeeded':
              raise SystemExit(f"provider attempt status is {attempts[0].get('status')!r}")
          if render.get('renderer') != 'provider':
              raise SystemExit(f"renderer was {render.get('renderer')!r}, not provider")
          metadata = render.get('metadata') or {}
          if metadata.get('provider') != 'openai':
              raise SystemExit('provider metadata does not identify OpenAI')

          receipt = {
              'schemaVersion': 1,
              'status': 'passed',
              'workflow': 'Owner Issue One Paid V1 Smoke',
              'repository': os.environ.get('GITHUB_REPOSITORY'),
              'workflowCommit': os.environ.get('GITHUB_SHA'),
              'checkedOutCode': '143214dc402708bf780fc128c27984c313cf1de4',
              'runId': os.environ.get('GITHUB_RUN_ID'),
              'provider': metadata.get('provider'),
              'model': metadata.get('provider_model'),
              'providerRequestId': metadata.get('provider_request_id'),
              'asset': render.get('asset'),
              'providerCallsExecuted': calls,
              'reservedEstimatedCostUsd': str(reserved),
              'attemptStatus': attempts[0].get('status'),
              'promotion': False,
              'deployment': False,
          }
          Path('artifacts/smoke/verified-receipt.json').write_text(
              json.dumps(receipt, indent=2) + '\n',
              encoding='utf-8',
          )
          Path('artifacts/smoke/issue-summary.txt').write_text(
              'PAID_SMOKE_PASSED\n'
              f"Run ID: {receipt['runId']}\n"
              f"Asset: {receipt['asset']}\n"
              f"Provider: {receipt['provider']}\n"
              f"Model: {receipt['model']}\n"
              f"Provider request ID: {receipt['providerRequestId']}\n"
              f"Provider calls: {receipt['providerCallsExecuted']}\n"
              f"Reserved estimated cost USD: {receipt['reservedEstimatedCostUsd']}\n"
              'Promotion: disabled\nDeployment: disabled\n',
              encoding='utf-8',
          )
          print(json.dumps(receipt, indent=2))
          PY

      - name: Upload immutable smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-issue-one-paid-v1-smoke-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            artifacts/budget/*.json
            artifacts/smoke/**

      - name: Report final outcome on authorization issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let detail = 'No verified provider receipt was produced. Inspect the workflow job logs and uploaded partial evidence.';
            const summaryPath = 'artifacts/smoke/issue-summary.txt';
            if (fs.existsSync(summaryPath)) {
              detail = fs.readFileSync(summaryPath, 'utf8').slice(0, 5000);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `WORKFLOW_${String('${{ job.status }}').toUpperCase()}\n\n${detail}\nWorkflow run ID: ${context.runId}`
            })
