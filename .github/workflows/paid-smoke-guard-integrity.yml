name: Paid Smoke Guard Integrity

on:
  pull_request:
    paths:
      - .github/workflows/dispatch-one-paid-v1-smoke.yml
      - .github/workflows/paid-smoke-guard-integrity.yml
      - scripts/check-paid-smoke-guard.py
      - docs/release-evidence/URAI-WSE-20260711-153200-ASSET-FACTORY-005.json
  push:
    branches: [main]
    paths:
      - .github/workflows/dispatch-one-paid-v1-smoke.yml
      - .github/workflows/paid-smoke-guard-integrity.yml
      - scripts/check-paid-smoke-guard.py
      - docs/release-evidence/URAI-WSE-20260711-153200-ASSET-FACTORY-005.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: paid-smoke-guard-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-paid-smoke-guard:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact candidate identity
        shell: bash
        run: |
          set -euo pipefail
          expected='${{ github.event.pull_request.head.sha || github.sha }}'
          test "$(git rev-parse HEAD)" = "$expected"
          test -z "$(git status --porcelain)"
          echo "- verified candidate SHA: $expected" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify manual-only one-dollar guard
        run: python3 scripts/check-paid-smoke-guard.py
