name: V2 Living State Forge

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Free dry-run, one-provider-call smoke, or full missing-only forge"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - provider-smoke
          - full-forge
      payment_approved:
        description: "I explicitly approve the capped paid provider run selected above"
        required: true
        default: false
        type: boolean
      max_provider_calls:
        description: "Hard maximum provider calls for this run; smoke must be 1"
        required: true
        default: "0"
        type: string
      estimated_usd_per_call:
        description: "Operator-supplied current estimated USD per provider call"
        required: true
        default: "0"
        type: string
      max_estimated_usd:
        description: "Hard maximum estimated USD exposure for this run"
        required: true
        default: "0"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: urai-v2-living-state-forge
  cancel-in-progress: false

jobs:
  forge-promote-and-open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
      ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
      ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
      ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
      ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
      ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
      URAI_WHEEL_GITHUB_TOKEN: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
      URAI_VERSION: v2
      ASSET_FORGE_MAX_ROUNDS: "3"
      ASSET_RENDERER_MODE: provider
      ASSET_FORGE_REQUIRE_PROVIDER: "1"
      ASSET_QUALITY_REQUIRE_PROVIDER: "1"
      ASSET_FORGE_MISSING_ONLY: "1"
      ASSET_RENDERER_MAX_ATTEMPTS: "1"
      ASSET_FORGE_PAYMENT_APPROVED: ${{ inputs.payment_approved && '1' || '0' }}
      ASSET_FORGE_MAX_PROVIDER_CALLS: ${{ inputs.max_provider_calls }}
      ASSET_RENDERER_ESTIMATED_USD_PER_CALL: ${{ inputs.estimated_usd_per_call }}
      ASSET_FORGE_MAX_ESTIMATED_USD: ${{ inputs.max_estimated_usd }}

    steps:
      - name: Checkout exact Asset Factory revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Validate canonical V1-V5 contract and exact V2 inventory
        shell: bash
        run: |
          set -euo pipefail
          python image_asset_generator/test_canonical_contract.py
          python image_asset_generator/forge_versioned.py --list
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('image_asset_generator/manifests/generated/v2.manifest.json')
          entries = json.loads(path.read_text())
          assert len(entries) == 80, f'V2 requires exactly 80 canonical states, found {len(entries)}'
          assert all(item['name'].startswith('v2_') for item in entries)
          assert all(item['canonical_path'].startswith('assets/urai/v2/') for item in entries)
          print('V2_CANONICAL_ASSET_COUNT=80')
          print('V2_PAID_PROVIDER_CALLED=false')
          PY

      - name: Record free dry-run receipt
        if: ${{ inputs.mode == 'dry-run' }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          payload = {
              'schemaVersion': '1.0.0',
              'generatedAt': datetime.now(timezone.utc).isoformat(),
              'status': 'dry-run-passed',
              'version': 'v2',
              'expectedOutputs': 80,
              'providerCalls': 0,
              'paidProviderCalled': False,
              'promotionAllowed': False,
          }
          Path('image_asset_generator/v2_dry_run_receipt.json').write_text(json.dumps(payload, indent=2) + '\n')
          print(json.dumps(payload, indent=2))
          PY

      - name: Validate paid-run approval and exposure caps
        if: ${{ inputs.mode != 'dry-run' }}
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          PAYMENT_APPROVED: ${{ inputs.payment_approved }}
        run: |
          set -euo pipefail
          test "$PAYMENT_APPROVED" = "true" || { echo "::error::Paid generation was not explicitly approved."; exit 1; }
          python - <<'PY'
          import os
          from decimal import Decimal
          mode = os.environ['MODE']
          calls = int(os.environ['ASSET_FORGE_MAX_PROVIDER_CALLS'])
          per_call = Decimal(os.environ['ASSET_RENDERER_ESTIMATED_USD_PER_CALL'])
          maximum = Decimal(os.environ['ASSET_FORGE_MAX_ESTIMATED_USD'])
          assert calls > 0, 'max_provider_calls must be positive'
          assert per_call > 0, 'estimated_usd_per_call must be positive'
          assert maximum > 0, 'max_estimated_usd must be positive'
          assert calls * per_call <= maximum, 'call exposure exceeds max_estimated_usd'
          if mode == 'provider-smoke':
              assert calls == 1, 'provider-smoke must be capped at exactly one provider call'
          if mode == 'full-forge':
              assert calls <= 80, 'V2 full-forge cannot authorize more than 80 first-pass provider calls'
          print(f'PAID_RUN_MODE={mode}')
          print(f'MAX_PROVIDER_CALLS={calls}')
          print(f'MAX_ESTIMATED_USD={maximum}')
          PY

      - name: Production provider preflight
        if: ${{ inputs.mode != 'dry-run' }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in ASSET_RENDERER_ENDPOINT ASSET_RENDERER_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured. V2 will not fall back to placeholder art."
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Run exactly one provider smoke call
        if: ${{ inputs.mode == 'provider-smoke' }}
        shell: bash
        run: |
          set -euo pipefail
          python image_asset_generator/provider_smoke.py

      - name: Forge, score, and retry missing V2 states
        if: ${{ inputs.mode == 'full-forge' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ASSET_RENDERER_AUTH_HEADER:-}" ]; then unset ASSET_RENDERER_AUTH_HEADER; fi
          if [ -z "${ASSET_RENDERER_AUTH_SCHEME:-}" ]; then unset ASSET_RENDERER_AUTH_SCHEME; fi
          python image_asset_generator/forge_versioned.py --version v2

      - name: Certify complete V2 receipt and handoff
        if: ${{ inputs.mode == 'full-forge' }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('image_asset_generator')
          receipt = json.loads((root / 'forge_receipt_v2.json').read_text())
          quality = json.loads((root / 'quality_report_v2.json').read_text())
          handoff_path = root / 'spatial_handoff/assets/urai/final/manifests/asset-factory-spatial-handoff.json'
          handoff = json.loads(handoff_path.read_text())
          assert receipt.get('version') == 'v2', receipt
          assert receipt.get('status') == 'passed', receipt
          assert receipt.get('expectedOutputs') == 80, receipt
          assert receipt.get('forgeExitCode') == 0, receipt
          assert handoff.get('missing') == 0, handoff
          failed = [entry for entry in quality.get('assets', []) if entry.get('status') != 'passed']
          assert len(quality.get('assets', [])) == 80, quality
          assert not failed, f'V2 quality failures: {[entry.get("name") for entry in failed]}'
          print('V2_FORGE_STATUS=passed')
          print('V2_QUALITY_PASSED=80')
          print('V2_HANDOFF_MISSING=0')
          PY

      - name: Upload V2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-v2-living-states-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            image_asset_generator/manifests/generated/*.json
            image_asset_generator/v2_dry_run_receipt.json
            image_asset_generator/provider_smoke_receipt.json
            image_asset_generator/quality_report.json
            image_asset_generator/quality_report_v2.json
            image_asset_generator/upgrade_feedback.json
            image_asset_generator/upgrade_feedback_v2.json
            image_asset_generator/forge_receipt.json
            image_asset_generator/forge_receipt_v2.json
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/assets/urai/v2/**
            image_asset_generator/spatial_handoff/**

      - name: Checkout Spatial promotion target
        if: ${{ inputs.mode == 'full-forge' }}
        uses: actions/checkout@v4
        with:
          repository: LifeLoggerAI/urai-spatial
          ref: main
          token: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
          path: spatial
          persist-credentials: true

      - name: Create reviewed Spatial V2 asset branch
        if: ${{ inputs.mode == 'full-forge' }}
        id: promote
        shell: bash
        working-directory: spatial
        run: |
          set -euo pipefail
          test -f ../image_asset_generator/spatial_handoff/assets/urai/final/manifests/asset-factory-spatial-handoff.json
          rsync -a ../image_asset_generator/spatial_handoff/ urai-tier1/public/
          branch="asset-factory/v2-living-states-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git config user.name "URAI Production Wheel"
          git config user.email "urai-wheel@users.noreply.github.com"
          git add urai-tier1/public/assets/urai
          git diff --cached --quiet && { echo "::error::No V2 asset changes were produced."; exit 1; }
          git commit -m "Promote provider-scored V2 living-state asset pack"
          git push origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Open Spatial V2 promotion pull request
        if: ${{ inputs.mode == 'full-forge' }}
        shell: bash
        env:
          BRANCH: ${{ steps.promote.outputs.branch }}
        run: |
          set -euo pipefail
          payload=$(python - <<'PY'
          import json
          import os
          print(json.dumps({
              'title': 'Promote the complete V2 living-state asset pack',
              'head': os.environ['BRANCH'],
              'base': 'main',
              'body': 'Promotes the provider-rendered V2 pack only after all 80 canonical states passed provider generation, validation, quality checks, and zero-missing Spatial handoff. The run was manual, explicitly approved, missing-only, one-attempt-per-call, and capped by the recorded call and estimated-dollar limits.',
          }))
          PY
          )
          curl --fail-with-body -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $URAI_WHEEL_GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/LifeLoggerAI/urai-spatial/pulls \
            -d "$payload" | python -m json.tool
