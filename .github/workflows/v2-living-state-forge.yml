name: V2 Living State Forge

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Free plan, one-call provider smoke, or full missing-only V2 forge
        required: true
        type: choice
        options:
          - dry-run
          - provider-smoke
          - full-forge
        default: dry-run
      confirm_paid:
        description: Type AUTHORIZE_ONE_V2_PROVIDER_CALL or AUTHORIZE_V2_PAID_FORGE for paid modes
        required: true
        default: NO
        type: string
      max_provider_calls:
        description: Exact maximum provider calls; must equal the generated plan
        required: true
        default: "0"
        type: string
      max_unit_cost_usd:
        description: Maximum authorized USD cost per provider request
        required: true
        default: "0"
        type: string
      max_cost_usd:
        description: Maximum authorized total USD exposure
        required: true
        default: "0"
        type: string
      max_rounds:
        description: Maximum quality rounds; provider smoke requires one
        required: true
        type: choice
        options:
          - "1"
          - "2"
          - "3"
        default: "1"
      promote:
        description: Open a Spatial promotion PR only after a complete certified full forge
        required: true
        type: boolean
        default: false

concurrency:
  group: urai-v2-living-state-forge
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  plan:
    name: Create zero-call V2 exposure plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact Asset Factory revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate canonical contract and paid-request guard
        run: |
          set -euo pipefail
          python scripts/check_canonical_versions.py
          python scripts/check_paid_forge_gate.py
          python image_asset_generator/forge_versioned.py --list

      - name: Create zero-provider-call plan
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          MAX_ROUNDS: ${{ inputs.max_rounds }}
          MAX_UNIT_COST_USD: ${{ inputs.max_unit_cost_usd }}
        run: |
          set -euo pipefail
          mkdir -p operations/receipts/assets/plans
          args=(--version v2 --max-rounds "$MAX_ROUNDS" --output operations/receipts/assets/plans/v2-forge-plan.json)
          if [ "$MODE" = "provider-smoke" ]; then
            test "$MAX_ROUNDS" = "1" || { echo "::error::Provider smoke requires max_rounds=1"; exit 1; }
            args+=(--limit-outputs 1)
          fi
          unit_cost_enabled=$(python - "$MAX_UNIT_COST_USD" <<'PY'
          import sys
          from decimal import Decimal, InvalidOperation
          try:
              value = Decimal(sys.argv[1])
          except InvalidOperation as exc:
              raise SystemExit(f'invalid max_unit_cost_usd: {exc}')
          if value < 0:
              raise SystemExit('max_unit_cost_usd cannot be negative')
          print('1' if value > 0 else '0')
          PY
          )
          if [ "$unit_cost_enabled" = "1" ]; then
            args+=(--max-unit-cost-usd "$MAX_UNIT_COST_USD")
          fi
          python scripts/plan_versioned_forge.py "${args[@]}"

      - name: Verify free plan receipt
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          plan = json.loads(Path('operations/receipts/assets/plans/v2-forge-plan.json').read_text())
          assert plan['version'] == 'v2', plan
          assert plan['catalogExpectedOutputs'] == 80, plan
          assert plan['manifestEntries'] == 80, plan
          assert plan['providerCallsExecuted'] == 0, plan
          assert plan['mode'] == 'dry-run-no-provider-calls', plan
          print(f"V2_PLAN_MAX_PROVIDER_CALLS={plan['maxProviderCalls']}")
          print('V2_PAID_PROVIDER_CALLED=false')
          PY

      - name: Upload V2 plan
        uses: actions/upload-artifact@v4
        with:
          name: urai-v2-forge-plan-${{ github.run_id }}
          path: operations/receipts/assets/plans/v2-forge-plan.json
          if-no-files-found: error
          retention-days: 365

  paid-forge:
    name: Execute explicitly authorized paid V2 mode
    if: ${{ inputs.mode != 'dry-run' }}
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: paid-asset-generation
    env:
      ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
      ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
      ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
      ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
      ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
      URAI_WHEEL_GITHUB_TOKEN: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
      URAI_VERSION: v2
      ASSET_RENDERER_MODE: provider
      ASSET_FORGE_REQUIRE_PROVIDER: "1"
      ASSET_QUALITY_REQUIRE_PROVIDER: "1"
      ASSET_FORGE_SKIP_EXISTING_OUTPUTS: "1"
      ASSET_RENDERER_MAX_ATTEMPTS: "1"
      ASSET_FORGE_MAX_ROUNDS: ${{ inputs.max_rounds }}
      ASSET_FORGE_PAID_RUN_AUTHORIZED: "1"
      ASSET_FORGE_MAX_PROVIDER_CALLS: ${{ inputs.max_provider_calls }}
      ASSET_FORGE_MAX_UNIT_COST_USD: ${{ inputs.max_unit_cost_usd }}
      ASSET_FORGE_MAX_COST_USD: ${{ inputs.max_cost_usd }}
      ASSET_FORGE_RUN_ID: ${{ github.run_id }}
      ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/operations/receipts/assets/cost-control/v2-${{ github.run_id }}-paid-request-state.json

    steps:
      - name: Checkout exact Asset Factory revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download exact plan
        uses: actions/download-artifact@v4
        with:
          name: urai-v2-forge-plan-${{ github.run_id }}
          path: operations/receipts/assets/plans

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Enforce exact authorization and exposure
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          CONFIRM_PAID: ${{ inputs.confirm_paid }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "provider-smoke" ]; then
            test "$CONFIRM_PAID" = "AUTHORIZE_ONE_V2_PROVIDER_CALL"
            test "$ASSET_FORGE_MAX_ROUNDS" = "1"
          elif [ "$MODE" = "full-forge" ]; then
            test "$CONFIRM_PAID" = "AUTHORIZE_V2_PAID_FORGE"
          else
            echo "::error::Unsupported paid mode: $MODE"
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          from decimal import Decimal
          from pathlib import Path
          plan = json.loads(Path('operations/receipts/assets/plans/v2-forge-plan.json').read_text())
          planned_calls = int(plan['maxProviderCalls'])
          authorized_calls = int(os.environ['ASSET_FORGE_MAX_PROVIDER_CALLS'])
          unit_cost = Decimal(os.environ['ASSET_FORGE_MAX_UNIT_COST_USD'])
          max_cost = Decimal(os.environ['ASSET_FORGE_MAX_COST_USD'])
          assert planned_calls > 0, plan
          assert authorized_calls == planned_calls, (authorized_calls, planned_calls)
          assert unit_cost > 0, unit_cost
          assert max_cost > 0, max_cost
          assert unit_cost * authorized_calls <= max_cost, (unit_cost, authorized_calls, max_cost)
          print(f'AUTHORIZED_PROVIDER_CALLS={authorized_calls}')
          print(f'AUTHORIZED_MAX_COST_USD={max_cost}')
          PY

      - name: Provider credential preflight
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "ASSET_RENDERER_PROVIDER=openai" >> "$GITHUB_ENV"
          elif [ -n "${ASSET_RENDERER_ENDPOINT:-}" ] && [ -n "${ASSET_RENDERER_API_KEY:-}" ]; then
            echo "ASSET_RENDERER_PROVIDER=custom" >> "$GITHUB_ENV"
          else
            echo "::error::No usable provider credential path is configured."
            exit 1
          fi

      - name: Run guarded one-call provider smoke
        if: ${{ inputs.mode == 'provider-smoke' }}
        run: python image_asset_generator/provider_smoke_guarded.py

      - name: Forge missing V2 outputs under atomic call and cost ceilings
        if: ${{ inputs.mode == 'full-forge' }}
        run: python image_asset_generator/forge_versioned.py --version v2

      - name: Certify complete V2 receipt and handoff
        if: ${{ inputs.mode == 'full-forge' }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('image_asset_generator')
          receipt = json.loads((root / 'forge_receipt_v2.json').read_text())
          quality = json.loads((root / 'quality_report_v2.json').read_text())
          handoff = json.loads((root / 'spatial_handoff/assets/urai/final/manifests/asset-factory-spatial-handoff.json').read_text())
          ledger_path = next(Path('operations/receipts/assets/cost-control').glob('v2-*-paid-request-state.json'))
          ledger = json.loads(ledger_path.read_text())
          assert receipt.get('version') == 'v2', receipt
          assert receipt.get('status') == 'passed', receipt
          assert receipt.get('expectedOutputs') == 80, receipt
          assert receipt.get('forgeExitCode') == 0, receipt
          assert handoff.get('missing') == 0, handoff
          assert len(quality.get('assets', [])) == 80, quality
          assert not [entry for entry in quality['assets'] if entry.get('status') != 'passed'], quality
          assert not [attempt for attempt in ledger.get('attempts', []) if attempt.get('status') == 'reserved'], ledger
          assert ledger.get('providerCallsExecuted') <= int(receipt['costPolicy']['maxProviderCalls']), ledger
          print('V2_FORGE_STATUS=passed')
          print('V2_QUALITY_PASSED=80')
          print('V2_HANDOFF_MISSING=0')
          PY

      - name: Upload immutable paid-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-v2-paid-evidence-${{ github.run_id }}
          retention-days: 365
          if-no-files-found: warn
          path: |
            operations/receipts/assets/plans/v2-forge-plan.json
            operations/receipts/assets/cost-control/v2-*-paid-request-state.json
            image_asset_generator/provider_smoke_receipt.json
            image_asset_generator/manifests/generated/v2.manifest.json
            image_asset_generator/quality_report.json
            image_asset_generator/quality_report_v2.json
            image_asset_generator/upgrade_feedback.json
            image_asset_generator/upgrade_feedback_v2.json
            image_asset_generator/forge_receipt.json
            image_asset_generator/forge_receipt_v2.json
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/assets/urai/v2/**
            image_asset_generator/spatial_handoff/**

      - name: Checkout Spatial promotion target
        if: ${{ inputs.mode == 'full-forge' && inputs.promote }}
        uses: actions/checkout@v4
        with:
          repository: LifeLoggerAI/urai-spatial
          ref: main
          token: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
          path: spatial
          persist-credentials: true

      - name: Create reviewed Spatial V2 promotion branch
        if: ${{ inputs.mode == 'full-forge' && inputs.promote }}
        id: promote
        shell: bash
        working-directory: spatial
        run: |
          set -euo pipefail
          test -f ../image_asset_generator/spatial_handoff/assets/urai/final/manifests/asset-factory-spatial-handoff.json
          rsync -a ../image_asset_generator/spatial_handoff/ urai-tier1/public/
          branch="asset-factory/v2-living-states-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git config user.name "URAI Production Wheel"
          git config user.email "urai-wheel@users.noreply.github.com"
          git add urai-tier1/public/assets/urai
          git diff --cached --quiet && { echo "::error::No V2 asset changes were produced."; exit 1; }
          git commit -m "Promote provider-scored V2 living-state asset pack"
          git push origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open reviewed Spatial promotion pull request
        if: ${{ inputs.mode == 'full-forge' && inputs.promote }}
        shell: bash
        env:
          BRANCH: ${{ steps.promote.outputs.branch }}
        run: |
          set -euo pipefail
          payload=$(python - <<'PY'
          import json
          import os
          print(json.dumps({
              'title': 'Promote the complete V2 living-state asset pack',
              'head': os.environ['BRANCH'],
              'base': 'main',
              'body': 'Promotes the provider-rendered V2 pack only after all 80 canonical states passed generation, quality, zero-missing handoff, and the atomic paid-request ledger. This PR does not certify V3, V4, V5, or physical-device behavior.',
          }))
          PY
          )
          curl --fail-with-body -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $URAI_WHEEL_GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/LifeLoggerAI/urai-spatial/pulls \
            -d "$payload" | python -m json.tool
