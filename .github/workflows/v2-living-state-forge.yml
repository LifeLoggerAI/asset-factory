name: V2 Living State Forge

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type GENERATE_V2_80 to authorize the paid 80-asset provider forge"
        required: true
        default: "NO"
      rounds:
        description: "Maximum provider quality rounds"
        required: true
        type: choice
        options: ["1", "2", "3"]
        default: "3"
      max_provider_calls:
        description: "Hard ceiling for provider HTTP attempts"
        required: true
        default: "80"
      max_unit_cost_usd:
        description: "Maximum reserved cost per provider attempt"
        required: true
        default: "0.20"
      max_total_cost_usd:
        description: "Hard total reserved-cost ceiling"
        required: true
        default: "16.00"
      skip_existing:
        description: "Reuse already dropped outputs instead of regenerating them"
        required: true
        type: boolean
        default: true
      promote:
        description: "Create and push a Spatial promotion branch after certification"
        required: true
        type: boolean
        default: true

concurrency:
  group: urai-v2-living-state-forge
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  forge-promote-and-open-pr:
    if: github.event.inputs.confirm == 'GENERATE_V2_80'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    environment: paid-asset-generation
    env:
      ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
      ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
      ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
      ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
      ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
      ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
      ASSET_RENDERER_MAX_ATTEMPTS: '1'
      URAI_WHEEL_GITHUB_TOKEN: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
      URAI_VERSION: v2
      ASSET_FORGE_MAX_ROUNDS: ${{ github.event.inputs.rounds }}
      ASSET_RENDERER_MODE: provider
      ASSET_FORGE_REQUIRE_PROVIDER: '1'
      ASSET_QUALITY_REQUIRE_PROVIDER: '1'
      ASSET_FORGE_PAID_RUN_AUTHORIZED: '1'
      ASSET_FORGE_MAX_PROVIDER_CALLS: ${{ github.event.inputs.max_provider_calls }}
      ASSET_FORGE_MAX_UNIT_COST_USD: ${{ github.event.inputs.max_unit_cost_usd }}
      ASSET_FORGE_MAX_COST_USD: ${{ github.event.inputs.max_total_cost_usd }}
      ASSET_FORGE_RUN_ID: ${{ github.run_id }}-v2
      ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/artifacts/budget/paid-request-state.json

    steps:
      - name: Record paid-action authorization and validate budget
        shell: bash
        run: |
          test "${{ github.event.inputs.confirm }}" = "GENERATE_V2_80"
          mkdir -p artifacts/budget artifacts/forge-plans
          python - <<'PY'
          from decimal import Decimal
          calls = int('${{ github.event.inputs.max_provider_calls }}')
          unit = Decimal('${{ github.event.inputs.max_unit_cost_usd }}')
          total = Decimal('${{ github.event.inputs.max_total_cost_usd }}')
          rounds = int('${{ github.event.inputs.rounds }}')
          if calls < 1 or unit <= 0 or total <= 0 or unit * calls > total:
              raise SystemExit('Invalid V2 provider budget')
          if calls > 80 * rounds:
              raise SystemExit('V2 provider-call ceiling exceeds the selected exposure plan')
          PY
          echo "Authorized workflow actor: $GITHUB_ACTOR"
          echo "Authorized exact output count: 80"
          echo "Authorized quality rounds: ${{ github.event.inputs.rounds }}"

      - name: Checkout Asset Factory
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Validate canonical contract and exact V2 inventory
        shell: bash
        run: |
          python image_asset_generator/check_canonical_version_contract.py
          python scripts/plan_versioned_forge.py --version v2 --max-rounds '${{ github.event.inputs.rounds }}' --max-unit-cost-usd '${{ github.event.inputs.max_unit_cost_usd }}' --output artifacts/forge-plans/v2.json
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('image_asset_generator/manifests/generated/v2.manifest.json')
          entries = json.loads(path.read_text())
          assert len(entries) == 80
          assert all(item['name'].startswith('v2_') for item in entries)
          assert all(item['canonical_path'].startswith('assets/urai/v2/') for item in entries)
          PY

      - name: Apply missing-only resume mode
        if: github.event.inputs.skip_existing == 'true'
        run: echo 'ASSET_FORGE_SKIP_EXISTING_OUTPUTS=1' >> "$GITHUB_ENV"

      - name: Production provider preflight
        shell: bash
        run: |
          missing=0
          for name in ASSET_RENDERER_ENDPOINT ASSET_RENDERER_API_KEY; do
            if [ -z "${!name}" ]; then echo "::error::$name is not configured"; missing=1; fi
          done
          if [ "${{ github.event.inputs.promote }}" = "true" ] && [ -z "$URAI_WHEEL_GITHUB_TOKEN" ]; then
            echo "::error::URAI_WHEEL_GITHUB_TOKEN is required for promotion"
            missing=1
          fi
          [ "$missing" = "0" ]

      - name: Forge, score, and retry V2 living states
        shell: bash
        run: |
          if [ -z "${ASSET_RENDERER_AUTH_HEADER:-}" ]; then unset ASSET_RENDERER_AUTH_HEADER; fi
          if [ -z "${ASSET_RENDERER_AUTH_SCHEME:-}" ]; then unset ASSET_RENDERER_AUTH_SCHEME; fi
          python image_asset_generator/forge_versioned.py --version v2

      - name: Certify complete V2 handoff
        run: python image_asset_generator/certify_version_handoff.py --version v2

      - name: Upload complete V2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-v2-living-states-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            artifacts/forge-plans/v2.json
            artifacts/budget/paid-request-state.json
            image_asset_generator/manifests/generated/v2.manifest.json
            image_asset_generator/manifests/generated/v2-manifest-build-summary.json
            image_asset_generator/quality_report*.json
            image_asset_generator/upgrade_feedback*.json
            image_asset_generator/forge_receipt*.json
            image_asset_generator/dropin_receipt_v2.json
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/assets/urai/v2/**
            image_asset_generator/spatial_handoff/**

      - name: Checkout Spatial promotion target
        if: github.event.inputs.promote == 'true'
        uses: actions/checkout@v4
        with:
          repository: LifeLoggerAI/urai-spatial
          ref: main
          token: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
          path: spatial

      - name: Create reviewed Spatial V2 asset branch
        if: github.event.inputs.promote == 'true'
        id: promote
        shell: bash
        working-directory: spatial
        run: |
          test -f ../image_asset_generator/spatial_handoff/assets/urai/final/manifests/v2-asset-factory-spatial-handoff.json
          rsync -a ../image_asset_generator/spatial_handoff/ urai-tier1/public/
          if [ -f scripts/check-canonical-asset-dropin.mjs ]; then node scripts/check-canonical-asset-dropin.mjs; fi
          branch="asset-factory/v2-living-states-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git config user.name "URAI Production Wheel"
          git config user.email "urai-wheel@users.noreply.github.com"
          git add urai-tier1/public/assets/urai
          git diff --cached --quiet && { echo "::error::No V2 asset changes were produced."; exit 1; }
          git commit -m "Promote provider-scored V2 living-state asset pack"
          git push origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open Spatial V2 promotion pull request
        if: github.event.inputs.promote == 'true'
        shell: bash
        env:
          BRANCH: ${{ steps.promote.outputs.branch }}
        run: |
          payload=$(python - <<'PY'
          import json, os
          print(json.dumps({
              'title': 'Promote the complete V2 living-state asset pack',
              'head': os.environ['BRANCH'],
              'base': 'main',
              'body': 'Promotes the provider-rendered V2 pack after all 80 states passed generation, quality, exact-count, file, hash, provenance, and zero-missing handoff certification.',
          }))
          PY
          )
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $URAI_WHEEL_GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/LifeLoggerAI/urai-spatial/pulls \
            -d "$payload" | python -m json.tool
