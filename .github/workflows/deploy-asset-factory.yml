name: Deploy Asset Factory

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - production
      deploy:
        description: Run Firebase Studio deploy before smoke tests
        required: true
        type: boolean
        default: false
      smoke_mode:
        description: Smoke mode to run after optional deploy
        required: true
        type: choice
        options:
          - readonly
          - authenticated
          - both
        default: readonly

concurrency:
  group: asset-factory-${{ inputs.environment }}-deploy
  cancel-in-progress: false

jobs:
  deploy-and-smoke:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      ACTIONS_STEP_DEBUG: 'true'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ASSET_FACTORY_FORCE_LOCAL: 'false'
      ASSET_FACTORY_REQUIRE_API_KEY: 'true'
      ASSET_FACTORY_REQUIRE_AUTH: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Use Java 21 for Firebase CLI
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Print runtime versions
        run: |
          node --version
          npm --version
          java -version

      - name: Install root dependencies
        run: npm install

      - name: Install engine dependencies
        run: npm --prefix engine install

      - name: Install functions dependencies
        run: npm --prefix functions install

      - name: Install LifeMap dependencies
        run: npm --prefix life-map-pipeline/functions install

      - name: Install Studio dependencies
        run: npm --prefix assetfactory-studio install

      - name: Doctor gate
        run: npm run doctor

      - name: Launch readiness gate
        run: npm run test:launch-readiness

      - name: Completion lock gate
        run: npm run test:completion-lock

      - name: Local verification gate
        run: npm run verify:local

      - name: Deploy workflow gate
        run: node scripts/check-deploy-workflow.mjs

      - name: Resolve deployment target
        id: target
        shell: bash
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "base_url=https://urai-4dc1d.web.app" >> "$GITHUB_OUTPUT"
            echo "tenant_id=prod-smoke" >> "$GITHUB_OUTPUT"
            echo "other_tenant_id=prod-smoke-denied" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://staging.uraiassetfactory.com" >> "$GITHUB_OUTPUT"
            echo "tenant_id=smoke-tenant-a" >> "$GITHUB_OUTPUT"
            echo "other_tenant_id=smoke-tenant-b" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate required secrets
        shell: bash
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          ASSET_FACTORY_API_KEY: ${{ secrets.ASSET_FACTORY_API_KEY }}
          ASSET_FACTORY_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_BEARER_TOKEN }}
          ASSET_FACTORY_OTHER_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_OTHER_BEARER_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          missing=0

          if [ "${{ inputs.deploy }}" = "true" ] && [ -z "$FIREBASE_TOKEN" ]; then
            echo "Missing required deploy secret: FIREBASE_TOKEN"
            missing=1
          fi

          if [ "${{ inputs.smoke_mode }}" = "authenticated" ] || [ "${{ inputs.smoke_mode }}" = "both" ]; then
            for name in ASSET_FACTORY_API_KEY ASSET_FACTORY_BEARER_TOKEN ASSET_FACTORY_OTHER_BEARER_TOKEN CRON_SECRET; do
              if [ -z "${!name}" ]; then
                echo "Missing required authenticated smoke secret: $name"
                missing=1
              fi
            done
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Firebase CLI
        if: ${{ inputs.deploy }}
        run: npm install -g firebase-tools

      - name: Deploy Firebase Studio
        if: ${{ inputs.deploy }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npm run deploy:studio -- --token "$FIREBASE_TOKEN"

      - name: Read-only smoke
        if: ${{ inputs.smoke_mode == 'readonly' || inputs.smoke_mode == 'both' }}
        env:
          ASSET_FACTORY_SMOKE_READONLY: 'true'
          ASSET_FACTORY_BASE_URL: ${{ steps.target.outputs.base_url }}
        run: npm run smoke:website

      - name: Authenticated smoke
        if: ${{ inputs.smoke_mode == 'authenticated' || inputs.smoke_mode == 'both' }}
        env:
          ASSET_FACTORY_BASE_URL: ${{ steps.target.outputs.base_url }}
          ASSET_FACTORY_API_KEY: ${{ secrets.ASSET_FACTORY_API_KEY }}
          ASSET_FACTORY_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_BEARER_TOKEN }}
          ASSET_FACTORY_OTHER_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_OTHER_BEARER_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ASSET_FACTORY_TENANT_ID: ${{ steps.target.outputs.tenant_id }}
          ASSET_FACTORY_OTHER_TENANT_ID: ${{ steps.target.outputs.other_tenant_id }}
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            npm run smoke:prod
          else
            npm run smoke:staging
          fi

      - name: Write release evidence
        if: always()
        shell: bash
        run: |
          mkdir -p release-evidence
          cat > "release-evidence/asset-factory-${{ inputs.environment }}-${GITHUB_RUN_ID}.md" <<EOF
          # Asset Factory ${{ inputs.environment }} deployment evidence

          This artifact is a workflow run summary, not final completion-lock evidence. Copy concrete run details from this artifact into a completed docs/release-evidence/YYYY-MM-DD-environment.md file before attempting production lock.

          - Evidence artifact type: workflow run summary (not final completion-lock evidence)
          - Repository: ${GITHUB_REPOSITORY}
          - Commit: ${GITHUB_SHA}
          - Workflow run: ${GITHUB_RUN_ID}
          - Workflow run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Environment: ${{ inputs.environment }}
          - Base URL: ${{ steps.target.outputs.base_url }}
          - Deploy requested: ${{ inputs.deploy }}
          - Smoke mode: ${{ inputs.smoke_mode }}
          - Deploy command: npm run deploy:studio
          - Local fallback disabled: true
          - Auth required: true
          - API key required: true
          - Two-token support isolation smoke required: true
          - Node runtime: 22
          - Java runtime: 21
          - Final evidence template: docs/templates/ASSET_FACTORY_RELEASE_EVIDENCE.md
          - Final evidence path: docs/release-evidence/YYYY-MM-DD-environment.md
          - Final validator command: npm run check:release-evidence -- docs/release-evidence/YYYY-MM-DD-environment.md
          - Latest evidence validator command: npm run check:release-evidence:latest

          ## Gate status

          - Doctor gate requested: true
          - Launch readiness gate requested: true
          - Completion lock gate requested: true
          - Local verification gate requested: true
          - Deploy workflow gate requested: true
          - Read-only smoke requested: ${{ inputs.smoke_mode == 'readonly' || inputs.smoke_mode == 'both' }}
          - Authenticated smoke requested: ${{ inputs.smoke_mode == 'authenticated' || inputs.smoke_mode == 'both' }}

          ## Required follow-up

          Attach this artifact to the release issue, copy concrete evidence into docs/release-evidence/YYYY-MM-DD-environment.md, validate that final evidence file, and only update the completion lock after staging and production evidence pass.
          EOF

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-factory-${{ inputs.environment }}-evidence-${{ github.run_id }}
          path: release-evidence/*.md
