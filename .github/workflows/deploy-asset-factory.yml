name: Deploy Asset Factory

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - production
      deploy:
        description: Run firebase deploy before smoke tests
        required: true
        type: boolean
        default: false
      smoke_mode:
        description: Smoke mode to run after optional deploy
        required: true
        type: choice
        options:
          - readonly
          - authenticated
          - both
        default: readonly

jobs:
  deploy-and-smoke:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install dependencies
        run: |
          npm install
          npm --prefix engine install
          npm --prefix functions install
          npm --prefix life-map-pipeline/functions install
          npm --prefix assetfactory-studio install

      - name: Launch gates
        run: |
          npm run doctor
          npm run test:launch-readiness
          npm run test:completion-lock
          npm run verify:local

      - name: Install Firebase CLI
        if: ${{ inputs.deploy }}
        run: npm install -g firebase-tools

      - name: Deploy Firebase
        if: ${{ inputs.deploy }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npm run deploy:firebase -- --token "$FIREBASE_TOKEN"

      - name: Read-only smoke
        if: ${{ inputs.smoke_mode == 'readonly' || inputs.smoke_mode == 'both' }}
        env:
          ASSET_FACTORY_SMOKE_READONLY: 'true'
          ASSET_FACTORY_BASE_URL: ${{ inputs.environment == 'production' && 'https://www.uraiassetfactory.com' || 'https://staging.uraiassetfactory.com' }}
        run: npm run smoke:website

      - name: Authenticated smoke
        if: ${{ inputs.smoke_mode == 'authenticated' || inputs.smoke_mode == 'both' }}
        env:
          ASSET_FACTORY_BASE_URL: ${{ inputs.environment == 'production' && 'https://www.uraiassetfactory.com' || 'https://staging.uraiassetfactory.com' }}
          ASSET_FACTORY_API_KEY: ${{ secrets.ASSET_FACTORY_API_KEY }}
          ASSET_FACTORY_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_BEARER_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ASSET_FACTORY_TENANT_ID: smoke-tenant-a
          ASSET_FACTORY_OTHER_TENANT_ID: smoke-tenant-b
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            npm run smoke:prod
          else
            npm run smoke:staging
          fi
