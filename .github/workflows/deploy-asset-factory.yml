name: Verify Deployed Asset Factory

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Existing deployed target to verify
        required: true
        type: choice
        options:
          - staging
          - production
      smoke_mode:
        description: Smoke mode to run against the existing deployment
        required: true
        type: choice
        options:
          - readonly
          - authenticated
          - both
        default: readonly

permissions:
  contents: read

concurrency:
  group: asset-factory-${{ inputs.environment }}-smoke-${{ github.sha }}
  cancel-in-progress: false

jobs:
  verify-deployed-target:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'asset-factory-production' || 'staging' }}
    env:
      ACTIONS_STEP_DEBUG: 'true'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ASSET_FACTORY_FORCE_LOCAL: 'false'
      ASSET_FACTORY_REQUIRE_API_KEY: 'true'
      ASSET_FACTORY_REQUIRE_AUTH: 'true'
    steps:
      - name: Checkout exact dispatch commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact clean dispatch identity and smoke-only boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
          test "${{ inputs.environment }}" = staging -o "${{ inputs.environment }}" = production
          test "${{ inputs.smoke_mode }}" = readonly -o "${{ inputs.smoke_mode }}" = authenticated -o "${{ inputs.smoke_mode }}" = both

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Print runtime versions
        run: |
          node --version
          npm --version

      - name: Install root dependencies
        run: npm install

      - name: Install engine dependencies
        run: npm --prefix engine install

      - name: Install functions dependencies
        run: npm --prefix functions install

      - name: Install LifeMap dependencies
        run: npm --prefix life-map-pipeline/functions install

      - name: Install Studio dependencies
        run: npm --prefix assetfactory-studio install

      - name: Doctor gate
        run: npm run doctor

      - name: Launch readiness gate
        run: npm run test:launch-readiness

      - name: Completion lock gate
        run: npm run test:completion-lock

      - name: Local verification gate
        run: npm run verify:local

      - name: Deploy workflow boundary gate
        run: node scripts/check-deploy-workflow.mjs

      - name: Resolve existing target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.environment }}" = production ]; then
            echo "base_url=https://urai-4dc1d.web.app" >> "$GITHUB_OUTPUT"
            echo "tenant_id=prod-smoke" >> "$GITHUB_OUTPUT"
            echo "other_tenant_id=prod-smoke-denied" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://staging.uraiassetfactory.com" >> "$GITHUB_OUTPUT"
            echo "tenant_id=smoke-tenant-a" >> "$GITHUB_OUTPUT"
            echo "other_tenant_id=smoke-tenant-b" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate authenticated smoke secrets
        if: ${{ inputs.smoke_mode == 'authenticated' || inputs.smoke_mode == 'both' }}
        shell: bash
        env:
          ASSET_FACTORY_API_KEY: ${{ secrets.ASSET_FACTORY_API_KEY }}
          ASSET_FACTORY_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_BEARER_TOKEN }}
          ASSET_FACTORY_OTHER_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_OTHER_BEARER_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          missing=0
          for name in ASSET_FACTORY_API_KEY ASSET_FACTORY_BEARER_TOKEN ASSET_FACTORY_OTHER_BEARER_TOKEN CRON_SECRET; do
            if [ -z "${!name}" ]; then
              echo "Missing required authenticated smoke secret: $name"
              missing=1
            fi
          done
          test "$missing" -eq 0

      - name: Read-only smoke
        if: ${{ inputs.smoke_mode == 'readonly' || inputs.smoke_mode == 'both' }}
        env:
          ASSET_FACTORY_SMOKE_READONLY: 'true'
          ASSET_FACTORY_BASE_URL: ${{ steps.target.outputs.base_url }}
        run: npm run smoke:website

      - name: Authenticated smoke
        if: ${{ inputs.smoke_mode == 'authenticated' || inputs.smoke_mode == 'both' }}
        env:
          ASSET_FACTORY_BASE_URL: ${{ steps.target.outputs.base_url }}
          ASSET_FACTORY_API_KEY: ${{ secrets.ASSET_FACTORY_API_KEY }}
          ASSET_FACTORY_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_BEARER_TOKEN }}
          ASSET_FACTORY_OTHER_BEARER_TOKEN: ${{ secrets.ASSET_FACTORY_OTHER_BEARER_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ASSET_FACTORY_TENANT_ID: ${{ steps.target.outputs.tenant_id }}
          ASSET_FACTORY_OTHER_TENANT_ID: ${{ steps.target.outputs.other_tenant_id }}
        run: |
          if [ "${{ inputs.environment }}" = production ]; then
            npm run smoke:prod
          else
            npm run smoke:staging
          fi

      - name: Write smoke evidence
        if: always()
        shell: bash
        run: |
          mkdir -p release-evidence
          cat > "release-evidence/asset-factory-${{ inputs.environment }}-smoke-${GITHUB_RUN_ID}.md" <<EOF
          # Asset Factory ${{ inputs.environment }} smoke evidence

          This artifact verifies an existing deployment. It performs no Firebase deployment and is not final completion-lock evidence.

          - Repository: ${GITHUB_REPOSITORY}
          - Commit: ${GITHUB_SHA}
          - Workflow run: ${GITHUB_RUN_ID}
          - Workflow run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Environment: ${{ inputs.environment }}
          - Base URL: ${{ steps.target.outputs.base_url }}
          - Smoke mode: ${{ inputs.smoke_mode }}
          - Deployment performed: false
          - Production deploy workflow: Asset Factory Production Readiness
          - Production deploy confirmation: DEPLOY_ASSET_FACTORY
          - Production deploy environment: asset-factory-production
          - Final evidence template: docs/templates/ASSET_FACTORY_RELEASE_EVIDENCE.md
          - Final evidence path: docs/release-evidence/YYYY-MM-DD-environment.md
          - Final validator command: npm run check:release-evidence -- docs/release-evidence/YYYY-MM-DD-environment.md

          ## Gate status

          - Exact dispatch commit checked: true
          - Working tree clean: true
          - Deploy workflow boundary checked: true
          - Read-only smoke requested: ${{ inputs.smoke_mode == 'readonly' || inputs.smoke_mode == 'both' }}
          - Authenticated smoke requested: ${{ inputs.smoke_mode == 'authenticated' || inputs.smoke_mode == 'both' }}
          - Firebase mutation allowed: false

          ## Required follow-up

          Attach this smoke artifact to the release issue. Production deployment remains a separate explicitly confirmed operation in Asset Factory Production Readiness.
          EOF

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-factory-${{ inputs.environment }}-smoke-${{ github.sha }}-${{ github.run_id }}
          path: release-evidence/*.md
