name: Authorized Small Multimodal Batch

on:
  workflow_dispatch:
    inputs:
      version:
        description: Canonical version to generate in this batch
        required: true
        type: choice
        options: [v1, v2, v3, v4, v5]
        default: v1
      expected_sha:
        description: Exact Asset Factory commit authorized for paid execution
        required: true
        type: string
      confirm:
        description: Type AUTHORIZE_URAI_20USD_BATCH to authorize this paid batch
        required: true
        default: NO
        type: string
      resume_run_id:
        description: Optional successful compatible batch run ID to resume
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: authorized-small-multimodal-batch-${{ inputs.version }}
  cancel-in-progress: false

env:
  APPROVAL_ID: urai-small-batch-2026-07-11
  AUTHORIZATION_REVISION: '5'
  URAI_VERSION: ${{ inputs.version }}
  AUTHORIZED_HEAD_SHA: ${{ inputs.expected_sha }}
  ASSET_RENDERER_PROVIDER: openai
  ASSET_RENDERER_MODE: provider
  ASSET_RENDERER_MODEL: gpt-image-1.5
  ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
  ASSET_RENDERER_MAX_ATTEMPTS: '1'
  ASSET_RENDERER_MAX_PROMPT_CHARS: '12000'
  ASSET_FORGE_REQUIRE_PROVIDER: '1'
  ASSET_QUALITY_REQUIRE_PROVIDER: '1'
  ASSET_FORGE_PAID_RUN_AUTHORIZED: '1'
  ASSET_FORGE_MAX_ROUNDS: '1'
  ASSET_FORGE_BATCH_MAX_PROVIDER_CALLS: '50'
  ASSET_FORGE_MAX_UNIT_COST_USD: '0.30'
  ASSET_FORGE_BATCH_MAX_COST_USD: '15.00'
  ASSET_FORGE_SKIP_EXISTING_OUTPUTS: '1'
  ASSET_FORGE_RUN_ID: ${{ github.run_id }}-${{ inputs.version }}-small-batch
  ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/artifacts/budget/paid-request-state.json
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  forge-and-package:
    if: inputs.confirm == 'AUTHORIZE_URAI_20USD_BATCH'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: paid-asset-generation

    steps:
      - name: Check out exact authorized head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate exact paid-execution authority
        shell: bash
        run: |
          set -euo pipefail
          test '${{ inputs.confirm }}' = 'AUTHORIZE_URAI_20USD_BATCH'
          test -n "$OPENAI_API_KEY"
          ACTUAL_SHA="$(git rev-parse HEAD)"
          test "$ACTUAL_SHA" = "$AUTHORIZED_HEAD_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
          case "$AUTHORIZED_HEAD_SHA" in
            *[!0-9a-f]*|'') echo '::error::expected_sha must be a lowercase full commit SHA'; exit 1 ;;
          esac
          test "${#AUTHORIZED_HEAD_SHA}" -eq 40
          echo "ASSET_FACTORY_EXACT_HEAD=$ACTUAL_SHA" >> "$GITHUB_ENV"

      - name: Install visual forge dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Restore and verify a prior compatible batch
        if: inputs.resume_run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RESUME_RUN_ID: ${{ inputs.resume_run_id }}
        shell: bash
        run: |
          set -euo pipefail
          case "$RESUME_RUN_ID" in
            ''|*[!0-9]*) echo '::error::resume_run_id must be numeric'; exit 1 ;;
          esac

          run_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RESUME_RUN_ID}")
          RUN_JSON="$run_json" python - <<'PY'
          import json
          import os

          run = json.loads(os.environ['RUN_JSON'])
          if run.get('name') != 'Authorized Small Multimodal Batch':
              raise SystemExit('resume source must be the authorized batch workflow')
          if run.get('event') != 'workflow_dispatch':
              raise SystemExit('resume source must be a manual workflow_dispatch run')
          if run.get('repository', {}).get('full_name') != os.environ['GITHUB_REPOSITORY']:
              raise SystemExit('resume source belongs to another repository')
          if run.get('status') != 'completed' or run.get('conclusion') != 'success':
              raise SystemExit('resume source must be a completed successful run')
          if run.get('head_sha') != os.environ['AUTHORIZED_HEAD_SHA']:
              raise SystemExit('resume source head does not match the exact authorized head')
          PY

          mkdir -p artifacts/resume
          gh run download "$RESUME_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "authorized-small-batch-${RESUME_RUN_ID}" \
            --dir artifacts/resume

          python - <<'PY'
          import hashlib
          import json
          import os
          import shutil
          from pathlib import Path

          root = Path('artifacts/resume')
          metadata_path = root / 'batch-metadata.json'
          checksums_path = root / 'checksums.json'
          if not metadata_path.is_file() or not checksums_path.is_file():
              raise SystemExit('resume artifact is missing metadata or checksums')

          metadata = json.loads(metadata_path.read_text(encoding='utf-8'))
          expected = {
              'schemaVersion': '1.1.0',
              'workflow': 'Authorized Small Multimodal Batch',
              'repository': os.environ['GITHUB_REPOSITORY'],
              'headSha': os.environ['AUTHORIZED_HEAD_SHA'],
              'version': os.environ['URAI_VERSION'],
              'approvalId': os.environ['APPROVAL_ID'],
              'authorizationRevision': os.environ['AUTHORIZATION_REVISION'],
          }
          for key, value in expected.items():
              if metadata.get(key) != value:
                  raise SystemExit(f'resume metadata mismatch for {key}')

          declared = json.loads(checksums_path.read_text(encoding='utf-8'))
          if declared.get('schemaVersion') != '1.0.0' or not isinstance(declared.get('files'), dict):
              raise SystemExit('unsupported resume checksum manifest')
          actual = {}
          for path in sorted(p for p in root.rglob('*') if p.is_file() and p != checksums_path):
              actual[str(path.relative_to(root))] = hashlib.sha256(path.read_bytes()).hexdigest()
          if actual != declared['files']:
              raise SystemExit('resume artifact checksum set does not match exact package contents')

          source = root / 'image_asset_generator'
          for directory in ('assets', 'manifests/generated', 'spatial_handoff'):
              candidate = source / directory
              if candidate.is_dir():
                  shutil.copytree(candidate, Path('image_asset_generator') / directory, dirs_exist_ok=True)
          for candidate in source.glob('*.json'):
              shutil.copy2(candidate, Path('image_asset_generator') / candidate.name)
          print('resume package verified and restored')
          PY
          echo "RESTORED_BATCH_RUN_ID=$RESUME_RUN_ID" >> "$GITHUB_ENV"

      - name: Validate inventory and derive conservative batch limits
        shell: bash
        run: |
          set -euo pipefail
          python image_asset_generator/check_canonical_version_contract.py
          mkdir -p artifacts/forge-plans artifacts/budget
          python scripts/plan_versioned_forge.py \
            --version "$URAI_VERSION" \
            --max-rounds 1 \
            --max-unit-cost-usd "$ASSET_FORGE_MAX_UNIT_COST_USD" \
            --output "artifacts/forge-plans/$URAI_VERSION.json"
          python - <<'PY'
          import json
          import os
          from decimal import Decimal
          from pathlib import Path

          version = os.environ['URAI_VERSION']
          plan = json.loads(Path(f'artifacts/forge-plans/{version}.json').read_text())
          hard_call_cap = int(os.environ['ASSET_FORGE_BATCH_MAX_PROVIDER_CALLS'])
          hard_cost_cap = Decimal(os.environ['ASSET_FORGE_BATCH_MAX_COST_USD'])
          unit = Decimal(os.environ['ASSET_FORGE_MAX_UNIT_COST_USD'])
          calls = min(hard_call_cap, int(plan['maxProviderCalls']))
          reserved = unit * calls
          if calls < 1 or reserved > hard_cost_cap:
              raise SystemExit('derived exposure violates the conservative batch ceiling')
          with Path(os.environ['GITHUB_ENV']).open('a', encoding='utf-8') as handle:
              handle.write(f'ASSET_FORGE_MAX_PROVIDER_CALLS={calls}\n')
              handle.write(f'ASSET_FORGE_MAX_COST_USD={reserved:.2f}\n')
              handle.write(f'ASSET_FORGE_LIMIT_OUTPUTS={calls}\n')
          print(f'AUTHORIZED_VERSION={version}')
          print(f'AUTHORIZED_MAX_CALLS={calls}')
          print(f'RESERVED_EXPOSURE_USD={reserved:.2f}')
          PY

      - name: Enforce bounded prompt size
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          max_chars = int(os.environ['ASSET_RENDERER_MAX_PROMPT_CHARS'])
          version = os.environ['URAI_VERSION']
          catalog = json.loads(Path('image_asset_generator/canonical_version_catalog.json').read_text())
          manifest = Path('image_asset_generator') / catalog['versions'][version]['manifest']
          entries = json.loads(manifest.read_text())
          oversized = [
              (item.get('name'), len(str(item.get('prompt', ''))))
              for item in entries
              if len(str(item.get('prompt', ''))) > max_chars
          ]
          if oversized:
              raise SystemExit(f'prompt character ceiling exceeded: {oversized[:5]}')
          PY

      - name: Generate one bounded version batch
        id: batch
        shell: bash
        run: |
          set -uo pipefail
          set +e
          python image_asset_generator/forge_versioned.py --version "$URAI_VERSION" 2>&1 | tee artifacts/batch-forge.log
          forge_exit=${PIPESTATUS[0]}
          set -e

          complete=false
          batch_status=failed
          if [ "$forge_exit" -eq 0 ]; then
            complete=true
            batch_status=complete
          elif [ -f "$ASSET_FORGE_BUDGET_STATE_PATH" ]; then
            read -r calls reserved <<EOF_LEDGER
          $(python - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path(os.environ['ASSET_FORGE_BUDGET_STATE_PATH']).read_text())
          print(data['providerCallsExecuted'], data['reservedEstimatedCostUsd'])
          PY
          )
          EOF_LEDGER
            if [ "$calls" -eq "$ASSET_FORGE_MAX_PROVIDER_CALLS" ]; then
              batch_status=partial-budget-exhausted
              echo "Batch stopped at ${calls} reserved calls and USD ${reserved}; resume from run ${GITHUB_RUN_ID}."
            else
              echo '::error::Forge failed before reaching the configured batch boundary.'
              exit "$forge_exit"
            fi
          else
            echo '::error::Forge failed without a budget ledger.'
            exit "$forge_exit"
          fi

          echo "complete=$complete" >> "$GITHUB_OUTPUT"
          echo "status=$batch_status" >> "$GITHUB_OUTPUT"
          echo "forge_exit=$forge_exit" >> "$GITHUB_OUTPUT"

      - name: Technically validate the complete selected version
        if: steps.batch.outputs.complete == 'true'
        run: python image_asset_generator/certify_version_handoff.py --version "$URAI_VERSION"

      - name: Emit rights blocking verdict
        if: steps.batch.outputs.complete == 'true'
        run: python multimodal/validate_rights.py

      - name: Build non-approving creative review package
        if: steps.batch.outputs.complete == 'true'
        run: |
          python scripts/build_creative_review.py
          python scripts/build_contact_sheets.py

      - name: Build immutable resumable package
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          package=artifacts/batch-package
          rm -rf "$package"
          mkdir -p "$package/image_asset_generator" "$package/artifacts"

          for directory in assets manifests/generated spatial_handoff; do
            if [ -d "image_asset_generator/$directory" ]; then
              mkdir -p "$package/image_asset_generator/$(dirname "$directory")"
              rsync -a "image_asset_generator/$directory" "$package/image_asset_generator/$(dirname "$directory")/"
            fi
          done
          for file in \
            image_asset_generator/manifest.json \
            image_asset_generator/upgrade_feedback.json \
            "image_asset_generator/quality_report_${URAI_VERSION}.json" \
            "image_asset_generator/forge_receipt_${URAI_VERSION}.json" \
            "image_asset_generator/dropin_receipt_${URAI_VERSION}.json"; do
            [ -f "$file" ] && cp "$file" "$package/image_asset_generator/"
          done
          [ -d creative-review ] && rsync -a creative-review "$package/"
          [ -d artifacts/budget ] && rsync -a artifacts/budget "$package/artifacts/"
          [ -d artifacts/forge-plans ] && rsync -a artifacts/forge-plans "$package/artifacts/"
          [ -f artifacts/batch-forge.log ] && cp artifacts/batch-forge.log "$package/artifacts/"
          [ -f multimodal/rights-validation-report.json ] && cp multimodal/rights-validation-report.json "$package/"
          cp multimodal/rights-ledger.json "$package/"

          BATCH_STATUS='${{ steps.batch.outputs.status || 'failed-before-forge' }}' \
          BATCH_COMPLETE='${{ steps.batch.outputs.complete || 'false' }}' \
          PACKAGE="$package" python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['PACKAGE'])
          metadata = {
              'schemaVersion': '1.1.0',
              'workflow': 'Authorized Small Multimodal Batch',
              'repository': os.environ['GITHUB_REPOSITORY'],
              'runId': int(os.environ['GITHUB_RUN_ID']),
              'headSha': os.environ['ASSET_FACTORY_EXACT_HEAD'],
              'version': os.environ['URAI_VERSION'],
              'approvalId': os.environ['APPROVAL_ID'],
              'authorizationRevision': os.environ['AUTHORIZATION_REVISION'],
              'operationalSpendGoalUsd': '20.00',
              'reservationCeilingUsd': os.environ['ASSET_FORGE_BATCH_MAX_COST_USD'],
              'resumeSourceRunId': os.environ.get('RESTORED_BATCH_RUN_ID'),
              'batchStatus': os.environ['BATCH_STATUS'],
              'complete': os.environ['BATCH_COMPLETE'] == 'true',
              'promotionAttempted': False,
              'claimBoundary': 'Generated outputs are not certified or promotion-eligible without separate rights and exact-hash human review clearance.',
          }
          (root / 'batch-metadata.json').write_text(json.dumps(metadata, indent=2) + '\n')
          files = {}
          for path in sorted(p for p in root.rglob('*') if p.is_file() and p.name != 'checksums.json'):
              files[str(path.relative_to(root))] = hashlib.sha256(path.read_bytes()).hexdigest()
          (root / 'checksums.json').write_text(json.dumps({'schemaVersion': '1.0.0', 'files': files}, indent=2) + '\n')
          PY

      - name: Upload resumable outputs and immutable receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authorized-small-batch-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: error
          path: artifacts/batch-package/**

      - name: Write batch summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Authorized small multimodal batch'
            echo "- Exact head: $ASSET_FACTORY_EXACT_HEAD"
            echo "- Version: $URAI_VERSION"
            echo "- Status: ${{ steps.batch.outputs.status || 'failed-before-forge' }}"
            echo '- Reservation ceiling: USD 15.00'
            echo "- Resume source: ${RESTORED_BATCH_RUN_ID:-none}"
            echo '- Promotion attempted: no'
            echo '- Claim boundary: technical output only; separate rights and human review clearance is mandatory.'
            if [ -f "$ASSET_FORGE_BUDGET_STATE_PATH" ]; then
              python - <<'PY'
          import json
          import os
          from pathlib import Path
          data = json.loads(Path(os.environ['ASSET_FORGE_BUDGET_STATE_PATH']).read_text())
          print(f"- Provider calls reserved: {data['providerCallsExecuted']}")
          print(f"- Reserved estimated cost: USD {data['reservedEstimatedCostUsd']}")
          PY
            fi
          } >> "$GITHUB_STEP_SUMMARY"
