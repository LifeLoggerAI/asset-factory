name: Asset Factory CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify canonical build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install root dependencies
        run: npm ci || npm install

      - name: Install functions dependencies
        run: npm --prefix functions ci || npm --prefix functions install

      - name: Install LifeMap adapter dependencies
        run: npm --prefix life-map-pipeline/functions ci || npm --prefix life-map-pipeline/functions install

      - name: Install Studio dependencies
        run: npm --prefix assetfactory-studio ci || npm --prefix assetfactory-studio install

      - name: Runtime and documentation guards
        run: npm run lint

      - name: Functions checks
        run: npm --prefix functions test

      - name: LifeMap adapter build
        run: npm --prefix life-map-pipeline/functions run build

      - name: Studio typecheck
        run: npm --prefix assetfactory-studio run typecheck

      - name: Studio local tests
        run: npm --prefix assetfactory-studio test

      - name: Studio build
        run: npm --prefix assetfactory-studio run build
