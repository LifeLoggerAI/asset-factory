name: CI

on:
  push:
    branches: [main, production-hardening-asset-factory]
  pull_request:
    branches: [main]

jobs:
  root:
    name: Root orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies
        run: npm install
      - name: Build root packages
        run: npm run build
      - name: Test root packages
        run: npm test

  engine:
    name: Engine tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine dependencies
        run: npm install
      - name: Test engine
        run: npm test

  studio:
    name: Asset Factory Studio checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assetfactory-studio
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Studio dependencies
        run: npm install
      - name: Lint Studio
        run: npm run lint
      - name: Typecheck Studio
        run: npm run typecheck
      - name: Test Studio
        run: npm test
      - name: Build Studio
        run: npm run build
      - name: E2E Studio local fallback
        run: npm run e2e
        env:
          ASSET_FACTORY_FORCE_LOCAL: 'true'
          ASSET_FACTORY_MEDIA_PROVIDER: local-proof

  functions:
    name: Firebase functions checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install functions dependencies
        run: npm install
      - name: Build functions
        run: npm run build
      - name: Test functions
        run: npm test

  lifemap:
    name: LifeMap functions checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: life-map-pipeline/functions
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: life-map-pipeline/functions/package-lock.json
      - name: Install LifeMap dependencies
        run: npm install
      - name: Build LifeMap functions
        run: npm run build
      - name: Test LifeMap functions
        run: npm test