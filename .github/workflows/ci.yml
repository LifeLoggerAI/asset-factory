name: CI

on:
  push:
    branches: [main, production-hardening-asset-factory]
  pull_request:
    branches: [main]

jobs:
  root:
    name: Root orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install root dependencies
        run: npm install
      - name: Build root packages
        run: npm run build
      - name: Test root packages
        run: npm test

  studio:
    name: Asset Factory Studio
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assetfactory-studio
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: assetfactory-studio/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  engine:
    name: Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: engine/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Test
        run: npm test

  functions:
    name: Firebase functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: life-map-pipeline/functions
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: life-map-pipeline/functions/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
