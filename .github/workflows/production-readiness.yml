name: Asset Factory Production Readiness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '.github/asset-forge-triggers/**'
  workflow_dispatch:

concurrency:
  group: asset-factory-production-readiness-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, typecheck, and verify
    runs-on: ${{ github.event_name == 'pull_request' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            life-map-pipeline/functions/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install engine dependencies
        run: npm --prefix engine install

      - name: Install legacy functions dependencies
        run: npm --prefix functions install

      - name: Install deploy functions dependencies
        run: npm --prefix life-map-pipeline/functions install

      - name: Install Studio dependencies
        run: npm --prefix assetfactory-studio install

      - name: Fetch main for doctor
        run: git fetch origin main:refs/remotes/origin/main

      - name: Doctor
        env:
          ASSET_FACTORY_DOCTOR_SKIP_HEAD_MATCH: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
        run: npm run doctor --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

      - name: Launch readiness
        run: npm run test:launch-readiness --if-present

      - name: Non-blocking dependency audit
        run: npm run audit:all

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      ASSET_FACTORY_BASE_URL: https://urai-4dc1d.web.app
    steps:
      - name: Require Firebase service account
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON == ''
        run: |
          echo "FIREBASE_SERVICE_ACCOUNT secret is not configured."
          echo "Add it in GitHub repo Settings -> Secrets and variables -> Actions before production deploy."
          exit 1

      - name: Checkout
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: npm install -g firebase-tools

      - name: Install dependencies
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: |
          npm install
          npm --prefix functions install
          npm --prefix life-map-pipeline/functions install

      - name: Build
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: npm run build

      - name: Write service account
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --project urai-4dc1d --only hosting,functions,firestore,storage

      - name: Smoke production finalization endpoints
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: npm run smoke:production-finalization
