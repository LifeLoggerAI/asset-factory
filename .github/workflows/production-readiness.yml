name: Asset Factory Production Readiness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Build, typecheck, and verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            life-map-pipeline/functions/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install functions dependencies
        run: npm --prefix life-map-pipeline/functions install

      - name: Doctor
        run: npm run doctor --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

      - name: Launch readiness
        run: npm run test:launch-readiness --if-present

  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Stop if Firebase service account is missing
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON == ''
        run: |
          echo "FIREBASE_SERVICE_ACCOUNT secret is not configured; skipping deploy."
          exit 0

      - name: Checkout
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: npm install -g firebase-tools

      - name: Install dependencies
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: |
          npm install
          npm --prefix life-map-pipeline/functions install

      - name: Build
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: npm run build

      - name: Write service account
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --project urai-4dc1d --only hosting,functions,firestore,storage

      - name: Smoke health endpoint
        if: env.FIREBASE_SERVICE_ACCOUNT_JSON != ''
        run: npm run smoke:website --if-present
