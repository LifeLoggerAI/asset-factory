name: One-Time V1 Integrity Lifecycle Repair

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/one-time-v1-integrity-lifecycle-repair.yml

permissions:
  contents: write

concurrency:
  group: asset-factory-v1-integrity-lifecycle-repair-20260715
  cancel-in-progress: false

jobs:
  repair:
    if: >-
      github.actor == github.repository_owner &&
      github.run_attempt == 1 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'fix/v1-mobile-deep-space-contract-20260715'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_BRANCH: fix/v1-mobile-deep-space-contract-20260715
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.HEAD_SHA }}
          fetch-depth: 2
          persist-credentials: true
          show-progress: false

      - name: Repair exact marker lifecycle block and self-delete
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = 'pull_request'
          test "$GITHUB_HEAD_REF" = "$TARGET_BRANCH"
          test "$GITHUB_ACTOR" = "$GITHUB_REPOSITORY_OWNER"
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$HEAD_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"

          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/v1-aaa-spatial-pack-integrity.yml')
          source = path.read_text()
          old = '''          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            test ! -e "$marker"
          else
            parent="$(git rev-parse "$GITHUB_SHA^1")"
            if git diff --name-only --no-renames "$parent" "$GITHUB_SHA" | grep -Fxq "$marker"; then
              python3 scripts/validate_v1_marker_commit.py \
                --commit "$GITHUB_SHA" \
                --marker "$marker"
            fi
          fi
'''
          expression = '$' + '{{ github.event.pull_request.base.sha }}'
          new = f'''          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            base='{expression}'
            test -n "$base"
            git fetch --no-tags --depth=1 origin "$base"
            test -f "$marker"
            git diff --exit-code --no-renames "$base" "$expected" -- "$marker"
          else
            parent="$(git rev-parse "$GITHUB_SHA^1")"
            if git diff --name-only --no-renames "$parent" "$GITHUB_SHA" | grep -Fxq "$marker"; then
              python3 scripts/validate_v1_marker_commit.py \
                --commit "$GITHUB_SHA" \
                --marker "$marker"
            fi
          fi
'''
          if source.count(old) != 1:
              raise SystemExit('Expected marker lifecycle block must occur exactly once')
          path.write_text(source.replace(old, new, 1))
          PY

          git add -- '.github/workflows/v1-aaa-spatial-pack-integrity.yml'
          git rm -- '.github/workflows/one-time-v1-integrity-lifecycle-repair.yml'

          python3 - <<'PY'
          import subprocess
          expected = sorted([
              '.github/workflows/one-time-v1-integrity-lifecycle-repair.yml',
              '.github/workflows/v1-aaa-spatial-pack-integrity.yml',
          ])
          actual = sorted(subprocess.check_output(
              ['git', 'diff', '--cached', '--name-only'], text=True
          ).splitlines())
          if actual != expected:
              raise SystemExit(f'Unexpected staged paths: {actual}')
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(v1): preserve immutable marker across unrelated PRs'
          git push origin "HEAD:$TARGET_BRANCH"
