name: V1 AAA Spatial Pack Post-Certification

on:
  workflow_run:
    workflows: [One-Time V1 AAA Spatial Pack Marker]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: v1-aaa-spatial-post-certification-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  record-not-executed:
    if: github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Record certification not executed
        env:
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          mkdir -p post-certification
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          report = {
              'schemaVersion': '2.0.0',
              'sourceRunId': int(os.environ['SOURCE_RUN_ID']),
              'sourceHeadSha': os.environ['SOURCE_HEAD_SHA'],
              'sourceConclusion': os.environ['SOURCE_CONCLUSION'],
              'status': 'not-executed',
              'reason': 'source generation workflow did not conclude successfully',
              'handoffAssetsChecked': 0,
              'directProviderAssetsChecked': 0,
              'derivedProviderAssetsChecked': 0,
              'duplicatePairs': [],
              'errors': [],
          }
          Path('post-certification/v1-spatial-duplicate-report.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, indent=2, sort_keys=True))
          PY
      - name: Upload not-executed receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: urai-v1-spatial-post-certification-${{ github.event.workflow_run.id }}
          retention-days: 30
          if-no-files-found: error
          path: post-certification/*.json

  verify-generated-pack:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout current verification code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false
      - name: Initialize fail-closed certification receipt
        env:
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          mkdir -p post-certification
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          report = {
              'schemaVersion': '2.0.0',
              'sourceRunId': int(os.environ['SOURCE_RUN_ID']),
              'sourceHeadSha': os.environ['SOURCE_HEAD_SHA'],
              'sourceConclusion': os.environ['SOURCE_CONCLUSION'],
              'status': 'error',
              'reason': 'verification did not complete',
              'handoffAssetsChecked': 0,
              'directProviderAssetsChecked': 0,
              'derivedProviderAssetsChecked': 0,
              'duplicatePairs': [],
              'errors': ['verification did not complete'],
          }
          Path('post-certification/v1-spatial-duplicate-report.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
      - name: Download exact generation artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/generated-pack"
          curl --fail-with-body --location --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/artifacts?per_page=100" \
            --output "$RUNNER_TEMP/artifacts.json"
          artifact_id="$(python3 - "$RUNNER_TEMP/artifacts.json" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1], encoding='utf-8'))
          matches = [
              artifact for artifact in data.get('artifacts', [])
              if artifact.get('name', '').startswith('urai-v1-aaa-spatial-pack-')
              and not artifact.get('expired')
          ]
          assert len(matches) == 1, matches
          print(matches[0]['id'])
          PY
          )"
          curl --fail-with-body --location --silent --show-error \
            -H 'Accept: application/octet-stream' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" \
            --output "$RUNNER_TEMP/generated-pack.zip"
          unzip -q "$RUNNER_TEMP/generated-pack.zip" -d "$RUNNER_TEMP/generated-pack"
          echo "GENERATED_PACK_ROOT=$RUNNER_TEMP/generated-pack" >> "$GITHUB_ENV"
          echo "SOURCE_ARTIFACT_ID=$artifact_id" >> "$GITHUB_ENV"
      - name: Install verification dependency
        run: python3 -m pip install -r image_asset_generator/requirements.txt
      - name: Verify source binding and perceptual uniqueness
        env:
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          python3 image_asset_generator/post_certify_v1_spatial_pack.py \
            --root "$GENERATED_PACK_ROOT" \
            --source-conclusion "$SOURCE_CONCLUSION" \
            --source-run-id "$SOURCE_RUN_ID" \
            --source-head-sha "$SOURCE_HEAD_SHA" \
            --source-artifact-id "$SOURCE_ARTIFACT_ID" \
            --output post-certification/v1-spatial-duplicate-report.json
      - name: Upload independent post-certification report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: urai-v1-spatial-post-certification-${{ github.event.workflow_run.id }}
          retention-days: 30
          if-no-files-found: error
          path: post-certification/*.json
