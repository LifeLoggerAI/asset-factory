name: V1 AAA Spatial Pack Post-Certification

on:
  workflow_run:
    workflows: [One-Time V1 AAA Spatial Pack Marker]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: v1-aaa-spatial-post-certification-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  verify-generated-pack:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout current verification code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Download exact generation artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/generated-pack"
          curl --fail-with-body --location --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/artifacts?per_page=100" \
            --output "$RUNNER_TEMP/artifacts.json"
          artifact_id="$(python3 - "$RUNNER_TEMP/artifacts.json" <<'PY'
          import json, sys
          data = json.load(open(sys.argv[1]))
          matches = [a for a in data.get('artifacts', []) if a.get('name', '').startswith('urai-v1-aaa-spatial-pack-')]
          assert len(matches) == 1, matches
          print(matches[0]['id'])
          PY
          )"
          curl --fail-with-body --location --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" \
            --output "$RUNNER_TEMP/generated-pack.zip"
          unzip -q "$RUNNER_TEMP/generated-pack.zip" -d "$RUNNER_TEMP/generated-pack"
          echo "GENERATED_PACK_ROOT=$RUNNER_TEMP/generated-pack" >> "$GITHUB_ENV"
          echo "SOURCE_ARTIFACT_ID=$artifact_id" >> "$GITHUB_ENV"

      - name: Install verification dependency
        run: python3 -m pip install -r image_asset_generator/requirements.txt

      - name: Verify source-to-handoff proof and perceptual uniqueness
        shell: bash
        env:
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          from PIL import Image

          def file_sha(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def pixel_sha(image: Image.Image) -> str:
              digest = hashlib.sha256()
              digest.update(f"{image.mode}:{image.width}x{image.height}\n".encode())
              digest.update(image.tobytes())
              return digest.hexdigest()

          root = Path(os.environ['GENERATED_PACK_ROOT']).resolve()
          assert root.is_dir() and not root.is_symlink()
          for candidate in root.rglob('*'):
              assert not candidate.is_symlink(), candidate

          manifest_paths = list(root.rglob('manifests/generated/v1.manifest.json'))
          quality_paths = list(root.rglob('quality_report_v1.json'))
          receipt_paths = list(root.rglob('forge_receipt_v1.json'))
          dropin_paths = list(root.rglob('dropin_receipt_v1.json'))
          handoff_paths = list(root.rglob('spatial_handoff/assets/urai/final/manifests/v1-asset-factory-spatial-handoff.json'))
          generic_paths = list(root.rglob('spatial_handoff/assets/urai/final/manifests/asset-factory-spatial-handoff.json'))
          assert all(len(paths) == 1 for paths in (manifest_paths, quality_paths, receipt_paths, dropin_paths, handoff_paths, generic_paths))

          manifest_path = manifest_paths[0]
          base = manifest_path.parents[2]
          handoff_manifest_path = handoff_paths[0]
          handoff_root = handoff_manifest_path.parents[4]
          manifest = json.loads(manifest_path.read_text())
          quality = json.loads(quality_paths[0].read_text())
          receipt = json.loads(receipt_paths[0].read_text())
          dropin = json.loads(dropin_paths[0].read_text())
          handoff = json.loads(handoff_manifest_path.read_text())
          generic = json.loads(generic_paths[0].read_text())

          assert os.environ['SOURCE_CONCLUSION'] == 'success'
          assert len(manifest) == 53
          assert quality.get('status') == 'passed' and quality.get('failed') == 0
          assert receipt.get('status') == 'passed' and receipt.get('forgeExitCode') == 0
          assert receipt.get('newProviderCalls') == 47
          assert receipt.get('ready') == 53 and receipt.get('missing') == 0
          assert dropin.get('status') == 'certified' and dropin.get('ready') == 53
          assert handoff == generic
          assert handoff.get('sourceBinding') == 'lossless-webp-decoded-pixel-sha256'
          assert handoff.get('ready') == 53 and handoff.get('missing') == 0
          assert len(handoff.get('assets', [])) == 53

          handoff_by_name = {asset['name']: asset for asset in handoff['assets']}
          direct_records = []
          handoff_records = []
          for entry in manifest:
              name = entry['name']
              size = max(int(v) for v in entry['sizes'])
              source_path = (base / entry['path_template'].format(size=size)).resolve()
              metadata_path = source_path.with_suffix(source_path.suffix + '.render.json')
              assert source_path.is_file() and metadata_path.is_file()
              assert not source_path.is_symlink() and not metadata_path.is_symlink()
              source_path.relative_to(base.resolve())
              metadata = json.loads(metadata_path.read_text())
              details = metadata.get('metadata') or {}

              asset = handoff_by_name[name]
              assert asset['status'] == 'ready' and asset['renderer'] == 'provider'
              assert asset['sourcePath'] == str(source_path.relative_to(base))
              assert asset['sourceSha256'] == file_sha(source_path)
              assert asset['sourceMetadataSha256'] == file_sha(metadata_path)
              assert asset['encoding'] == {'format': 'WEBP', 'lossless': True, 'method': 6}
              handoff_path = (handoff_root / asset['canonicalPath']).resolve()
              handoff_path.relative_to(handoff_root.resolve())
              assert handoff_path.is_file() and not handoff_path.is_symlink()
              assert asset['sha256'] == file_sha(handoff_path)
              assert asset['bytes'] == handoff_path.stat().st_size

              mode = 'RGBA' if asset['alpha'] else 'RGB'
              with Image.open(source_path) as source_image:
                  source_image.load()
                  source_image = source_image.convert(mode)
                  source_pixels = pixel_sha(source_image)
                  source_size = source_image.size
              with Image.open(handoff_path) as handoff_image:
                  handoff_image.load()
                  handoff_image = handoff_image.convert(mode)
                  handoff_pixels = pixel_sha(handoff_image)
                  handoff_size = handoff_image.size
              assert source_size == handoff_size == (asset['width'], asset['height'])
              assert source_pixels == handoff_pixels
              assert asset['sourcePixelSha256'] == source_pixels
              assert asset['handoffPixelSha256'] == handoff_pixels

              record = {
                  'name': name,
                  'sourcePath': str(source_path.relative_to(root)),
                  'sourceSha256': file_sha(source_path),
                  'sourceMetadataSha256': file_sha(metadata_path),
                  'sourcePixelSha256': source_pixels,
                  'handoffPath': str(handoff_path.relative_to(root)),
                  'handoffSha256': file_sha(handoff_path),
                  'handoffPixelSha256': handoff_pixels,
                  'canonicalPath': asset['canonicalPath'],
              }
              handoff_records.append(record)

              if details.get('provider') == 'derived-provider':
                  assert asset.get('sourceProviderRequestIds') == details.get('source_provider_request_ids')
                  continue
              assert metadata.get('renderer') == 'provider'
              request_id = details.get('provider_request_id')
              assert isinstance(request_id, str) and request_id
              assert asset.get('providerRequestId') == request_id
              with Image.open(source_path) as direct_image:
                  gray = direct_image.convert('L').resize((16, 16), Image.Resampling.LANCZOS)
                  pixels = list(gray.getdata())
              average = sum(pixels) / len(pixels)
              bits = ''.join('1' if value >= average else '0' for value in pixels)
              direct_records.append({
                  **record,
                  'category': entry.get('category'),
                  'perceptualHash': f"{int(bits, 2):064x}",
                  'providerRequestId': request_id,
              })

          duplicates = []
          for index, left in enumerate(direct_records):
              for right in direct_records[index + 1:]:
                  distance = (int(left['perceptualHash'], 16) ^ int(right['perceptualHash'], 16)).bit_count()
                  threshold = 5 if left['category'] == right['category'] else 8
                  if distance <= threshold:
                      duplicates.append({
                          'left': left['name'], 'right': right['name'],
                          'leftCategory': left['category'], 'rightCategory': right['category'],
                          'distance': distance, 'threshold': threshold,
                      })

          report = {
              'schemaVersion': '1.1.0',
              'sourceRunId': int(os.environ['SOURCE_RUN_ID']),
              'sourceHeadSha': os.environ['SOURCE_HEAD_SHA'],
              'sourceArtifactId': int(os.environ['SOURCE_ARTIFACT_ID']),
              'sourceBinding': 'lossless-webp-decoded-pixel-sha256',
              'handoffAssetsChecked': len(handoff_records),
              'directProviderAssetsChecked': len(direct_records),
              'duplicatePairs': duplicates,
              'status': 'failed' if duplicates else 'passed',
              'handoffAssets': handoff_records,
              'assets': direct_records,
          }
          output = Path('post-certification') / 'v1-spatial-duplicate-report.json'
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(report, indent=2) + '\n')
          print(json.dumps(report, indent=2))
          if duplicates:
              raise SystemExit(1)
          PY

      - name: Upload independent post-certification report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: urai-v1-spatial-post-certification-${{ github.event.workflow_run.id }}
          retention-days: 30
          if-no-files-found: warn
          path: post-certification/*.json
