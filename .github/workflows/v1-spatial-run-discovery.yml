name: V1 Spatial Pack Run Discovery

on:
  workflow_run:
    workflows:
      - V1 Safe Resume Control Validation
    types: [completed]

permissions:
  actions: read
  issues: write

concurrency:
  group: v1-safe-resume-receipt-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == 'main' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish exact merged-main validation metadata
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const issueNumber = 179
            const run = context.payload.workflow_run
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              { owner, repo, run_id: run.id, per_page: 100, filter: 'all' }
            )
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: run.id, per_page: 100 }
            )
            const expectedArtifact = `v1-safe-resume-control-${run.head_sha}`
            const receipt = artifacts.find(item => item.name === expectedArtifact)
            const lines = [
              '# Merged-Main V1 Safe-Resume Validation Receipt',
              '',
              `- Source repository: \`${run.head_repository?.full_name || 'unknown'}\``,
              `- Exact target SHA: \`${run.head_sha}\``,
              `- Branch: \`${run.head_branch}\``,
              `- Validation run: \`${run.id}\``,
              `- Event: \`${run.event}\``,
              `- Status: \`${run.status}\``,
              `- Conclusion: \`${run.conclusion || 'none'}\``,
              `- Attempt: \`${run.run_attempt || 'unknown'}\``,
              `- URL: ${run.html_url}`,
              `- Publisher run: \`${context.runId}\``,
              `- Recorded: \`${new Date().toISOString()}\``,
              '- Publisher operation: read-only Actions metadata lookup plus update of this receipt issue',
              '- Provider call, spend, generation, promotion, deployment, secret mutation, billing action, or production-data mutation by publisher: **none**',
              '',
              '## Jobs from all attempts',
              ''
            ]
            if (jobs.length === 0) lines.push('- No jobs returned.')
            for (const job of jobs) {
              lines.push(`- \`${job.id}\` **${job.name}** — attempt \`${job.run_attempt || 'unknown'}\`, status \`${job.status}\`, conclusion \`${job.conclusion || 'none'}\``)
              for (const step of job.steps || []) {
                lines.push(`  - ${step.number}. ${step.name}: \`${step.status}\` / \`${step.conclusion || 'none'}\``)
              }
            }
            lines.push('', '## Artifacts', '')
            if (artifacts.length === 0) lines.push('- No artifacts returned.')
            for (const artifact of artifacts) {
              lines.push(`- \`${artifact.id}\` **${artifact.name}** — digest \`${artifact.digest || 'unavailable'}\`, expired \`${artifact.expired}\`, bytes \`${artifact.size_in_bytes}\`, created \`${artifact.created_at}\``)
            }
            lines.push(
              '',
              '## Gate',
              '',
              `- Expected exact-SHA receipt: \`${expectedArtifact}\``,
              `- Exact receipt present: **${Boolean(receipt)}**`,
              `- Validation successful: **${run.conclusion === 'success'}**`,
              '- Paid execution remains blocked unless the successful exact-SHA receipt is independently inspected and all separate billing, environment, credential, generation, certification, promotion, and deployment gates are satisfied.'
            )
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              title: `[${String(run.conclusion || 'unknown').toUpperCase()}] Merged-Main V1 Safe-Resume Receipt`,
              body: lines.join('\n').slice(0, 65000),
            })
