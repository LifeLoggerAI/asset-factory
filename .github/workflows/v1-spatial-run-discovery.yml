name: V1 Spatial Pack Run Discovery

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/v1-spatial-run-discovery.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: v1-spatial-pack-run-discovery
  cancel-in-progress: true

jobs:
  discover:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Record exact historical run metadata
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const markerSha = 'bdf2cd003bf16ed621cdcdc63312c75ce5e5d5e5'
            const issueNumber = 179
            const markerWorkflowName = 'One-Time V1 AAA Spatial Pack Marker'
            const postWorkflowName = 'V1 AAA Spatial Pack Post-Certification'

            const allRuns = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, head_sha: markerSha, per_page: 100 }
            )

            const relevantRuns = allRuns
              .filter(run => [markerWorkflowName, postWorkflowName].includes(run.name))
              .sort((left, right) => Number(left.id) - Number(right.id))

            const runRecords = []
            for (const run of relevantRuns) {
              const jobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                { owner, repo, run_id: run.id, per_page: 100, filter: 'latest' }
              )
              const artifacts = await github.paginate(
                github.rest.actions.listWorkflowRunArtifacts,
                { owner, repo, run_id: run.id, per_page: 100 }
              )
              runRecords.push({ run, jobs, artifacts })
            }

            const lines = [
              '# V1 Spatial Pack Run Discovery Receipt',
              '',
              `- Marker commit: \`${markerSha}\``,
              `- Discovery recorded: \`${new Date().toISOString()}\``,
              `- Matching historical runs: **${runRecords.length}**`,
              '- Operation: read-only Actions metadata discovery',
              '- Re-run requested: **no**',
              '- Provider request made by discovery: **no**',
              '- Promotion or deployment: **no**',
              '',
            ]

            if (runRecords.length === 0) {
              lines.push(
                '## Result',
                '',
                'No GitHub Actions run with the marker or post-certification workflow name was returned for the exact marker commit.',
                '',
                'This does not prove that no platform event was created; it records only what the repository Actions API returned at discovery time.'
              )
            }

            for (const { run, jobs, artifacts } of runRecords) {
              lines.push(
                `## ${run.name} — run ${run.id}`,
                '',
                `- Event: \`${run.event}\``,
                `- Status: \`${run.status}\``,
                `- Conclusion: \`${run.conclusion ?? 'none'}\``,
                `- Run attempt: \`${run.run_attempt ?? 'unknown'}\``,
                `- Head SHA: \`${run.head_sha}\``,
                `- Created: \`${run.created_at}\``,
                `- Updated: \`${run.updated_at}\``,
                `- URL: ${run.html_url}`,
                '',
                '### Jobs',
                ''
              )
              if (jobs.length === 0) {
                lines.push('- No jobs returned.')
              } else {
                for (const job of jobs) {
                  lines.push(
                    `- \`${job.id}\` **${job.name}** — status \`${job.status}\`, conclusion \`${job.conclusion ?? 'none'}\`, runner \`${job.runner_name || 'unassigned'}\``
                  )
                  for (const step of job.steps || []) {
                    lines.push(
                      `  - ${step.number}. ${step.name}: \`${step.status}\` / \`${step.conclusion ?? 'none'}\``
                    )
                  }
                }
              }
              lines.push('', '### Artifacts', '')
              if (artifacts.length === 0) {
                lines.push('- No artifacts returned.')
              } else {
                for (const artifact of artifacts) {
                  lines.push(
                    `- \`${artifact.id}\` **${artifact.name}** — expired \`${artifact.expired}\`, bytes \`${artifact.size_in_bytes}\`, created \`${artifact.created_at}\``
                  )
                }
              }
              lines.push('')
            }

            lines.push(
              '## Evidence boundary',
              '',
              'A run status or artifact name alone does not prove provider billing, quality, completeness, or certification. Provider-call and asset claims require inspection of the uploaded budget ledger, forge receipt, quality report, handoff receipt, and post-certification report.'
            )

            const body = lines.join('\n').slice(0, 65000)
            const marker = runRecords.find(record => record.run.name === markerWorkflowName)
            const state = marker
              ? `${marker.run.status}${marker.run.conclusion ? `/${marker.run.conclusion}` : ''}`
              : 'not-found'

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              title: `[${state.toUpperCase()}] V1 Spatial Pack Run Discovery Receipt`,
              body,
            })
