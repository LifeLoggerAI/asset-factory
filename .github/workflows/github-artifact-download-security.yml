name: GitHub Artifact Credential Isolation

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/github-artifact-download-security.yml
      - .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume.yml
      - .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-2.yml
      - .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-3.yml
      - .github/workflows/v1-aaa-spatial-pack-post-certification.yml
      - .github/workflows/v1-safe-resume-control-validation.yml
      - authorizations/execute-v1-aaa-spatial-pack-safe-resume-20260711.json
      - authorizations/execute-v1-aaa-spatial-pack-safe-resume-2-20260711.json
      - image_asset_generator/check_v1_safe_resume_history.py
      - image_asset_generator/check_v1_safe_resume_history_core.py
      - scripts/github_artifact_download.py
      - scripts/test-github-artifact-download.py
      - scripts/test-v1-safe-resume-preflight.py
      - scripts/v1_safe_resume_preflight.py
      - docs/release-evidence/URAI-AF-20260711-V1-RESUME-CREDENTIAL-ISOLATION-001.md
  push:
    branches: [main]
    paths:
      - .github/workflows/github-artifact-download-security.yml
      - .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-3.yml
      - .github/workflows/v1-aaa-spatial-pack-post-certification.yml
      - .github/workflows/v1-safe-resume-control-validation.yml
      - scripts/github_artifact_download.py
      - scripts/test-github-artifact-download.py
      - scripts/test-v1-safe-resume-preflight.py
      - scripts/v1_safe_resume_preflight.py
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: artifact-credential-isolation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify redirect credential isolation
    runs-on: macos-latest
    timeout-minutes: 15
    env:
      PYTHONPYCACHEPREFIX: /tmp/urai-security-pycache-${{ github.run_id }}
    steps:
      - name: Checkout exact reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Prove exact head and clean tree
        env:
          EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test -z "$(git status --porcelain)"

      - name: Compile and execute security regressions
        run: |
          python3 -m py_compile scripts/github_artifact_download.py scripts/test-github-artifact-download.py scripts/test-v1-safe-resume-preflight.py scripts/v1_safe_resume_preflight.py
          python3 scripts/test-github-artifact-download.py
          python3 scripts/test-v1-safe-resume-preflight.py

      - name: Verify consumed and vulnerable paths are absent
        run: |
          set -euo pipefail
          test ! -e .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume.yml
          test ! -e .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-2.yml
          test -f .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-3.yml
          test ! -e authorizations/execute-v1-aaa-spatial-pack-safe-resume-20260711.json
          test ! -e authorizations/execute-v1-aaa-spatial-pack-safe-resume-2-20260711.json
          test ! -e authorizations/execute-v1-aaa-spatial-pack-safe-resume-3-20260711.json
          test ! -e image_asset_generator/check_v1_safe_resume_history.py
          test ! -e image_asset_generator/check_v1_safe_resume_history_core.py

      - name: Verify v3 is separately authorized and credential-isolated
        run: |
          python3 - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-3.yml').read_text()
          for marker in (
              'authorizations/execute-v1-aaa-spatial-pack-safe-resume-3-20260711.json',
              'bdf2cd003bf16ed621cdcdc63312c75ce5e5d5e5',
              'de27f2f36aa1ca73d504e5dffed99161078fb0c8',
              '4dc05a67746e189054609e405ca3801683ab5445',
              '0cf837d585d3d1c1d8e171938037098c72230c22',
              'scripts/test-github-artifact-download.py',
              'scripts/v1_safe_resume_preflight.py',
              'scripts/github_artifact_download.py',
              '--extract-basename home-threshold-main_1600.png',
              'home-threshold-main_1600.png.render.json',
              'environment: paid-asset-generation',
              "ASSET_FORGE_MAX_PROVIDER_CALLS: '47'",
              "ASSET_FORGE_MAX_COST_USD: '47.00'",
          ):
              assert marker in workflow, marker
          assert 'curl --fail-with-body --location' not in workflow
          assert 'unzip -q' not in workflow
          before_execute, execute_section = workflow.split('\n  execute:\n', 1)
          assert 'secrets.' not in before_execute
          execute_job, execute_steps = execute_section.split('\n    steps:\n', 1)
          assert 'secrets.' not in execute_job
          secret_names = (
              'OPENAI_API_KEY',
              'ASSET_RENDERER_ENDPOINT',
              'ASSET_RENDERER_API_KEY',
              'ASSET_RENDERER_MODEL',
              'ASSET_RENDERER_AUTH_HEADER',
              'ASSET_RENDERER_AUTH_SCHEME',
          )
          for name in secret_names:
              marker = name + ': ' + '$' + '{{ secrets.' + name + ' }}'
              assert execute_steps.count(marker) == 2, (marker, execute_steps.count(marker))
          download = execute_steps.split('- name: Download and safely extract proven provider-backed Home seed', 1)[1].split('- name: Install image dependencies', 1)[0]
          install = execute_steps.split('- name: Install image dependencies', 1)[1].split('- name: Preflight provider and Spatial contract', 1)[0]
          assert 'secrets.' not in download
          assert 'secrets.' not in install
          assert 'home-threshold-main_1600.png.render.json' in download
          PY

      - name: Verify post-certification download and extraction isolation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/v1-aaa-spatial-pack-post-certification.yml').read_text()
          for marker in ('from scripts.github_artifact_download import github_api_json','scripts/github_artifact_download.py','--extract-all-directory','--max-extracted-bytes 67108864','--max-total-extracted-bytes 536870912','--max-members 4096'):
              assert marker in workflow, marker
          assert 'curl --fail-with-body --location' not in workflow
          assert 'unzip -q' not in workflow
          assert 'Authorization: Bearer' not in workflow
          PY

      - name: Verify validation uses the safe inspector and complete history
        run: |
          python3 - <<'PY'
          from pathlib import Path
          validation = Path('.github/workflows/v1-safe-resume-control-validation.yml').read_text()
          assert 'python image_asset_generator/check_v1_safe_resume_history.py' not in validation
          assert 'python3 image_asset_generator/check_v1_safe_resume_history.py' not in validation
          assert 'scripts/v1_safe_resume_preflight.py' in validation
          assert 'scripts/test-v1-safe-resume-preflight.py' in validation
          assert '0cf837d585d3d1c1d8e171938037098c72230c22' in validation
          assert '.github/workflows/v1-aaa-spatial-pack-post-certification.yml' in validation
          PY

      - name: Verify authenticated and storage requests are separated
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('scripts/github_artifact_download.py').read_text()
          assert 'class NoRedirect' in source
          assert 'storage_request = urllib.request.Request' in source
          storage = source.split('storage_request = urllib.request.Request', 1)[1].split('with urllib.request.urlopen', 1)[0]
          assert 'Authorization' not in storage
          assert 'X-GitHub-Api-Version' not in storage
          for marker in ('parsed.scheme != "https"','extract_unique_member_by_basename','extract_all_regular_files','_safe_member_parts','max_total_bytes','file_type != stat.S_IFREG','_portable_path_key'):
              assert marker in source, marker
          PY

      - name: Final clean-tree proof
        run: test -z "$(git status --porcelain)"
