name: Image Asset Validation

on:
  pull_request:
    paths:
      - "image_asset_generator/**"
      - "package.json"
      - ".github/workflows/image-asset-generator.yml"
  push:
    branches:
      - main
    paths:
      - "image_asset_generator/**"
      - "package.json"
      - ".github/workflows/image-asset-generator.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "No-cost action to run"
        required: true
        type: choice
        options:
          - VALIDATE_ONLY
          - BUILD_LOCAL_PACK
        default: VALIDATE_ONLY
      confirm:
        description: "Type BUILD_LOCAL_PACK only when selecting that action"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: image-asset-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-contract:
    name: Validate manifests and canonical version contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Verify canonical V1-V5 contract
        run: python image_asset_generator/check_canonical_version_contract.py

      - name: Validate active manifest schema
        run: python image_asset_generator/validate_manifest.py

      - name: Compile generator sources
        run: python -m compileall -q image_asset_generator

  build-local-pack:
    name: Build local/offline asset pack
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'BUILD_LOCAL_PACK' &&
      github.event.inputs.confirm == 'BUILD_LOCAL_PACK'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ASSET_RENDERER_MODE: offline
      ASSET_FORGE_REQUIRE_PROVIDER: "0"
      ASSET_QUALITY_REQUIRE_PROVIDER: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Build local pack without provider credentials
        run: python image_asset_generator/run_pipeline.py

      - name: Upload local-only artifact
        uses: actions/upload-artifact@v4
        with:
          name: urai-local-image-asset-pack-${{ github.run_id }}
          retention-days: 7
          if-no-files-found: error
          path: |
            image_asset_generator/asset_pack.zip
            image_asset_generator/preview.html
            image_asset_generator/validation_report.json
            image_asset_generator/firebase_seed.json
