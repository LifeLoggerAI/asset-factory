name: Dispatch One Paid V1 Asset Smoke Call

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact current main SHA authorized for this one-call smoke
        required: true
        type: string
      approval_id:
        description: Non-secret approval or receipt identifier
        required: true
        type: string
      confirm:
        description: Type AUTHORIZE_ONE_PAID_V1_SMOKE
        required: true
        default: NO_PAID_CALL
        type: string

permissions:
  contents: read

concurrency:
  group: asset-factory-one-paid-v1-smoke
  cancel-in-progress: false

jobs:
  dispatch-one-paid-call:
    if: inputs.confirm == 'AUTHORIZE_ONE_PAID_V1_SMOKE'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: paid-asset-generation
    permissions:
      actions: write
      contents: read
    steps:
      - name: Validate exact manual authorization
        shell: bash
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
          APPROVAL_ID: ${{ inputs.approval_id }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_REPOSITORY" = LifeLoggerAI/asset-factory
          test "$GITHUB_REF" = refs/heads/main
          [[ "$TARGET_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$TARGET_SHA" = "$GITHUB_SHA"
          test -n "$APPROVAL_ID"
          test '${{ inputs.confirm }}' = AUTHORIZE_ONE_PAID_V1_SMOKE
          {
            echo '### Paid V1 smoke authorization'
            echo "- target SHA: $TARGET_SHA"
            echo "- approval ID: $APPROVAL_ID"
            echo '- maximum provider calls: 1'
            echo '- maximum total cost: USD 0.10'
            echo '- promotion: disabled'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch one tightly bounded provider call
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'canonical-version-forge.yml',
              ref: 'main',
              inputs: {
                version: 'v1',
                confirm: 'GENERATE_CANONICAL_VERSION',
                rounds: '1',
                max_provider_calls: '1',
                max_unit_cost_usd: '0.10',
                max_total_cost_usd: '0.10',
                limit_entries: '1',
                limit_outputs: '1',
                skip_existing: 'false',
                promote: 'false'
              }
            })
