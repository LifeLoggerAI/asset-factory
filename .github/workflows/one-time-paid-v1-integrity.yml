name: One-Time Paid V1 Integrity

on:
  pull_request:
    paths:
      - .github/workflows/one-time-paid-v1-issue-160.yml
      - .github/workflows/one-time-paid-v1-integrity.yml
      - scripts/check-one-time-paid-v1-issue-160.py
      - docs/release-evidence/URAI-WSE-20260711-162200-ASSET-FACTORY-007.json
  push:
    branches: [main]
    paths:
      - .github/workflows/one-time-paid-v1-issue-160.yml
      - .github/workflows/one-time-paid-v1-integrity.yml
      - scripts/check-one-time-paid-v1-issue-160.py
      - docs/release-evidence/URAI-WSE-20260711-162200-ASSET-FACTORY-007.json

permissions:
  contents: read

concurrency:
  group: one-time-paid-v1-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-one-time-executor:
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact candidate identity
        shell: bash
        run: |
          set -euo pipefail
          expected='${{ github.event.pull_request.head.sha || github.sha }}'
          test "$(git rev-parse HEAD)" = "$expected"
          test -z "$(git status --porcelain)"
          echo "- verified candidate SHA: $expected" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify one-time issue-bound authority
        run: python3 scripts/check-one-time-paid-v1-issue-160.py
