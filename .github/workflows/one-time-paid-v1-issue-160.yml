name: One-Time Authorized V1 Provider Smoke

on:
  issues:
    types: [edited]

permissions:
  contents: read

concurrency:
  group: one-time-paid-v1-smoke-issue-160
  cancel-in-progress: false

jobs:
  authorize:
    if: >-
      github.event.issue.number == 160 &&
      github.event.issue.user.login == github.repository_owner &&
      github.event.sender.login == github.repository_owner &&
      github.event.issue.title == '[EXECUTE ONE PAID V1 SMOKE] URAI-ISSUE-160'
    runs-on: macos-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    outputs:
      target_sha: ${{ steps.validate.outputs.target_sha }}
    steps:
      - name: Validate exact issue-bound authorization
        id: validate
        shell: bash
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = issues
          test '${{ github.event.action }}' = edited
          test "$GITHUB_REPOSITORY" = LifeLoggerAI/asset-factory
          test "$GITHUB_REF" = refs/heads/main
          test '${{ github.event.issue.number }}' = '160'
          test '${{ github.event.issue.user.login }}' = "$GITHUB_REPOSITORY_OWNER"
          test '${{ github.event.sender.login }}' = "$GITHUB_REPOSITORY_OWNER"
          test "$ISSUE_TITLE" = '[EXECUTE ONE PAID V1 SMOKE] URAI-ISSUE-160'
          test "$(printf '%s\n' "$ISSUE_BODY" | grep -c '^TARGET_SHA=')" = '1'
          target_sha="$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^TARGET_SHA=//p')"
          [[ "$target_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$target_sha" = "$GITHUB_SHA"
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'CONFIRM=AUTHORIZE_ONE_PAID_V1_SMOKE'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'MAX_PROVIDER_CALLS=1'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'MAX_UNIT_COST_USD=1.00'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'MAX_TOTAL_COST_USD=1.00'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'LIMIT_ENTRIES=1'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'LIMIT_OUTPUTS=1'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'PROMOTE=false'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'EXECUTION_NONCE=URAI-ISSUE-160-ONE-TIME-V1'
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          {
            echo '### One-time paid V1 authorization accepted'
            echo "- issue: #160"
            echo "- target main SHA: $target_sha"
            echo '- maximum provider calls: 1'
            echo '- maximum total cost: USD 1.00'
            echo '- entries: 1'
            echo '- outputs: 1'
            echo '- promotion: false'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lock authorization against retrigger
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          TARGET_SHA: ${{ steps.validate.outputs.target_sha }}
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              title: `[EXECUTION STARTED — RUN ${context.runId}] One paid V1 smoke`
            })
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `One-time paid V1 smoke accepted. Run \`${context.runId}\`; exact main SHA \`${process.env.TARGET_SHA}\`; hard maximum one provider call and USD 1.00; promotion disabled.`
            })

  execute:
    needs: authorize
    runs-on: macos-latest
    timeout-minutes: 60
    environment: paid-asset-generation
    permissions:
      contents: read
    env:
      URAI_VERSION: v1
      ASSET_RENDERER_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
      ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
      ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
      ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
      ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
      ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
      ASSET_RENDERER_MODE: provider
      ASSET_RENDERER_MAX_ATTEMPTS: '1'
      ASSET_FORGE_REQUIRE_PROVIDER: '1'
      ASSET_QUALITY_REQUIRE_PROVIDER: '1'
      ASSET_FORGE_PAID_RUN_AUTHORIZED: '1'
      ASSET_FORGE_MAX_ROUNDS: '1'
      ASSET_FORGE_MAX_PROVIDER_CALLS: '1'
      ASSET_FORGE_MAX_UNIT_COST_USD: '1.00'
      ASSET_FORGE_MAX_COST_USD: '1.00'
      ASSET_FORGE_LIMIT_ENTRIES: '1'
      ASSET_FORGE_LIMIT_OUTPUTS: '1'
      ASSET_FORGE_RUN_ID: ${{ github.run_id }}-v1-issue-160
      ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/artifacts/budget/paid-request-state.json
    steps:
      - name: Checkout exact authorized main source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.authorize.outputs.target_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact source and one-time limits
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = issues
          test "$GITHUB_REF" = refs/heads/main
          test "$(git rev-parse HEAD)" = '${{ needs.authorize.outputs.target_sha }}'
          test -z "$(git status --porcelain)"
          test "$ASSET_FORGE_MAX_PROVIDER_CALLS" = '1'
          test "$ASSET_FORGE_MAX_UNIT_COST_USD" = '1.00'
          test "$ASSET_FORGE_MAX_COST_USD" = '1.00'
          test "$ASSET_FORGE_LIMIT_ENTRIES" = '1'
          test "$ASSET_FORGE_LIMIT_OUTPUTS" = '1'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Validate provider and bounded plan
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ASSET_RENDERER_API_KEY" ]; then
            echo '::error::OPENAI_API_KEY or ASSET_RENDERER_API_KEY is required.'
            exit 1
          fi
          python image_asset_generator/check_canonical_version_contract.py
          mkdir -p artifacts/forge-plans artifacts/budget
          python scripts/plan_versioned_forge.py \
            --version v1 \
            --max-rounds 1 \
            --max-unit-cost-usd 1.00 \
            --output artifacts/forge-plans/v1-issue-160.json

      - name: Execute one provider-backed V1 smoke output
        run: python image_asset_generator/forge_versioned.py --version v1

      - name: Upload paid smoke evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: urai-paid-v1-smoke-issue-160-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            artifacts/forge-plans/*.json
            artifacts/budget/*.json
            image_asset_generator/manifests/generated/*.json
            image_asset_generator/quality_report*.json
            image_asset_generator/upgrade_feedback*.json
            image_asset_generator/forge_receipt*.json
            image_asset_generator/dropin_receipt*.json
            image_asset_generator/assets/**
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip

  report:
    if: always() && needs.authorize.result == 'success'
    needs: [authorize, execute]
    runs-on: macos-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Record final one-time result
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          EXECUTION_RESULT: ${{ needs.execute.result }}
          TARGET_SHA: ${{ needs.authorize.outputs.target_sha }}
        with:
          script: |
            const result = process.env.EXECUTION_RESULT
            const title = result === 'success'
              ? `[EXECUTED — RECEIPT REQUIRED — RUN ${context.runId}] One paid V1 smoke`
              : `[EXECUTION ${result.toUpperCase()} — RUN ${context.runId}] One paid V1 smoke`
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 160,
              title
            })
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 160,
              body: `One-time paid V1 smoke run \`${context.runId}\` completed with result **${result}** on exact main SHA \`${process.env.TARGET_SHA}\`. Promotion remained disabled. Inspect the run artifact before making any production claim.`
            })
