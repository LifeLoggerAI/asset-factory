name: V1 Safe Resume Control Validation

on:
  pull_request:
    paths:
      - image_asset_generator/check_v1_safe_resume_history.py
      - image_asset_generator/post_certify_v1_spatial_pack.py
      - .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-3.yml
      - .github/workflows/v1-safe-resume-control-validation.yml
      - .github/workflows/v1-aaa-spatial-pack-post-certification.yml
  push:
    branches: [main]
    paths:
      - image_asset_generator/check_v1_safe_resume_history.py
      - image_asset_generator/post_certify_v1_spatial_pack.py
      - .github/workflows/one-time-v1-aaa-spatial-pack-safe-resume-3.yml
      - .github/workflows/v1-safe-resume-control-validation.yml
      - .github/workflows/v1-aaa-spatial-pack-post-certification.yml

permissions:
  actions: read
  contents: read

concurrency:
  group: v1-safe-resume-control-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact reviewed head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prove exact source and clean tree
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ github.event.pull_request.head.sha || github.sha }}'
          test -z "$(git status --porcelain)"

      - name: Compile and self-test inspectors
        run: |
          python3 -m py_compile image_asset_generator/check_v1_safe_resume_history.py image_asset_generator/post_certify_v1_spatial_pack.py
          python3 image_asset_generator/check_v1_safe_resume_history.py --self-test

      - name: Prove historical runs contain no generation evidence
        id: inspect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 image_asset_generator/check_v1_safe_resume_history.py \
            --marker-sha bdf2cd003bf16ed621cdcdc63312c75ce5e5d5e5 \
            --marker-sha de27f2f36aa1ca73d504e5dffed99161078fb0c8 \
            --marker-sha 4dc05a67746e189054609e405ca3801683ab5445 \
            --output artifacts/preflight/v1-safe-resume-control-validation.json

      - name: Confirm no-spend proof output
        run: test '${{ steps.inspect.outputs.safe_to_execute }}' = 'true'

      - name: Upload no-spend validation receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: v1-safe-resume-control-${{ github.event.pull_request.head.sha || github.sha }}
          retention-days: 30
          if-no-files-found: error
          path: artifacts/preflight/*.json
