name: Canonical V1-V5 Provider Forge

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Canonical version to generate and certify'
        required: true
        type: choice
        options: [v1, v2, v3, v4, v5]
      confirm:
        description: 'Type GENERATE_CANONICAL_VERSION to authorize provider spending'
        required: true
        default: 'NO'
      rounds:
        description: 'Maximum quality rounds'
        required: true
        type: choice
        options: ['1', '2', '3']
        default: '1'
      max_provider_calls:
        description: 'Hard ceiling for provider HTTP attempts'
        required: true
        default: '1'
      max_unit_cost_usd:
        description: 'Maximum reserved cost per provider attempt'
        required: true
        default: '0.01'
      max_total_cost_usd:
        description: 'Hard total reserved-cost ceiling'
        required: true
        default: '0.01'
      limit_entries:
        description: 'Optional asset-entry limit; 0 means all'
        required: true
        default: '0'
      limit_outputs:
        description: 'Optional rendered-output limit; 0 means all'
        required: true
        default: '0'
      skip_existing:
        description: 'Reuse already dropped outputs instead of paying to regenerate them'
        required: true
        type: boolean
        default: true
      promote:
        description: 'Open a Spatial promotion PR after complete certification'
        required: true
        type: boolean
        default: true

concurrency:
  group: canonical-version-forge-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  URAI_VERSION: ${{ inputs.version }}
  ASSET_RENDERER_PROVIDER: openai
  ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
  ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
  ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
  ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
  ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
  ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
  ASSET_RENDERER_MODE: provider
  ASSET_RENDERER_MAX_ATTEMPTS: '1'
  ASSET_FORGE_REQUIRE_PROVIDER: '1'
  ASSET_QUALITY_REQUIRE_PROVIDER: '1'
  ASSET_FORGE_PAID_RUN_AUTHORIZED: '1'
  ASSET_FORGE_MAX_ROUNDS: ${{ inputs.rounds }}
  ASSET_FORGE_MAX_PROVIDER_CALLS: ${{ inputs.max_provider_calls }}
  ASSET_FORGE_MAX_UNIT_COST_USD: ${{ inputs.max_unit_cost_usd }}
  ASSET_FORGE_MAX_COST_USD: ${{ inputs.max_total_cost_usd }}
  ASSET_FORGE_RUN_ID: ${{ github.run_id }}-${{ inputs.version }}
  ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/artifacts/budget/paid-request-state.json
  URAI_WHEEL_GITHUB_TOKEN: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}

jobs:
  forge-certify-promote:
    if: inputs.confirm == 'GENERATE_CANONICAL_VERSION'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: paid-asset-generation
    steps:
      - name: Checkout Asset Factory
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Validate canonical inventory and authorized exposure
        shell: bash
        run: |
          test '${{ inputs.confirm }}' = 'GENERATE_CANONICAL_VERSION'
          python image_asset_generator/check_canonical_version_contract.py
          mkdir -p artifacts/forge-plans artifacts/budget
          python scripts/plan_versioned_forge.py \
            --version '${{ inputs.version }}' \
            --max-rounds '${{ inputs.rounds }}' \
            --max-unit-cost-usd '${{ inputs.max_unit_cost_usd }}' \
            --output 'artifacts/forge-plans/${{ inputs.version }}.json'
          python - <<'PY'
          import json
          from decimal import Decimal
          from pathlib import Path
          plan = json.loads(Path('artifacts/forge-plans/${{ inputs.version }}.json').read_text())
          calls = int('${{ inputs.max_provider_calls }}')
          unit = Decimal('${{ inputs.max_unit_cost_usd }}')
          total = Decimal('${{ inputs.max_total_cost_usd }}')
          if calls < 1 or unit <= 0 or total <= 0:
              raise SystemExit('All budget ceilings must be positive')
          if unit * calls > total:
              raise SystemExit('Authorized provider exposure exceeds max_total_cost_usd')
          if calls > int(plan['maxProviderCalls']):
              raise SystemExit('Provider-call ceiling exceeds the selected version exposure plan')
          print(f"AUTHORIZED_VERSION={plan['version']}")
          print(f"AUTHORIZED_MAX_CALLS={calls}")
          print(f"AUTHORIZED_MAX_COST_USD={total}")
          PY

      - name: Apply resume and smoke limits
        shell: bash
        run: |
          if [ '${{ inputs.skip_existing }}' = 'true' ]; then echo 'ASSET_FORGE_SKIP_EXISTING_OUTPUTS=1' >> "$GITHUB_ENV"; fi
          if [ '${{ inputs.limit_entries }}' != '0' ]; then echo 'ASSET_FORGE_LIMIT_ENTRIES=${{ inputs.limit_entries }}' >> "$GITHUB_ENV"; fi
          if [ '${{ inputs.limit_outputs }}' != '0' ]; then echo 'ASSET_FORGE_LIMIT_OUTPUTS=${{ inputs.limit_outputs }}' >> "$GITHUB_ENV"; fi

      - name: Provider and promotion preflight
        shell: bash
        run: |
          missing=0
          for name in ASSET_RENDERER_ENDPOINT ASSET_RENDERER_API_KEY; do
            if [ -z "${!name}" ]; then echo "::error::$name is not configured"; missing=1; fi
          done
          if [ '${{ inputs.promote }}' = 'true' ] && [ -z "$URAI_WHEEL_GITHUB_TOKEN" ]; then
            echo '::error::URAI_WHEEL_GITHUB_TOKEN is required for promotion'
            missing=1
          fi
          [ "$missing" = '0' ]

      - name: Forge selected canonical version
        run: python image_asset_generator/forge_versioned.py --version '${{ inputs.version }}'

      - name: Certify complete atomic Spatial handoff
        run: python image_asset_generator/certify_version_handoff.py --version '${{ inputs.version }}'

      - name: Upload forge, budget, and drop-in evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-canonical-version-forge-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            artifacts/forge-plans/*.json
            artifacts/budget/*.json
            image_asset_generator/manifests/generated/*.json
            image_asset_generator/quality_report*.json
            image_asset_generator/upgrade_feedback*.json
            image_asset_generator/forge_receipt*.json
            image_asset_generator/dropin_receipt*.json
            image_asset_generator/assets/**
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/spatial_handoff/**

      - name: Checkout Spatial promotion target
        if: inputs.promote == true
        uses: actions/checkout@v4
        with:
          repository: LifeLoggerAI/urai-spatial
          ref: main
          token: ${{ secrets.URAI_WHEEL_GITHUB_TOKEN }}
          path: spatial

      - name: Create certified Spatial drop-in branch
        if: inputs.promote == true
        id: promote
        shell: bash
        working-directory: spatial
        run: |
          version='${{ inputs.version }}'
          source="../image_asset_generator/spatial_handoff/assets/urai/final/manifests/${version}-asset-factory-spatial-handoff.json"
          test -f "$source"
          rsync -a ../image_asset_generator/spatial_handoff/ urai-tier1/public/
          if [ -f scripts/check-canonical-asset-dropin.mjs ]; then node scripts/check-canonical-asset-dropin.mjs; fi
          branch="asset-factory/${version}-certified-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git config user.name 'URAI Production Wheel'
          git config user.email 'urai-wheel@users.noreply.github.com'
          git add urai-tier1/public/assets/urai
          git diff --cached --quiet && { echo '::error::No certified asset changes were produced'; exit 1; }
          git commit -m "Promote certified ${version} asset drop-in"
          git push origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Open Spatial promotion pull request
        if: inputs.promote == true
        shell: bash
        env:
          BRANCH: ${{ steps.promote.outputs.branch }}
        run: |
          payload=$(python - <<'PY'
          import json, os
          version = '${{ inputs.version }}'
          print(json.dumps({
              'title': f'Promote certified {version.upper()} asset drop-in',
              'head': os.environ['BRANCH'],
              'base': 'main',
              'body': f'Promotes the complete provider-backed {version.upper()} pack after exact-count, quality, file, hash, provenance, and zero-missing handoff certification. This PR certifies only {version.upper()}.',
          }))
          PY
          )
          curl --fail-with-body -sS \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $URAI_WHEEL_GITHUB_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            https://api.github.com/repos/LifeLoggerAI/urai-spatial/pulls \
            -d "$payload" | python -m json.tool
