name: One-Time V1 AAA Spatial Pack

on:
  issues:
    types: [opened]

permissions:
  contents: read

concurrency:
  group: one-time-v1-aaa-spatial-pack-20260711
  cancel-in-progress: false

env:
  URAI_VERSION: v1
  ASSET_RENDERER_PROVIDER: openai
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
  ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
  ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
  ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
  ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
  ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
  ASSET_RENDERER_MODE: provider
  ASSET_RENDERER_MAX_ATTEMPTS: '1'
  ASSET_FORGE_REQUIRE_PROVIDER: '1'
  ASSET_QUALITY_REQUIRE_PROVIDER: '1'
  ASSET_FORGE_PAID_RUN_AUTHORIZED: '1'
  ASSET_FORGE_MAX_ROUNDS: '1'
  ASSET_FORGE_MAX_PROVIDER_CALLS: '47'
  ASSET_FORGE_MAX_UNIT_COST_USD: '1.00'
  ASSET_FORGE_MAX_COST_USD: '47.00'
  ASSET_FORGE_RUN_ID: ${{ github.run_id }}-v1-aaa-spatial-pack
  ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/artifacts/budget/paid-request-state.json

jobs:
  authorize:
    if: >-
      github.event.issue.user.login == github.repository_owner &&
      github.event.sender.login == github.repository_owner &&
      github.event.issue.title == '[EXECUTE V1 AAA SPATIAL PACK] URAI-20260711'
    runs-on: macos-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    outputs:
      target_sha: ${{ steps.validate.outputs.target_sha }}
      issue_number: ${{ steps.validate.outputs.issue_number }}
    steps:
      - name: Validate exact owner authorization and budget
        id: validate
        shell: bash
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = issues
          test '${{ github.event.action }}' = opened
          test "$GITHUB_REPOSITORY" = LifeLoggerAI/asset-factory
          test "$GITHUB_REF" = refs/heads/main
          test '${{ github.event.issue.user.login }}' = "$GITHUB_REPOSITORY_OWNER"
          test '${{ github.event.sender.login }}' = "$GITHUB_REPOSITORY_OWNER"
          test "$(printf '%s\n' "$ISSUE_BODY" | grep -c '^TARGET_SHA=')" = '1'
          target_sha="$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^TARGET_SHA=//p')"
          [[ "$target_sha" =~ ^[0-9a-f]{40}$ ]]
          test "$target_sha" = "$GITHUB_SHA"
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'CONFIRM=AUTHORIZE_URAI_V1_AAA_SPATIAL_PACK'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'MAX_NEW_PROVIDER_CALLS=47'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'MAX_UNIT_COST_USD=1.00'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'MAX_TOTAL_COST_USD=47.00'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'CANONICAL_OUTPUTS=53'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'REUSE_PROVEN_OUTPUTS=1'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'DERIVED_PROVIDER_OUTPUTS=5'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'PROMOTE=false'
          printf '%s\n' "$ISSUE_BODY" | grep -Fx 'EXECUTION_NONCE=URAI-V1-AAA-SPATIAL-20260711-ONE-TIME'
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          {
            echo '### V1 AAA Spatial pack authorization accepted'
            echo "- exact source: $target_sha"
            echo '- canonical outputs: 53'
            echo '- reused proven provider output: 1'
            echo '- maximum new provider calls: 47'
            echo '- maximum reserved exposure: USD 47.00'
            echo '- promotion and deployment: disabled'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lock one-time authorization
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          TARGET_SHA: ${{ steps.validate.outputs.target_sha }}
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              title: `[EXECUTION STARTED — RUN ${context.runId}] V1 AAA Spatial Pack`
            })
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `V1 AAA Spatial pack accepted on exact source \`${process.env.TARGET_SHA}\`. Run \`${context.runId}\`; hard maximum 47 new provider calls and USD 47.00 reserved exposure; promotion disabled.`
            })

  execute:
    needs: authorize
    runs-on: macos-latest
    timeout-minutes: 360
    environment: paid-asset-generation
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout exact authorized source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.authorize.outputs.target_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify immutable source and hard limits
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ needs.authorize.outputs.target_sha }}'
          test -z "$(git status --porcelain)"
          test "$ASSET_FORGE_MAX_PROVIDER_CALLS" = '47'
          test "$ASSET_FORGE_MAX_UNIT_COST_USD" = '1.00'
          test "$ASSET_FORGE_MAX_COST_USD" = '47.00'
          test "$ASSET_RENDERER_MAX_ATTEMPTS" = '1'
          test -z "${URAI_WHEEL_GITHUB_TOKEN:-}"

      - name: Download the proven paid Home seed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/urai-v1-home-seed"
          curl --fail-with-body --location --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/artifacts/8250466400/zip" \
            --output "$RUNNER_TEMP/urai-v1-home-seed.zip"
          unzip -q "$RUNNER_TEMP/urai-v1-home-seed.zip" -d "$RUNNER_TEMP/urai-v1-home-seed"
          test "$(find "$RUNNER_TEMP/urai-v1-home-seed" -name 'home-threshold-main_1600.png' | wc -l | tr -d ' ')" = '1'
          echo "ASSET_FORGE_SEED_DIR=$RUNNER_TEMP/urai-v1-home-seed" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Preflight source, provider, and spatial contract
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ASSET_RENDERER_API_KEY" ]; then
            echo '::error::OPENAI_API_KEY or ASSET_RENDERER_API_KEY is required.'
            exit 1
          fi
          python -m py_compile image_asset_generator/forge_v1_spatial_pack_run.py
          python image_asset_generator/check_canonical_version_contract.py
          python - <<'PY'
          import json
          from pathlib import Path
          p = json.loads(Path('image_asset_generator/spatial_prompt_overrides.json').read_text())
          required = {
              'life_map_galaxy_main', 'life_map_galaxy_mobile',
              'focus_memory_chamber_main', 'focus_memory_chamber_mobile',
              'replay_memory_film_main', 'replay_memory_film_mobile',
          }
          assert required <= set(p)
          for name in ('life_map_galaxy_main', 'life_map_galaxy_mobile'):
              prompt = p[name]['prompt'].lower()
              for forbidden in ('no ground', 'no orb', 'no avatar'):
                  assert forbidden in prompt, (name, forbidden)
          PY

      - name: Generate and certify all 53 V1 Spatial outputs
        run: python image_asset_generator/forge_v1_spatial_pack_run.py

      - name: Certify atomic Spatial handoff
        run: python image_asset_generator/certify_version_handoff.py --version v1

      - name: Upload complete generation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: urai-v1-aaa-spatial-pack-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6
          path: |
            artifacts/budget/*.json
            image_asset_generator/manifests/generated/*.json
            image_asset_generator/quality_report*.json
            image_asset_generator/upgrade_feedback*.json
            image_asset_generator/forge_receipt*.json
            image_asset_generator/dropin_receipt*.json
            image_asset_generator/assets/**
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/spatial_handoff/**

  report:
    if: always() && needs.authorize.result == 'success'
    needs: [authorize, execute]
    runs-on: macos-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Record final execution result
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          EXECUTION_RESULT: ${{ needs.execute.result }}
          TARGET_SHA: ${{ needs.authorize.outputs.target_sha }}
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue_number }}
        with:
          script: |
            const result = process.env.EXECUTION_RESULT
            const issue = Number(process.env.ISSUE_NUMBER)
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue,
              title: `[V1 AAA SPATIAL PACK ${result.toUpperCase()} — RUN ${context.runId}]`
            })
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue,
              body: `Run \`${context.runId}\` completed with result **${result}** on exact source \`${process.env.TARGET_SHA}\`. Promotion and deployment remained disabled. Inspect the uploaded pack, quality report, budget ledger, forge receipt, and drop-in receipt before production activation.`
            })
