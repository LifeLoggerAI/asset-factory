name: Provider Budget Receipts

on:
  pull_request:
    branches: [main]
    paths:
      - "image_asset_generator/paid_request_guard.py"
      - "image_asset_generator/provider_renderer.py"
      - "image_asset_generator/test_provider_budget_receipts.py"
      - ".github/workflows/provider-budget-receipts.yml"
  push:
    branches: [main]
    paths:
      - "image_asset_generator/paid_request_guard.py"
      - "image_asset_generator/provider_renderer.py"
      - "image_asset_generator/test_provider_budget_receipts.py"
      - ".github/workflows/provider-budget-receipts.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provider-budget-receipts-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r image_asset_generator/requirements.txt
      - run: python image_asset_generator/test_provider_budget_receipts.py
