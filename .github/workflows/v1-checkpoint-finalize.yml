name: V1 Checkpoint Finalize

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/v1-checkpoint-finalize.yml
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Asset Factory
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Download provider checkpoint
        uses: actions/download-artifact@v4
        with:
          name: urai-v1-aaa-forge-28619946804
          path: .v1-checkpoint
          repository: LifeLoggerAI/asset-factory
          github-token: ${{ github.token }}
          run-id: 28619946804

      - name: Restore checkpoint
        shell: bash
        run: |
          test -d .v1-checkpoint/assets/urai
          test -f .v1-checkpoint/manifest.json
          rsync -a .v1-checkpoint/assets/ image_asset_generator/assets/
          cp .v1-checkpoint/manifest.json image_asset_generator/manifest.json

      - name: Finalize V1 quality proof
        env:
          ASSET_QUALITY_REQUIRE_PROVIDER: "1"
        run: python image_asset_generator/resume_v1_checkpoint.py

      - name: Upload final checkpoint evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-v1-final-checkpoint-${{ github.run_id }}
          if-no-files-found: error
          retention-days: 30
          path: |
            image_asset_generator/quality_report.json
            image_asset_generator/upgrade_feedback.json
            image_asset_generator/forge_receipt.json
            image_asset_generator/manifest.json
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/assets/**
            image_asset_generator/spatial_handoff/**
