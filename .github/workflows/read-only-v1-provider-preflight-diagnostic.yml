name: Read-Only V1 Provider Preflight Diagnostic

on:
  push:
    branches:
      - ops/diagnose-v1-provider-preflight-20260715
    paths:
      - .github/workflows/read-only-v1-provider-preflight-diagnostic.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: asset-factory-v1-provider-preflight-diagnostic-20260715
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: paid-asset-generation
    env:
      AUTHORIZED_SOURCE_SHA: e7a748d0840d5912a1870cf7adacd90cd8db9bcb
      PYTHONPYCACHEPREFIX: /tmp/urai-v1-provider-preflight-diagnostic-${{ github.run_id }}
    steps:
      - name: Checkout exact diagnostic head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Checkout exact authorized source without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.AUTHORIZED_SOURCE_SHA }}
          path: authorized-source
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Setup Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Capture exact source-contract result
        shell: bash
        run: |
          set +e
          set -o pipefail
          evidence="$RUNNER_TEMP/v1-provider-preflight-diagnostic"
          mkdir -p "$evidence"
          (
            set -euo pipefail
            cd authorized-source
            test "$(git rev-parse HEAD)" = "$AUTHORIZED_SOURCE_SHA"
            test -z "$(git status --porcelain --untracked-files=all)"
            python -m pip install -r image_asset_generator/requirements.txt --disable-pip-version-check
            python -m py_compile \
              scripts/github_artifact_download.py \
              scripts/v1_safe_resume_preflight.py \
              scripts/validate_v1_safe_resume_v3_marker.py \
              scripts/validate_v1_marker_commit.py \
              image_asset_generator/forge_v1_spatial_pack_run.py
            python image_asset_generator/check_canonical_version_contract.py
            python - <<'PY'
          import json
          from pathlib import Path
          prompts = json.loads(Path('image_asset_generator/spatial_prompt_overrides.json').read_text())
          for name in ('life_map_galaxy_main', 'life_map_galaxy_mobile'):
              prompt = prompts[name]['prompt'].lower()
              for required in ('deep outer space', 'no ground', 'no orb', 'no avatar'):
                  assert required in prompt, (name, required)
          assert 'selecting and zooming' in prompts['focus_memory_chamber_main']['prompt'].lower()
          assert 'moving through an opened memory star' in prompts['replay_memory_film_main']['prompt'].lower()
          PY
          ) 2>&1 | tee "$evidence/source-contract.log"
          status=${PIPESTATUS[0]}
          printf '%s\n' "$status" > "$evidence/source-contract-exit.txt"
          tail -n 200 "$evidence/source-contract.log" > "$evidence/source-contract-tail.log"
          exit 0

      - name: Record protected provider-key presence without exposing or using it
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/v1-provider-preflight-diagnostic"
          configured=false
          if [ -n "${OPENAI_API_KEY:-}" ]; then configured=true; fi
          export URAI_KEY_CONFIGURED="$configured"
          python - <<'PY' > "$evidence/authority.json"
          import json, os
          print(json.dumps({
              'schemaVersion': '1.0.0',
              'repository': os.environ['GITHUB_REPOSITORY'],
              'diagnosticHead': os.environ['GITHUB_SHA'],
              'authorizedSourceSha': os.environ['AUTHORIZED_SOURCE_SHA'],
              'runId': os.environ['GITHUB_RUN_ID'],
              'paidEnvironmentEntered': True,
              'providerKeyConfigured': os.environ['URAI_KEY_CONFIGURED'] == 'true',
              'providerKeyValueReadOrPrinted': False,
              'providerCallAttempted': False,
              'generationAttempted': False,
              'spendAuthorized': False,
              'promotionAttempted': False,
              'deploymentAttempted': False,
          }, indent=2))
          PY
          unset OPENAI_API_KEY

      - name: Upload read-only diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: urai-v1-provider-preflight-diagnostic-${{ github.event.pull_request.head.sha || github.sha }}-${{ github.run_id }}
          path: ${{ runner.temp }}/v1-provider-preflight-diagnostic
          if-no-files-found: error
          retention-days: 30

      - name: Enforce diagnostic result
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/v1-provider-preflight-diagnostic"
          test "$(cat "$evidence/source-contract-exit.txt")" = '0'
          python - <<'PY'
          import json, os
          from pathlib import Path
          receipt_path = Path(os.environ['RUNNER_TEMP']) / 'v1-provider-preflight-diagnostic' / 'authority.json'
          receipt = json.loads(receipt_path.read_text())
          if receipt['providerKeyConfigured'] is not True:
              raise SystemExit('OPENAI_API_KEY is not configured in paid-asset-generation; no provider call was attempted')
          if receipt['providerCallAttempted'] or receipt['generationAttempted'] or receipt['spendAuthorized']:
              raise SystemExit('Diagnostic authority drifted beyond read-only no-spend scope')
          print('V1 provider preflight diagnostic passed without a provider call or spend.')
          PY
