name: Full Multimodal Asset Audit

on:
  pull_request:
    paths:
      - 'multimodal/**'
      - 'image_asset_generator/**'
      - '.github/workflows/full-multimodal-asset-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-multimodal-audit-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build canonical V1-V5 source manifests
        run: python image_asset_generator/check_canonical_version_contract.py
      - name: Expand full asset-level multimodal manifest
        run: python multimodal/build_full_manifest.py
      - name: Apply exact audio and film specifications
        run: python multimodal/apply_media_specs.py
      - name: Validate canonical multimodal manifest
        run: python multimodal/validate_manifest.py
      - name: Validate claimed outputs and media decoding
        run: python multimodal/validate_outputs.py
      - name: Upload immutable validation inputs and receipts
        uses: actions/upload-artifact@v4
        with:
          name: full-multimodal-manifest-validation-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            multimodal/full-multimodal-asset-manifest.json
            multimodal/validation-report.json
            multimodal/output-validation-report.json
            multimodal/source-lock.json
            multimodal/canonical-requirements.json
            multimodal/media-specifications.json

  lane-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        lane: [visual, 3d, audio, film, accessibility, runtime, governance]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Expand exact lane inventory
        run: python multimodal/build_full_manifest.py
      - name: Apply exact audio and film specifications
        run: python multimodal/apply_media_specs.py
      - name: Verify lane exists and remains fail closed
        env:
          LANE: ${{ matrix.lane }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          data = json.loads(Path('multimodal/full-multimodal-asset-manifest.json').read_text())
          assets = [a for a in data['assets'] if a['lane'] == os.environ['LANE']]
          if not assets:
              raise SystemExit(f"missing lane {os.environ['LANE']}")
          for asset in assets:
              if asset['currentStatus'] == 'certified':
                  required = [asset['checksum'], asset['qualityReport'], asset['artifactDigest'], asset['promotionPr'], asset['mergedCommitSha'], asset['releaseSha'], asset['liveVerificationEvidence']]
                  if not all(required):
                      raise SystemExit(f"false certification: {asset['assetId']}")
          print(json.dumps({'lane': os.environ['LANE'], 'assets': len(assets), 'certified': sum(a['currentStatus'] == 'certified' for a in assets)}, indent=2))
          PY
