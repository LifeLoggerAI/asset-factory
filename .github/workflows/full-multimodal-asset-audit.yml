name: Full Multimodal Asset Audit

on:
  pull_request:
    paths:
      - 'multimodal/**'
      - 'image_asset_generator/**'
      - '.github/workflows/full-multimodal-asset-audit.yml'
      - '.github/workflows/authorized-multimodal-execution.yml'
      - '.github/workflows/one-paid-v1-smoke-push.yml'
      - '.github/workflows/promote-reviewed-multimodal-batch.yml'
      - 'scripts/test-asset-factory-multimodal.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-multimodal-audit-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  ASSET_FACTORY_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  URAI_SPATIAL_ROOT: ${{ github.workspace }}/urai-spatial
  URAI_SPATIAL_LOCKED_SHA: caea44669e69d66e81439c8a5ca9bd4a76119094

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact Asset Factory head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Check out locked Spatial source
        uses: actions/checkout@v4
        with:
          repository: LifeLoggerAI/urai-spatial
          ref: ${{ env.URAI_SPATIAL_LOCKED_SHA }}
          path: urai-spatial
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify checked-out identities match source locks
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$ASSET_FACTORY_HEAD_SHA"
          test "$(git -C urai-spatial rev-parse HEAD)" = "$URAI_SPATIAL_LOCKED_SHA"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          lock = json.loads(Path('multimodal/source-lock.json').read_text())
          if lock.get('spatialMainSha') != os.environ['URAI_SPATIAL_LOCKED_SHA']:
              raise SystemExit('multimodal/source-lock.json does not match the workflow Spatial SHA')
          PY
      - name: Build canonical V1-V5 source manifests
        run: python image_asset_generator/check_canonical_version_contract.py
      - name: Expand full asset-level multimodal manifest
        run: python multimodal/build_full_manifest.py
      - name: Apply exact audio and film specifications
        run: python multimodal/apply_media_specs.py
      - name: Repair route-specific audio media mapping
        run: python multimodal/repair_audio_media_mapping.py
      - name: Apply repository-aware source provenance
        run: python multimodal/apply_source_provenance.py
      - name: Apply full lifecycle contract
        run: python multimodal/apply_lifecycle_contract.py
      - name: Validate canonical multimodal manifest
        run: python multimodal/validate_manifest.py
      - name: Validate claimed outputs across repository roots
        run: python multimodal/validate_outputs.py
      - name: Validate rights, licensing, and consent policy
        run: python multimodal/validate_rights.py
      - name: Plan paid dispatch without executing providers
        run: python multimodal/plan_paid_dispatch.py
      - name: Prove pull-request planning is blocked and zero-spend
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          plan=json.loads(Path('multimodal/paid-dispatch-plan.json').read_text())
          if plan.get('dispatchAuthorized') is not False:
              raise SystemExit('normal PR audit must never authorize paid dispatch')
          if not plan.get('authorizationBlockers'):
              raise SystemExit('blocked dispatch plan must record explicit blockers')
          budget=plan.get('budget',{})
          if budget.get('maxProviderCalls') != 0 or budget.get('plannedProviderCalls') != 0:
              raise SystemExit('unauthorized plan must expose zero provider calls')
          if budget.get('maxTotalExposureUsd') != 0:
              raise SystemExit('unauthorized plan must expose zero approved spend')
          safety=plan.get('safety',{})
          if safety.get('providerCallsMadeByPlanner') != 0 or safety.get('costUsedByPlannerUsd') != 0:
              raise SystemExit('planner must never execute or spend')
          print(json.dumps({'dispatchAuthorized':False,'providerCalls':0,'approvedSpendUsd':0,'blockers':plan['authorizationBlockers']},indent=2))
          PY
      - name: Enforce paid-batch workflow safety contract
        run: node scripts/test-asset-factory-multimodal.mjs
      - name: Upload immutable validation inputs and receipts
        uses: actions/upload-artifact@v4
        with:
          name: full-multimodal-manifest-validation-${{ github.event.pull_request.head.sha || github.sha }}
          if-no-files-found: error
          retention-days: 365
          path: |
            multimodal/full-multimodal-asset-manifest.json
            multimodal/validation-report.json
            multimodal/output-validation-report.json
            multimodal/rights-validation-report.json
            multimodal/paid-dispatch-plan.json
            multimodal/source-lock.json
            multimodal/canonical-requirements.json
            multimodal/media-specifications.json
            multimodal/provider-registry.json
            multimodal/rights-ledger.json
            multimodal/rights-ledger.schema.json

  lane-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        lane: [visual, 3d, audio, film, accessibility, runtime, governance]
    steps:
      - name: Check out exact Asset Factory head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Expand exact lane inventory
        run: python multimodal/build_full_manifest.py
      - name: Apply exact audio and film specifications
        run: python multimodal/apply_media_specs.py
      - name: Repair route-specific audio media mapping
        run: python multimodal/repair_audio_media_mapping.py
      - name: Apply repository-aware source provenance
        run: python multimodal/apply_source_provenance.py
      - name: Apply full lifecycle contract
        run: python multimodal/apply_lifecycle_contract.py
      - name: Validate governance lane
        if: matrix.lane == 'governance'
        run: python multimodal/validate_rights.py
      - name: Verify lane exists and remains fail closed
        env:
          LANE: ${{ matrix.lane }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          data = json.loads(Path('multimodal/full-multimodal-asset-manifest.json').read_text())
          assets = [a for a in data['assets'] if a['lane'] == os.environ['LANE']]
          if not assets:
              raise SystemExit(f"missing lane {os.environ['LANE']}")
          for asset in assets:
              if asset['currentStatus'] == 'certified':
                  required = [asset['checksum'], asset['qualityReport'], asset['artifactDigest'], asset['promotionPr'], asset['mergedCommitSha'], asset['releaseSha'], asset['liveVerificationEvidence']]
                  if not all(required):
                      raise SystemExit(f"false certification: {asset['assetId']}")
          print(json.dumps({'lane': os.environ['LANE'], 'assets': len(assets), 'certified': sum(a['currentStatus'] == 'certified' for a in assets)}, indent=2))
          PY
