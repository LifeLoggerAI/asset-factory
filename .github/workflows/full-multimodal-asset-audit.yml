name: Full Multimodal Asset Audit

on:
  pull_request:
    branches: [main]
    paths:
      - 'multimodal/**'
      - 'image_asset_generator/**'
      - 'creative-review/**'
      - 'assetfactory-studio/**'
      - 'scripts/build_*.py'
      - 'scripts/validate_xr_receipts.py'
      - 'scripts/audit-root-if-locked.mjs'
      - 'scripts/test-audit-root-control.mjs'
      - 'scripts/test-asset-factory-multimodal.mjs'
      - 'scripts/test-paid-provider-authorization.mjs'
      - 'scripts/test-asset-factory-core-units.mjs'
      - 'scripts/test-asset-factory-validation-import.mjs'
      - 'scripts/test-release-schema-compatibility.mjs'
      - '.github/workflows/full-multimodal-asset-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-multimodal-audit-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  ASSET_FACTORY_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  URAI_SPATIAL_ROOT: ${{ github.workspace }}/urai-spatial
  URAI_SPATIAL_LOCKED_SHA: caea44669e69d66e81439c8a5ca9bd4a76119094

jobs:
  validate-control-plane:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact Asset Factory candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact clean Asset Factory source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$ASSET_FACTORY_HEAD_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Check out locked Spatial source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: LifeLoggerAI/urai-spatial
          ref: ${{ env.URAI_SPATIAL_LOCKED_SHA }}
          path: urai-spatial
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Set up exact Node runtime
        uses: actions/setup-node@1e60f620b9541d80c77f7b4a3bcd8bf5e940c37 # v4.4.0
        with:
          node-version: '22.16.0'
          cache: ''

      - name: Install integrity-pinned TypeScript audit compiler
        shell: bash
        env:
          TYPESCRIPT_VERSION: '5.8.3'
          TYPESCRIPT_INTEGRITY: 'sha512-p1diW6TqL9L07nNxvRMM7hMMw4c5XOo/1ibL4aAIGmSAt9slTE1Xgw5KWuof2uTOvCg9BY7ZRi+GaF+7sfgPeQ=='
        run: |
          set -euo pipefail
          npm pack "typescript@$TYPESCRIPT_VERSION" --json --ignore-scripts > .typescript-pack.json
          node <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const expectedVersion = process.env.TYPESCRIPT_VERSION;
          const expectedIntegrity = process.env.TYPESCRIPT_INTEGRITY;
          const records = JSON.parse(fs.readFileSync('.typescript-pack.json', 'utf8'));
          if (!Array.isArray(records) || records.length !== 1) {
            throw new Error(`unexpected npm pack record count: ${JSON.stringify(records)}`);
          }
          const record = records[0];
          if (record.name !== 'typescript' || record.version !== expectedVersion) {
            throw new Error(`unexpected TypeScript package identity: ${record.name}@${record.version}`);
          }
          if (record.integrity !== expectedIntegrity) {
            throw new Error(`TypeScript registry integrity mismatch: ${record.integrity}`);
          }
          if (record.filename !== `typescript-${expectedVersion}.tgz` || !fs.existsSync(record.filename)) {
            throw new Error(`unexpected TypeScript tarball: ${record.filename}`);
          }
          const actualIntegrity = `sha512-${crypto.createHash('sha512').update(fs.readFileSync(record.filename)).digest('base64')}`;
          if (actualIntegrity !== expectedIntegrity) {
            throw new Error(`TypeScript tarball integrity mismatch: ${actualIntegrity}`);
          }
          fs.writeFileSync('.typescript-tarball.txt', `${record.filename}\n`);
          NODE
          typescript_tarball="$(tr -d '\r\n' < .typescript-tarball.txt)"
          npm install --global "./$typescript_tarball" --ignore-scripts --fund=false --audit=false
          test "$(tsc --version)" = "Version $TYPESCRIPT_VERSION"
          npm root --global > .npm-global-root.txt
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const globalRoot = fs.readFileSync('.npm-global-root.txt', 'utf8').trim();
          const source = path.join(globalRoot, 'typescript');
          const target = path.join('assetfactory-studio', 'node_modules', 'typescript');
          if (!path.isAbsolute(globalRoot) || !fs.existsSync(path.join(source, 'lib', 'typescript.js'))) {
            throw new Error(`invalid global TypeScript installation: ${source}`);
          }
          fs.mkdirSync(path.dirname(target), { recursive: true });
          fs.cpSync(source, target, { recursive: true, force: true });
          if (!fs.existsSync(path.join(target, 'lib', 'typescript.js'))) {
            throw new Error('failed to materialize exact local TypeScript compiler');
          }
          NODE
          rm .npm-global-root.txt .typescript-pack.json .typescript-tarball.txt "$typescript_tarball"

      - name: Verify locked Spatial identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git -C urai-spatial rev-parse HEAD)" = "$URAI_SPATIAL_LOCKED_SHA"
          python - <<'PY'
          import json, os
          from pathlib import Path
          lock = json.loads(Path('multimodal/source-lock.json').read_text())
          if lock.get('spatialMainSha') != os.environ['URAI_SPATIAL_LOCKED_SHA']:
              raise SystemExit('source-lock Spatial SHA mismatch')
          PY

      - name: Build and validate canonical control plane
        shell: bash
        run: |
          set -euo pipefail
          python image_asset_generator/check_canonical_version_contract.py
          python multimodal/build_full_manifest.py
          python multimodal/apply_media_specs.py
          python multimodal/repair_audio_media_mapping.py
          python multimodal/apply_source_provenance.py
          python multimodal/apply_lifecycle_contract.py
          python multimodal/validate_manifest.py
          python multimodal/validate_outputs.py
          python multimodal/validate_rights.py
          python multimodal/plan_paid_dispatch.py

      - name: Prove normal audit is zero-spend and fail-closed
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          plan = json.loads(Path('multimodal/paid-dispatch-plan.json').read_text())
          registry = json.loads(Path('multimodal/provider-registry.json').read_text())
          if plan.get('dispatchAuthorized') is not False:
              raise SystemExit('audit must not authorize paid dispatch')
          if plan.get('atomicLedgerConfigured') is not False:
              raise SystemExit('audit must report atomic paid ledger unavailable')
          blockers = plan.get('authorizationBlockers') or []
          if 'atomic one-time authorization and consumption ledger is not implemented' not in blockers:
              raise SystemExit('blocked plan must include the atomic ledger blocker')
          budget = plan.get('budget', {})
          if budget.get('maxProviderCalls') != 0 or budget.get('plannedProviderCalls') != 0:
              raise SystemExit('audit must expose zero provider calls')
          if budget.get('maxTotalExposureUsd') != 0:
              raise SystemExit('audit must expose zero approved spend')
          safety = plan.get('safety', {})
          if safety.get('providerCallsMadeByPlanner') != 0 or safety.get('costUsedByPlannerUsd') != 0:
              raise SystemExit('planner executed or spent')
          if safety.get('environmentOnlyAuthorizationProhibited') is not True:
              raise SystemExit('environment-only authorization must be prohibited')
          policy = registry.get('policy', {})
          if policy.get('paidRuntimeEnabled') is not False:
              raise SystemExit('provider registry must keep paid runtime disabled')
          if policy.get('atomicOneTimeLedgerRequired') is not True or policy.get('atomicOneTimeLedgerConfigured') is not False:
              raise SystemExit('provider registry atomic ledger policy is inconsistent')
          if policy.get('planningInputsCannotAuthorizeDispatch') is not True:
              raise SystemExit('provider registry must reject planning inputs as authorization')
          print(json.dumps({'dispatchAuthorized': False, 'providerCalls': 0, 'approvedSpendUsd': 0, 'atomicLedgerConfigured': False}, indent=2))
          PY
          node scripts/test-asset-factory-multimodal.mjs
          node scripts/test-paid-provider-authorization.mjs
          node scripts/test-release-schema-compatibility.mjs
          node scripts/test-audit-root-control.mjs
          node scripts/test-asset-factory-core-units.mjs
          node scripts/test-asset-factory-validation-import.mjs

      - name: Upload immutable validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: full-multimodal-control-plane-${{ github.event.pull_request.head.sha || github.sha }}
          if-no-files-found: error
          retention-days: 90
          path: |
            multimodal/full-multimodal-asset-manifest.json
            multimodal/validation-report.json
            multimodal/output-validation-report.json
            multimodal/rights-validation-report.json
            multimodal/paid-dispatch-plan.json
            multimodal/source-lock.json
            multimodal/canonical-requirements.json
            multimodal/media-specifications.json
            multimodal/provider-registry.json
            multimodal/rights-ledger.json
            multimodal/rights-ledger.schema.json
