name: One-Time V1 AAA Spatial Pack Marker

on:
  push:
    branches: [main]
    paths:
      - authorizations/execute-v1-aaa-spatial-pack-safe-resume-2-20260711.json

permissions:
  actions: read
  contents: read

concurrency:
  group: one-time-v1-aaa-spatial-pack-marker-20260711
  cancel-in-progress: false

env:
  URAI_VERSION: v1
  ASSET_RENDERER_PROVIDER: openai
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ASSET_RENDERER_ENDPOINT: ${{ secrets.ASSET_RENDERER_ENDPOINT }}
  ASSET_RENDERER_API_KEY: ${{ secrets.ASSET_RENDERER_API_KEY }}
  ASSET_RENDERER_MODEL: ${{ secrets.ASSET_RENDERER_MODEL }}
  ASSET_RENDERER_ALPHA_MODEL: gpt-image-1.5
  ASSET_RENDERER_AUTH_HEADER: ${{ secrets.ASSET_RENDERER_AUTH_HEADER }}
  ASSET_RENDERER_AUTH_SCHEME: ${{ secrets.ASSET_RENDERER_AUTH_SCHEME }}
  ASSET_RENDERER_MODE: provider
  ASSET_RENDERER_MAX_ATTEMPTS: '1'
  ASSET_FORGE_REQUIRE_PROVIDER: '1'
  ASSET_QUALITY_REQUIRE_PROVIDER: '1'
  ASSET_FORGE_PAID_RUN_AUTHORIZED: '1'
  ASSET_FORGE_MAX_ROUNDS: '1'
  ASSET_FORGE_MAX_PROVIDER_CALLS: '47'
  ASSET_FORGE_MAX_UNIT_COST_USD: '1.00'
  ASSET_FORGE_MAX_COST_USD: '47.00'
  ASSET_FORGE_RUN_ID: ${{ github.run_id }}-v1-aaa-spatial-safe-resume-2
  ASSET_FORGE_BUDGET_STATE_PATH: ${{ github.workspace }}/artifacts/budget/paid-request-state.json

jobs:
  authorize:
    if: github.actor == github.repository_owner && github.run_attempt == 1
    runs-on: macos-latest
    timeout-minutes: 10
    outputs:
      target_sha: ${{ steps.validate.outputs.target_sha }}
    steps:
      - name: Checkout exact authorization commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Validate immutable owner authorization
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          marker=authorizations/execute-v1-aaa-spatial-pack-safe-resume-2-20260711.json
          test "$GITHUB_EVENT_NAME" = push
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_ACTOR" = "$GITHUB_REPOSITORY_OWNER"
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain)"
          test -f "$marker"
          test "$(git diff-tree --no-commit-id --name-status -r "$GITHUB_SHA" | wc -l | tr -d ' ')" = '1'
          test "$(git diff-tree --no-commit-id --name-status -r "$GITHUB_SHA")" = $'A\tauthorizations/execute-v1-aaa-spatial-pack-safe-resume-2-20260711.json'
          parent="$(git rev-parse "$GITHUB_SHA^")"
          python3 - "$marker" "$parent" <<'PY'
          import json, sys
          from pathlib import Path
          actual = json.loads(Path(sys.argv[1]).read_text())
          expected = {
              'schemaVersion': '1.0.0',
              'confirm': 'AUTHORIZE_URAI_V1_AAA_SPATIAL_PACK_SAFE_RESUME_2',
              'expectedParentSha': sys.argv[2],
              'historicalMarkerShas': [
                  'bdf2cd003bf16ed621cdcdc63312c75ce5e5d5e5',
                  'de27f2f36aa1ca73d504e5dffed99161078fb0c8',
              ],
              'maxNewProviderCalls': 47,
              'maxUnitCostUsd': '1.00',
              'maxTotalCostUsd': '47.00',
              'canonicalOutputs': 53,
              'reuseProvenOutputs': 1,
              'derivedProviderOutputs': 5,
              'promote': False,
              'executionNonce': 'URAI-V1-AAA-SPATIAL-20260711-SAFE-RESUME-2-ONE-TIME',
          }
          assert actual == expected, (actual, expected)
          PY
          echo "target_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  historical-preflight:
    needs: authorize
    runs-on: macos-latest
    timeout-minutes: 20
    outputs:
      safe_to_execute: ${{ steps.inspect.outputs.safe_to_execute }}
    steps:
      - name: Inspect historical attempts and artifact contents before spending
        id: inspect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/preflight
          python3 - <<'PY'
          import io, json, os, urllib.parse, urllib.request, zipfile
          from pathlib import Path

          repository = os.environ['GITHUB_REPOSITORY']
          api_root = os.environ['GITHUB_API_URL']
          token = os.environ['GH_TOKEN']
          marker_shas = [
              'bdf2cd003bf16ed621cdcdc63312c75ce5e5d5e5',
              'de27f2f36aa1ca73d504e5dffed99161078fb0c8',
          ]
          workflow_name = 'One-Time V1 AAA Spatial Pack Marker'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'urai-v1-safe-resume-2-preflight',
          }

          def request_bytes(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=90) as response:
                  return response.read()

          def get_json(url):
              return json.loads(request_bytes(url).decode('utf-8'))

          reasons = []
          records = []
          seen_shas = set()
          for marker_sha in marker_shas:
              runs_url = (
                  f"{api_root}/repos/{repository}/actions/runs?"
                  + urllib.parse.urlencode({'head_sha': marker_sha, 'per_page': 100})
              )
              returned = get_json(runs_url).get('workflow_runs', [])
              relevant = sorted(
                  [run for run in returned if run.get('name') == workflow_name],
                  key=lambda run: int(run['id']),
              )
              if relevant:
                  seen_shas.add(marker_sha)
              for run in relevant:
                  run_id = int(run['id'])
                  jobs = get_json(
                      f"{api_root}/repos/{repository}/actions/runs/{run_id}/jobs?filter=all&per_page=100"
                  ).get('jobs', [])
                  artifacts = get_json(
                      f"{api_root}/repos/{repository}/actions/runs/{run_id}/artifacts?per_page=100"
                  ).get('artifacts', [])
                  artifact_records = []
                  for artifact in artifacts:
                      item = {
                          'id': artifact.get('id'),
                          'name': artifact.get('name'),
                          'expired': artifact.get('expired'),
                          'sizeInBytes': artifact.get('size_in_bytes'),
                          'evidenceFiles': [],
                      }
                      if str(artifact.get('name', '')).startswith('urai-v1-aaa-spatial-pack-') and not artifact.get('expired'):
                          archive = request_bytes(
                              f"{api_root}/repos/{repository}/actions/artifacts/{artifact['id']}/zip"
                          )
                          with zipfile.ZipFile(io.BytesIO(archive)) as bundle:
                              names = sorted(bundle.namelist())
                          evidence = [
                              name for name in names
                              if name == 'artifacts/budget/paid-request-state.json'
                              or 'forge_receipt' in name
                              or 'quality_report' in name
                              or 'dropin_receipt' in name
                              or (name.startswith('image_asset_generator/assets/') and not name.endswith('/'))
                              or (name.startswith('image_asset_generator/spatial_handoff/') and name.endswith('.webp'))
                              or name.lower().endswith(('.png', '.webp', '.jpg', '.jpeg'))
                          ]
                          item['evidenceFiles'] = evidence
                          if evidence:
                              reasons.append(
                                  f"historical artifact {artifact['id']} contains spend or generated-output evidence"
                              )
                      artifact_records.append(item)

                  record = {
                      'markerSha': marker_sha,
                      'runId': run_id,
                      'status': run.get('status'),
                      'conclusion': run.get('conclusion'),
                      'runAttempt': run.get('run_attempt'),
                      'createdAt': run.get('created_at'),
                      'updatedAt': run.get('updated_at'),
                      'jobs': [],
                      'artifacts': artifact_records,
                  }
                  if run.get('status') != 'completed':
                      reasons.append(f"historical run {run_id} is unresolved: {run.get('status')}")

                  for job in jobs:
                      steps = job.get('steps') or []
                      record['jobs'].append({
                          'id': job.get('id'),
                          'name': job.get('name'),
                          'status': job.get('status'),
                          'conclusion': job.get('conclusion'),
                          'runAttempt': job.get('run_attempt'),
                          'runnerName': job.get('runner_name'),
                          'steps': [
                              {
                                  'number': step.get('number'),
                                  'name': step.get('name'),
                                  'status': step.get('status'),
                                  'conclusion': step.get('conclusion'),
                              }
                              for step in steps
                          ],
                      })
                      if str(job.get('name', '')).lower() != 'execute':
                          continue
                      if job.get('status') == 'in_progress' or job.get('conclusion') == 'success':
                          reasons.append(f"historical execute job {job.get('id')} may have generated outputs")
                      for step in steps:
                          if step.get('name') != 'Generate all 53 V1 Spatial outputs':
                              continue
                          status = step.get('status')
                          conclusion = step.get('conclusion')
                          if status == 'in_progress' or (status == 'completed' and conclusion != 'skipped'):
                              reasons.append(
                                  f"historical generation step was not skipped in job {job.get('id')}: {status}/{conclusion}"
                              )
                  records.append(record)

          if seen_shas != set(marker_shas):
              reasons.append(f"historical marker coverage incomplete: {sorted(seen_shas)}")

          result = {
              'schemaVersion': '2.0.0',
              'historicalMarkerShas': marker_shas,
              'matchingRuns': len(records),
              'safeToExecute': not reasons,
              'blockingReasons': sorted(set(reasons)),
              'runs': records,
          }
          output = Path('artifacts/preflight/v1-safe-resume-2-historical-inspection.json')
          output.write_text(json.dumps(result, indent=2) + '\n')
          print(json.dumps(result, indent=2))
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f"safe_to_execute={'true' if result['safeToExecute'] else 'false'}\n")
          if reasons:
              raise SystemExit(17)
          PY

      - name: Upload historical inspection receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: urai-v1-safe-resume-2-preflight-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: error
          path: artifacts/preflight/*.json

  execute:
    needs: [authorize, historical-preflight]
    if: needs.historical-preflight.outputs.safe_to_execute == 'true'
    runs-on: macos-latest
    timeout-minutes: 360
    environment: paid-asset-generation
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout exact authorized source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ needs.authorize.outputs.target_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify immutable source and hard limits
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '${{ needs.authorize.outputs.target_sha }}'
          test -z "$(git status --porcelain)"
          test "$GITHUB_RUN_ATTEMPT" = '1'
          test "$ASSET_FORGE_MAX_PROVIDER_CALLS" = '47'
          test "$ASSET_FORGE_MAX_UNIT_COST_USD" = '1.00'
          test "$ASSET_FORGE_MAX_COST_USD" = '47.00'
          test "$ASSET_RENDERER_MAX_ATTEMPTS" = '1'
          test -z "${URAI_WHEEL_GITHUB_TOKEN:-}"

      - name: Download proven provider-backed Home seed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/urai-v1-home-seed"
          curl --fail-with-body --location --silent --show-error \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/artifacts/8250466400/zip" \
            --output "$RUNNER_TEMP/urai-v1-home-seed.zip"
          unzip -q "$RUNNER_TEMP/urai-v1-home-seed.zip" -d "$RUNNER_TEMP/urai-v1-home-seed"
          test "$(find "$RUNNER_TEMP/urai-v1-home-seed" -name 'home-threshold-main_1600.png' | wc -l | tr -d ' ')" = '1'
          echo "ASSET_FORGE_SEED_DIR=$RUNNER_TEMP/urai-v1-home-seed" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install image dependencies
        run: python -m pip install -r image_asset_generator/requirements.txt

      - name: Preflight provider and Spatial contract
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ASSET_RENDERER_API_KEY" ]; then
            echo '::error::OPENAI_API_KEY or ASSET_RENDERER_API_KEY is required.'
            exit 1
          fi
          python -m py_compile image_asset_generator/forge_v1_spatial_pack_run.py
          python image_asset_generator/check_canonical_version_contract.py
          python - <<'PY'
          import json
          from pathlib import Path
          prompts = json.loads(Path('image_asset_generator/spatial_prompt_overrides.json').read_text())
          for name in ('life_map_galaxy_main', 'life_map_galaxy_mobile'):
              prompt = prompts[name]['prompt'].lower()
              for required in ('deep outer space', 'no ground', 'no orb', 'no avatar'):
                  assert required in prompt, (name, required)
          assert 'selecting and zooming' in prompts['focus_memory_chamber_main']['prompt'].lower()
          assert 'moving through an opened memory star' in prompts['replay_memory_film_main']['prompt'].lower()
          PY

      - name: Generate all 53 V1 Spatial outputs
        run: python image_asset_generator/forge_v1_spatial_pack_run.py

      - name: Certify atomic Spatial handoff
        run: python image_asset_generator/certify_version_handoff.py --version v1

      - name: Upload complete forge and certification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: urai-v1-aaa-spatial-pack-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          compression-level: 6
          path: |
            artifacts/budget/*.json
            artifacts/preflight/*.json
            image_asset_generator/manifests/generated/*.json
            image_asset_generator/quality_report*.json
            image_asset_generator/upgrade_feedback*.json
            image_asset_generator/forge_receipt*.json
            image_asset_generator/dropin_receipt*.json
            image_asset_generator/assets/**
            image_asset_generator/preview.html
            image_asset_generator/asset_pack.zip
            image_asset_generator/spatial_handoff/**
