name: Critical Workflow Integrity

on:
  pull_request:
    paths:
      - .github/workflows/canonical-version-forge.yml
      - .github/workflows/critical-workflow-integrity.yml
      - scripts/check-critical-workflow-pins.py
  push:
    branches: [main]
    paths:
      - .github/workflows/canonical-version-forge.yml
      - .github/workflows/critical-workflow-integrity.yml
      - scripts/check-critical-workflow-pins.py
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: critical-workflow-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-critical-workflows:
    # Cross-runner diagnostic 29155961477 proved macOS/Windows assignment while
    # the equivalent ubuntu-latest job remained unassigned. This no-secret,
    # platform-neutral static gate uses macOS until Ubuntu runner service recovers.
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact candidate identity
        shell: bash
        run: |
          set -euo pipefail
          expected='${{ github.event.pull_request.head.sha || github.sha }}'
          test "$(git rev-parse HEAD)" = "$expected"
          test -z "$(git status --porcelain)"
          echo "- verified candidate SHA: $expected" >> "$GITHUB_STEP_SUMMARY"
          echo '- runner workaround: macos-latest; ubuntu-latest remains independently blocked' >> "$GITHUB_STEP_SUMMARY"

      - name: Reject mutable critical action references
        run: python3 scripts/check-critical-workflow-pins.py
