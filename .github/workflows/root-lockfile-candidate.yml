name: Root Lockfile Candidate

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/root-lockfile-candidate.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: root-lockfile-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact source and Node runtime
        shell: bash
        run: |
          set -euo pipefail
          expected='${{ github.event.pull_request.head.sha || github.sha }}'
          test "$(git rev-parse HEAD)" = "$expected"
          test -z "$(git status --porcelain --untracked-files=all)"
          node -e "const major=Number(process.versions.node.split('.')[0]); if(major<20) process.exit(1); console.log(process.version)"
          npm --version

      - name: Generate deterministic root lock candidate
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json
          npm install --package-lock-only --ignore-scripts --no-audit --fund=false
          test -s package-lock.json
          node -e "const p=require('./package-lock.json'); if(p.lockfileVersion!==3) throw new Error('expected npm lockfileVersion 3'); if(!p.packages?.['']) throw new Error('missing root package');"
          shasum -a 256 package-lock.json | tee package-lock.sha256

      - name: Upload root lock candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: root-package-lock-${{ github.event.pull_request.head.sha || github.sha }}
          retention-days: 30
          if-no-files-found: error
          path: |
            package-lock.json
            package-lock.sha256
