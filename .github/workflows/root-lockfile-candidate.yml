name: Root Lockfile Candidate

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/root-lockfile-candidate.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: root-lockfile-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out exact candidate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up exact Node runtime
        uses: actions/setup-node@1e60f620b9541d80c77f7b4a3bcd8bf5e940c37 # v4.4.0
        with:
          node-version: '20.19.5'
          registry-url: https://registry.npmjs.org
          cache: ''

      - name: Verify exact clean source
        shell: bash
        run: |
          set -euo pipefail
          [[ "$EXPECTED_HEAD" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain --untracked-files=all)"
          test ! -e package-lock.json
          test "$(node --version)" = 'v20.19.5'

      - name: Prepare committed root-lock contract
        shell: bash
        run: |
          set -euo pipefail
          node scripts/prepare-root-lock-contract.mjs

      - name: Pin npm and generate lock candidate
        shell: bash
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: |
          set -euo pipefail
          npm install --global npm@10.9.2
          test "$(npm --version)" = '10.9.2'
          npm install --package-lock-only --ignore-scripts --fund=false --audit=false
          test -s package-lock.json

      - name: Validate lock structure and public registry provenance
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const failures = [];
          if (lock.lockfileVersion !== 3) failures.push(`lockfileVersion=${lock.lockfileVersion}`);
          const root = lock.packages?.[''];
          if (!root) failures.push('missing root package entry');
          if (root?.name !== pkg.name || root?.version !== pkg.version) failures.push('root identity mismatch');
          if (JSON.stringify(root?.dependencies || {}) !== JSON.stringify(pkg.dependencies || {})) failures.push('root dependencies mismatch');
          if (JSON.stringify(root?.engines || {}) !== JSON.stringify(pkg.engines || {})) failures.push('root engines mismatch');
          for (const [entryPath, entry] of Object.entries(lock.packages || {})) {
            if (!entry || typeof entry !== 'object' || !entry.resolved) continue;
            if (!String(entry.resolved).startsWith('https://registry.npmjs.org/')) failures.push(`${entryPath} uses non-public registry URL ${entry.resolved}`);
            if (!entry.integrity) failures.push(`${entryPath} is missing integrity`);
          }
          if (failures.length) {
            console.error(failures.join('\n'));
            process.exit(1);
          }
          console.log(`validated ${Object.keys(lock.packages || {}).length} lock entries`);
          NODE

      - name: Verify frozen install and high-severity audit gate
        shell: bash
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --fund=false --audit=false
          npm audit --audit-level=high --omit=dev

      - name: Validate exact artifact scope and write hashes
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const files = [
            'README.md',
            'package-lock.json',
            'scripts/doctor.mjs',
            'scripts/setup-local.mjs',
            'scripts/test-launch-readiness.mjs',
          ];
          const expectedTracked = files.filter((file) => file !== 'package-lock.json').sort();
          const changedTracked = execFileSync('git', ['diff', '--name-only'], { encoding: 'utf8' })
            .trim()
            .split(/\n+/)
            .filter(Boolean)
            .sort();
          if (JSON.stringify(changedTracked) !== JSON.stringify(expectedTracked)) {
            throw new Error(`unexpected tracked changes: ${JSON.stringify(changedTracked)}`);
          }
          if (!fs.existsSync('package-lock.json') || fs.statSync('package-lock.json').size === 0) {
            throw new Error('generated package-lock.json is missing or empty');
          }
          const untracked = execFileSync('git', ['ls-files', '--others', '--exclude-standard'], { encoding: 'utf8' })
            .trim()
            .split(/\n+/)
            .filter(Boolean);
          const unexpectedUntracked = untracked.filter((file) => file !== 'package-lock.json');
          if (unexpectedUntracked.length) {
            throw new Error(`unexpected untracked files: ${JSON.stringify(unexpectedUntracked)}`);
          }
          let packageLockIgnored = false;
          try {
            packageLockIgnored = execFileSync('git', ['check-ignore', '-q', 'package-lock.json']).length === 0;
          } catch {
            packageLockIgnored = false;
          }
          if (!packageLockIgnored && !untracked.includes('package-lock.json')) {
            throw new Error('generated package-lock.json is neither ignored nor reported as untracked');
          }
          const expectedHead = process.env.EXPECTED_HEAD || '';
          const actualHead = execFileSync('git', ['rev-parse', 'HEAD'], { encoding: 'utf8' }).trim();
          if (!/^[0-9a-f]{40}$/.test(expectedHead) || actualHead !== expectedHead) {
            throw new Error(`root-lock source identity mismatch: expected=${expectedHead} actual=${actualHead}`);
          }
          const hashes = Object.fromEntries(files.map((file) => [
            file,
            crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex'),
          ]));
          fs.writeFileSync('root-lock-contract-manifest.json', `${JSON.stringify({
            schemaVersion: 'urai-root-lock-contract-2',
            sourceSha: expectedHead,
            workflowSha: process.env.GITHUB_SHA || null,
            files: hashes,
          }, null, 2)}\n`);
          NODE

      - name: Upload root lock evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: root-package-lock-${{ env.EXPECTED_HEAD }}
          retention-days: 30
          if-no-files-found: error
          path: |
            README.md
            package-lock.json
            root-lock-contract-manifest.json
            scripts/doctor.mjs
            scripts/setup-local.mjs
            scripts/test-launch-readiness.mjs
