name: Asset Factory Production Checks

on:
  push:
    paths:
      - 'assetfactory-studio/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/asset-factory-production.yml'
      - 'docs/release-evidence/URAI-AF-20260711-V1-RESUME-CREDENTIAL-ISOLATION-001.md'
  pull_request:
    paths:
      - 'assetfactory-studio/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/asset-factory-production.yml'
      - 'docs/release-evidence/URAI-AF-20260711-V1-RESUME-CREDENTIAL-ISOLATION-001.md'

permissions:
  contents: read

concurrency:
  group: asset-factory-production-checks-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  production-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assetfactory-studio
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Validate production assets
        run: |
          mkdir -p ../artifacts/production-checks
          npm run validate:assets 2>&1 | tee ../artifacts/production-checks/asset-validation.log

      - name: Upload production validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-factory-production-validation
          path: artifacts/production-checks/asset-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate runtime contract
        run: npm run validate:runtime

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
