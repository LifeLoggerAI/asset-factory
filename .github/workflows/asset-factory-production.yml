name: Asset Factory Production Checks

on:
  push:
    paths:
      - 'assetfactory-studio/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/asset-factory-production.yml'
      - 'docs/release-evidence/URAI-AF-20260711-V1-RESUME-CREDENTIAL-ISOLATION-001.md'
  pull_request:
    paths:
      - 'assetfactory-studio/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/asset-factory-production.yml'
      - 'docs/release-evidence/URAI-AF-20260711-V1-RESUME-CREDENTIAL-ISOLATION-001.md'

permissions:
  contents: read

concurrency:
  group: asset-factory-production-checks-${{ github.event.pull_request.number || github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

env:
  ASSET_FACTORY_EXACT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  production-checks:
    runs-on: ${{ github.event_name == 'pull_request' && 'macos-latest' || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: assetfactory-studio
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.ASSET_FACTORY_EXACT_HEAD }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact clean candidate identity
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$ASSET_FACTORY_EXACT_HEAD"
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Validate production assets
        run: |
          mkdir -p ../artifacts/production-checks
          npm run validate:assets 2>&1 | tee ../artifacts/production-checks/asset-validation.log

      - name: Upload production validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-factory-production-validation-${{ env.ASSET_FACTORY_EXACT_HEAD }}
          path: artifacts/production-checks/asset-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate runtime contract
        run: npm run validate:runtime

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
